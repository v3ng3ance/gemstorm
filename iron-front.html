<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:#06080f;overflow:hidden;font-family:'Courier New',monospace;touch-action:none}
#gc{position:relative;width:100%;height:100vh;overflow:hidden}
#cv{display:block;position:absolute;top:0;left:0;image-rendering:pixelated;cursor:none}
/* HUD */
#hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:6px 8px;pointer-events:none;z-index:10;gap:6px}
.pan{background:rgba(2,5,12,0.88);border:1px solid rgba(50,100,200,0.25);border-radius:5px;padding:5px 9px;color:#a8c0e0;font-size:11px;line-height:1.8}
.hb{width:100px;height:5px;background:rgba(255,255,255,0.08);border-radius:3px;margin-top:2px;overflow:hidden}
.hf{height:100%;border-radius:3px;transition:width .1s}
#kf{position:absolute;top:58px;right:8px;z-index:10;pointer-events:none;width:210px}
.km{background:rgba(2,5,12,0.88);border-left:2px solid #c03030;color:#98a8bc;font-size:10px;padding:2px 6px;margin-bottom:2px;border-radius:0 3px 3px 0;animation:fk 3.5s forwards}
@keyframes fk{0%{opacity:1}70%{opacity:1}100%{opacity:0}}
/* Minimap */
#mm{position:absolute;bottom:7px;right:7px;border:1px solid rgba(50,100,200,0.2);border-radius:3px;z-index:10;pointer-events:none}
/* Respawn timer */
#rsp{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:12;display:none;text-align:center;pointer-events:none}
#rsp h2{font-size:22px;color:#ff3030;letter-spacing:2px}
#rsp .rsub{color:#5a6878;font-size:11px;margin-top:4px}
#rsp .rtimer{font-size:36px;color:#ff6040;font-weight:bold;margin-top:6px}
/* Kill streak banner */
#ks{position:absolute;top:22%;left:50%;transform:translateX(-50%);z-index:12;display:none;text-align:center;pointer-events:none;animation:ksIn .3s ease}
@keyframes ksIn{from{transform:translateX(-50%) scale(0.5);opacity:0}to{transform:translateX(-50%) scale(1);opacity:1}}
#ks .kst{font-size:20px;font-weight:bold;letter-spacing:3px}
#ks .kss{font-size:11px;color:#888;margin-top:2px}
/* Bullet holes */
.bhole{position:absolute;border-radius:50%;background:rgba(0,0,0,0.6);pointer-events:none}
/* MENU */
#ov{position:absolute;top:0;left:0;right:0;bottom:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow-y:auto;padding:8px 0}
#bgcv{position:absolute;top:0;left:0;width:100%;height:100%}
.ovc{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;width:100%;max-width:400px;padding:6px 14px}
.gttl{font-size:30px;font-weight:900;letter-spacing:6px;font-family:'Arial Black','Arial',sans-serif;color:#d0e4ff;margin-bottom:1px;text-align:center}
.gsub{color:#304860;font-size:9px;letter-spacing:3px;margin-bottom:12px;text-align:center}
.box{background:rgba(4,8,20,0.96);border:1px solid rgba(48,100,200,0.18);border-radius:6px;padding:10px 13px;margin-bottom:8px;width:100%}
.box h3{color:#3a60a0;font-size:9px;letter-spacing:2px;margin-bottom:8px;text-transform:uppercase}
.row{display:flex;gap:7px;align-items:center;margin-bottom:7px;flex-wrap:wrap}
.row label{color:#304860;font-size:10px;width:72px;flex-shrink:0}
.row select,.row input{background:rgba(4,10,24,0.98);border:1px solid rgba(48,100,200,0.2);color:#a8c0e0;padding:5px 7px;border-radius:4px;font-family:'Courier New',monospace;font-size:11px;flex:1;min-width:0;outline:none}
.btn{background:rgba(24,55,125,0.9);border:1px solid rgba(60,115,225,0.35);color:#a0cafe;padding:8px 14px;font-size:11px;font-weight:bold;border-radius:4px;cursor:pointer;font-family:'Courier New',monospace;letter-spacing:1px;transition:background .1s;touch-action:manipulation}
.btn:hover,.btn:active{background:rgba(38,82,188,0.95)}
.btn.g{background:rgba(14,50,14,0.9);border-color:rgba(34,140,68,0.32);color:#72ca72}
.btn.g:hover,.btn.g:active{background:rgba(22,70,22,0.95)}
.lrow{display:flex;gap:6px;margin-bottom:10px}
.lb{background:rgba(4,10,24,0.9);border:1px solid rgba(48,100,200,0.2);color:#304860;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:10px;font-family:'Courier New',monospace;letter-spacing:1px;touch-action:manipulation}
.lb.on{background:rgba(24,55,125,0.88);border-color:rgba(68,135,245,0.48);color:#a0cafe}
#stm{color:#385070;font-size:10px;margin-top:5px;min-height:13px;text-align:center;word-break:break-all}
#rcd{background:rgba(4,10,24,0.98);border:1px solid rgba(46,200,104,0.3);border-radius:4px;padding:6px 10px;color:#40d870;font-size:14px;font-family:'Courier New',monospace;letter-spacing:3px;text-align:center;cursor:pointer;display:none;margin-top:5px;touch-action:manipulation}
.ctp{color:#223848;font-size:9px;text-align:center;margin-top:3px;display:none}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:3px 12px;font-size:9px;color:#223848;margin-top:5px;width:100%;max-width:400px;padding:0 14px}
.cg span{color:#3a60a0}
#cst{color:#24906a;font-size:10px;text-align:center;margin-top:3px;min-height:12px}
/* DEATH */
#dov{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(30,0,0,0.72);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:15}
#dov h2{font-size:24px;letter-spacing:3px;color:#ff2020;font-family:'Courier New',monospace}
#dov p{color:#586070;margin:5px 0 4px;font-size:11px;font-family:'Courier New',monospace}
#dov .dtimer{font-size:32px;color:#ff5030;font-weight:bold;margin:4px 0 14px}
/* MOBILE CONTROLS */
#mc{position:absolute;bottom:0;left:0;right:0;height:160px;z-index:11;display:none;pointer-events:none}
#mc.show{display:block}
.mjoy{position:absolute;bottom:20px;left:20px;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.15);pointer-events:auto;touch-action:none}
.mjstick{position:absolute;width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,0.25);border:2px solid rgba(255,255,255,0.4);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.mbtns{position:absolute;bottom:20px;right:14px;display:flex;flex-direction:column;gap:8px;align-items:flex-end;pointer-events:auto}
.mbtn{width:58px;height:58px;border-radius:50%;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:center;font-size:10px;color:rgba(255,255,255,0.6);font-family:'Courier New',monospace;letter-spacing:0;touch-action:manipulation;cursor:pointer;user-select:none}
.mbtn.fire{background:rgba(200,50,50,0.2);border-color:rgba(255,80,80,0.4);font-size:13px}
.mbtn.jump{background:rgba(50,100,200,0.2);border-color:rgba(80,140,255,0.4)}
#wsel{position:absolute;bottom:90px;right:82px;display:flex;gap:5px;pointer-events:auto}
.wbtn{width:38px;height:38px;border-radius:4px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:8px;color:rgba(255,255,255,0.5);font-family:'Courier New',monospace;touch-action:manipulation;cursor:pointer}
.wbtn.act{background:rgba(80,140,255,0.2);border-color:rgba(100,160,255,0.5);color:#a0c8ff}
</style>
</head>

// ── Resize ──────────────────────────────────────────────────────
function resizeCV(){
  const gc=document.getElementById('gc');
  const vw=gc.clientWidth,vh=gc.clientHeight;
  const sc=Math.min(vw/GW,vh/GH);
  const cw=Math.round(GW*sc),ch=Math.round(GH*sc);
  cv.style.width=cw+'px';cv.style.height=ch+'px';
  cv.style.left=Math.round((vw-cw)/2)+'px';
  cv.style.top=Math.round((vh-ch)/2)+'px';
  bgcv.width=vw;bgcv.height=vh;
  drawMenuBg();
}
window.addEventListener('resize',resizeCV);

];
function spawnSafe(){
  // pick spawn farthest from all living bots
  let best=SPWN[0],bd=0;
  for(const s of SPWN){
    let mind=9999;
    for(const b of bots) if(!b.dead) mind=Math.min(mind,Math.hypot(b.x-s.x,b.y-s.y));
    if(mind>bd){bd=mind;best=s;}
  }
  return best;
}

// ── Entity ───────────────────────────────────────────────────────
class Ent{
  constructor(x,y,isP){
    this.x=x;this.y=y;this.w=20;this.h=32;
    this.vx=0;this.vy=0;this.hp=100;
    this.onG=false;this.fr=true;
    this.isP=isP;
    this.wp=mkW();this.wi=0;
    this.lsh=0;this.dead=false;this.aim=0;
    this.rld=false;this.re=0;
    this.si=0;this.frm=0;this.mv=false;this.fl=0;this.nm='';this.armor=0;this.shootT=0;
    // For bot cover system
    this.coverX=0;this.coverMode=false;this.coverT=0;
  }
  get w0(){return this.wp[this.wi];}

  // Hit zones: head, torso, legs — returns {dmg, zone}
  hitZone(bx2,by2){
    // entity: top=this.y, bottom=this.y+this.h
    // head: top 28% of height
    // torso: 28%-68%
    // legs: 68%-100%
    const rel=(by2-this.y)/this.h;
    if(rel<0.30) return 'head';
    if(rel<0.68) return 'torso';
    return 'legs';
  }

  shoot(tgts,t){
    const w=this.w0;
    if(this.rld)return;
    if(w.ammo<=0){
      // auto-reload if reserve available
      if(w.res>0){this.sRld(t);return;}
      // no reserve — auto-switch to a weapon that has ammo
      for(let i=0;i<this.wp.length;i++){
        if(this.wp[i].ammo>0||this.wp[i].res>0){this.wi=i;return;}
      }
      return; // truly out of ammo everywhere
    }
    if(t-this.lsh<w.rate)return;
    this.lsh=t;w.ammo--;this.shootT=8;totalShots++;
    // auto-reload if just emptied the clip
    if(w.ammo===0&&w.res>0) this.sRld(t);
    const fX=this.x+this.w/2,fY=this.y+this.h;
    const sxm=this.fr?1:-1;
    const shX=fX+sxm*6,shY=fY-33;
    const barrelLen=30;
    const ox=shX+Math.cos(this.aim)*barrelLen;
    const oy=shY+Math.sin(this.aim)*barrelLen;
    const n=w.pel||1;
    for(let i=0;i<n;i++){
      const a=this.aim+(Math.random()-0.5)*w.spr*2;
      BL.push({x:ox,y:oy,vx:Math.cos(a)*w.spd,vy:Math.sin(a)*w.spd,
        dmg:w.dmg,col:w.col,sz:w.sz,own:this,
        gren:w.gren||false,life:w.gren?140:65,bn:w.gren?3:0,trl:w.trl||3,tr:[],
        minDist:20}); // must travel 20px before hitting anyone
    }
    for(let i=0;i<5;i++){
      const a2=this.aim+(Math.random()-0.5)*0.4;
      PA.push({x:ox,y:oy,vx:Math.cos(a2)*(2+Math.random()*4),vy:Math.sin(a2)*(2+Math.random()*4)-.4,lf:8,col:'#ffe080',sz:1.5,k:'s'});
    }
    PA.push({x:ox,y:oy,vx:Math.cos(this.aim)*.3,vy:-.4,lf:16,col:'rgba(130,130,130,0.45)',sz:7,k:'m'});
  }
  sRld(t){const w=this.w0;if(w.res<=0||w.ammo>=w.maxA)return;this.rld=true;this.re=t+950;}
  uRld(t){if(this.rld&&t>=this.re){this.rld=false;const w=this.w0;const g=Math.min(w.maxA-w.ammo,w.res);w.ammo+=g;w.res-=g;}}

  phys(dt){
    // Use fixed gravity per frame, not scaled by dt, to keep feel consistent
    const dtc = Math.min(dt, 1.5); // clamp per-entity dt too
    this.vy += 0.45 * dtc;
    this.x  += this.vx * dtc;
    this.y  += this.vy * dtc;
    this.vx *= this.onG ? 0.76 : 0.92;
    this.onG = false;
    for(const p of MAP.plats){
      const ix=this.x+this.w>p.x&&this.x<p.x+p.w;
      if(!ix)continue;
      if(this.vy>=0&&this.y+this.h>p.y&&this.y+this.h<p.y+p.h+16){this.y=p.y-this.h;this.vy=0;this.onG=true;}
      if(this.vy<0&&this.y<p.y+p.h&&this.y+this.h>p.y){this.y=p.y+p.h;this.vy=.5;}
      if(this.y+this.h>p.y+2&&this.y<p.y+p.h-2){
        if(this.vx<0&&this.x<p.x+p.w&&this.x+this.w>p.x+p.w){this.x=p.x+p.w;this.vx=0;}
        if(this.vx>0&&this.x+this.w>p.x&&this.x<p.x){this.x=p.x-this.w;this.vx=0;}
      }
    }
    this.x=Math.max(12,Math.min(MW-this.w-12,this.x));
    // Clamp Y — never teleport. If fell below map, push back to ground level.
    if(this.y>MH-this.h){
      this.y=MH-this.h;
      this.vy=0;
      this.onG=true;
    }
    // frm: walk cycle counter, increments smoothly, no sharp reset
    if(this.mv && this.onG) this.frm += dtc;
    else this.frm = 0; // reset only when stopped and on ground
    if(this.fl>0) this.fl -= dtc;
  }

  draw(){
    const sx=this.x-cam.x+cam.shakeX,sy=this.y-cam.y+cam.shakeY;
    if(sx<-80||sx>GW+80||sy<-80||sy>GH+80)return;
    cx.save();
    cx.translate(sx+this.w/2,sy+this.h);
    if(this.fl>0)cx.globalAlpha=0.38+Math.abs(Math.sin(this.fl*.8))*.5;
    drawSoldier(cx,this.isP,this.aim,this.frm,this.fr);
    cx.restore();cx.globalAlpha=1;
    // HP bar ABOVE head (head visual top = sy-25 in screen space)
    const headTop=sy-25;
    const bw=34,bx2=sx+this.w/2-bw/2,hp=Math.max(0,this.hp);
    // Name
    cx.fillStyle=this.isP?'#46c4ff':'#ff6050';
    cx.font='bold 9px monospace';cx.textAlign='center';
    cx.fillText(this.isP?(this.nm||'TU'):TX[lang].bot,sx+this.w/2,headTop-15);
    // HP bar bg
    cx.fillStyle='rgba(0,0,0,0.65)';cx.fillRect(bx2,headTop-11,bw,5);
    // HP fill
    const hcol=hp>60?'#26c840':hp>30?'#c89414':'#c81414';
    cx.fillStyle=hcol;cx.fillRect(bx2,headTop-11,bw*(hp/100),5);
    // Armor overlay
    if((this.armor||0)>0){
      cx.fillStyle='rgba(80,160,255,0.55)';
      cx.fillRect(bx2,headTop-11,bw*Math.min(1,(this.armor||0)/100),5);
    }
    cx.strokeStyle='rgba(255,255,255,0.1)';cx.lineWidth=0.5;cx.strokeRect(bx2,headTop-11,bw,5);
    if(this.rld){
      cx.fillStyle='rgba(255,190,36,.9)';cx.font='bold 7px monospace';cx.textAlign='center';
      cx.fillText('RELOAD',sx+this.w/2,headTop-22);
    }
    cx.textAlign='left';
  }
}

// ── Soldier drawing ──────────────────────────────────────────────
function drawSoldier(c,isP,aim,frm,fr){
  const bc=isP?'#2a6040':'#702020';
  const ac=isP?'#1e4830':'#501818';
  const hc=isP?'#1a3828':'#3a1010';
  const s=fr?1:-1;
  // Legs: simple alternating rectangles, no vertical bob
  const sw=Math.sin(frm*0.22)*10; // leg swing, slow and subtle
  c.fillStyle=ac;
  c.save();c.rotate( sw*s*Math.PI/180);
  c.fillRect(s*-7,-22,s*6,14);c.fillStyle='#181620';c.fillRect(s*-8,-10,s*7,5);
  c.restore();
  c.save();c.rotate(-sw*s*Math.PI/180);
  c.fillRect(s*1,-22,s*6,14);c.fillStyle='#181620';c.fillRect(s*1,-10,s*7,5);
  c.restore();
  // Torso — completely static, no bob
  c.fillStyle=bc; c.fillRect(s*-9,-42,s*18,22);
  c.fillStyle=ac; c.fillRect(s*-9,-42,s*18,7); c.fillRect(s*-9,-26,s*18,5);
  c.fillStyle='rgba(0,0,0,.2)'; c.fillRect(s*-7,-40,s*4,5); c.fillRect(s*3,-40,s*4,5);
  // Head — static
  c.fillStyle='#c49060'; c.beginPath(); c.arc(0,-50,6.5,0,Math.PI*2); c.fill();
  c.fillStyle=hc; c.beginPath(); c.arc(0,-52,7,Math.PI,0); c.fill();
  c.fillRect(-7,-54,14,5);
  c.fillStyle='rgba(0,0,0,.44)'; c.fillRect(-4,-52,8,3);
  c.strokeStyle='rgba(80,160,255,.5)'; c.lineWidth=1;
  c.beginPath(); c.arc(-2,-51,1.8,0,Math.PI*2); c.stroke();
  c.beginPath(); c.arc( 2,-51,1.8,0,Math.PI*2); c.stroke();
  // Weapon arm — rotates with aim, no bob
  c.save(); c.translate(s*6,-33); c.rotate(aim);
  c.fillStyle=bc;      c.fillRect(-2,-2,9,5);
  c.fillStyle='#484f5e'; c.fillRect(7,-4,20,6);
  c.fillStyle='#30363c'; c.fillRect(5,-5,13,8);
  c.fillStyle='#5c6370'; c.fillRect(26,-3,7,3);
  c.fillStyle='#38302a'; c.fillRect(2,-5,6,8);
  c.fillStyle='#28303e'; c.fillRect(12,-7,8,3);
  c.restore();
}

// ── Background drawing ───────────────────────────────────────────
function drawBg(){
  const sk=MAP.sky;
  const sg=cx.createLinearGradient(0,0,0,GH*.65);
  sg.addColorStop(0,sk[0]);sg.addColorStop(.5,sk[1]);sg.addColorStop(1,sk[2]);
  cx.fillStyle=sg;cx.fillRect(0,0,GW,GH*.65);
  cx.fillStyle=sk[2];cx.fillRect(0,GH*.62,GW,GH*.38);
  // stars
  for(const s of STA){
    const sx2=((s.x-cam.x*.05)%MW+MW)%MW*(GW/MW);
    cx.globalAlpha=s.b;cx.fillStyle='#c0d4ff';
    cx.beginPath();cx.arc(sx2,s.y,s.s,0,Math.PI*2);cx.fill();
  }
  cx.globalAlpha=1;
  if(MAP.name!=='Desert'){
    // Moon
    const mx=GW*.83,my=46;
    cx.shadowColor='rgba(200,220,255,.28)';cx.shadowBlur=28;
    cx.fillStyle='#e8f2ff';cx.beginPath();cx.arc(mx,my,20,0,Math.PI*2);cx.fill();
    cx.shadowBlur=0;
    cx.fillStyle='#c8d8ee';cx.beginPath();cx.arc(mx-5,my-4,7,0,Math.PI*2);cx.fill();
    cx.fillStyle=sk[0];cx.beginPath();cx.arc(mx+7,my-6,16,0,Math.PI*2);cx.fill();
  }else{
    // Desert sun/moon
    cx.fillStyle='rgba(255,180,40,.25)';cx.beginPath();cx.arc(GW*.2,80,40,0,Math.PI*2);cx.fill();
  }
  // Mountains
  const mc2col=MAP.name==='Desert'?'#201408':MAP.name==='Snow'?'#182030':'#0a1828';
  for(const m of MTN){
    const px2=((m.x-cam.x*.08)%MW+MW)%MW*(GW/MW);
    const py2=GH*.72-m.h*.52;
    cx.fillStyle=mc2col;
    cx.beginPath();cx.moveTo(px2,GH*.72);cx.lineTo(px2+m.w/2,py2);cx.lineTo(px2+m.w,GH*.72);cx.fill();
    if(m.sn&&MAP.name==='Snow'){
      cx.fillStyle='rgba(220,235,255,.88)';
      cx.beginPath();cx.moveTo(px2+m.w/2,py2);cx.lineTo(px2+m.w/2-16,py2+24);cx.lineTo(px2+m.w/2+16,py2+24);cx.fill();
    }
  }
  // Buildings
  const bcol=MAP.name==='Desert'?'#181008':MAP.name==='Snow'?'#0c1420':'#0c1420';
  for(const b of BLD){
    const px2=((b.x-cam.x*.22)%MW+MW)%MW*(GW/MW);
    const py2=GH*.72-b.h;
    cx.fillStyle=bcol;cx.fillRect(px2,py2,b.w,b.h);
    const ww=Math.max(5,Math.floor((b.w-8)/b.cols));
    for(let r=0;r<b.rows;r++) for(let col=0;col<b.cols;col++){
      cx.fillStyle=b.lit[r*5+col]>.42?'rgba(255,215,70,.5)':'rgba(12,24,50,.8)';
      cx.fillRect(px2+4+col*(ww+2),py2+8+r*20,ww,12);
    }
    cx.fillStyle='rgba(255,40,40,.65)';
    if(b.w>50){cx.beginPath();cx.arc(px2+b.w/2,py2-12,2,0,Math.PI*2);cx.fill();}
  }
  // ground fog
  const fg=cx.createLinearGradient(0,GH*.68,0,GH*.78);
  fg.addColorStop(0,'rgba(6,10,8,0)');fg.addColorStop(1,'rgba(4,7,5,.7)');
  cx.fillStyle=fg;cx.fillRect(0,GH*.68,GW,GH*.12);
}

function drawPlats(){
  for(const p of MAP.plats){
    const sx=p.x-cam.x+cam.shakeX,sy=p.y-cam.y+cam.shakeY;
    if(sx>GW+40||sx+p.w<-40)continue;
    const t=p.t;
    if(t==='g'||t==='g2'||t==='gs'){
      // ground
      const tc=t==='g'?'#141a0e':t==='g2'?'#1a1206':'#141a20';
      cx.fillStyle=tc;cx.fillRect(sx,sy,p.w,p.h);
      // top edge color
      const gc2=t==='g'?'#4a8028':t==='g2'?'#8a6020':'#a0b8c8';
      cx.fillStyle=gc2;cx.fillRect(sx,sy,p.w,4);
      if(t==='g'){// grass tufts
        cx.fillStyle='#5a9030';
        for(let gx=(sx%11+11)%11;gx<sx+p.w&&gx<GW+4;gx+=11){cx.fillRect(gx,sy-6,2,7);cx.fillRect(gx+3,sy-4,1.5,5);}
      }else if(t==='gs'){// snow
        cx.fillStyle='#d0dce8';cx.fillRect(sx,sy,p.w,5);
      }
    }else if(t==='c'||t==='w'){
      cx.fillStyle='#060810';cx.fillRect(sx,sy,p.w,p.h);
    }else{
      // platforms
      const pc=t==='p2'?'#281e10':t==='ps'?'#182030':'#202a18';
      const pg=cx.createLinearGradient(0,sy,0,sy+p.h);
      pg.addColorStop(0,t==='p2'?'#302416':t==='ps'?'#202838':'#28341e');
      pg.addColorStop(1,pc);
      cx.fillStyle=pg;cx.fillRect(sx,sy,p.w,p.h);
      // panel lines
      for(let bx2=0;bx2<p.w;bx2+=30){
        cx.strokeStyle='rgba(0,0,0,.3)';cx.lineWidth=.8;
        cx.beginPath();cx.moveTo(sx+bx2,sy);cx.lineTo(sx+bx2,sy+p.h);cx.stroke();
      }
      // top highlight
      const tc2=t==='p2'?'#604828':t==='ps'?'#4868a0':'#4a6830';
      cx.fillStyle=tc2;cx.fillRect(sx,sy,p.w,3);
      // moss/snow on top
      if(t==='ps'){cx.fillStyle='rgba(200,220,240,.5)';for(let gx=(sx%8+8)%8;gx<sx+p.w&&gx<GW+4;gx+=8)cx.fillRect(gx,sy-2,2,3);}
      else{cx.fillStyle='rgba(60,100,30,.4)';for(let gx=(sx%8+8)%8;gx<sx+p.w&&gx<GW+4;gx+=8)cx.fillRect(gx,sy-2,1.5,3);}
      // shadow below
      cx.fillStyle='rgba(0,0,0,.35)';cx.fillRect(sx,sy+p.h,p.w,4);
    }
  }
}

// ── Weapon drops ─────────────────────────────────────────────────
function drawDrops(){
  for(const d of drops){
    const sx=d.x-cam.x+cam.shakeX,sy=d.y-cam.y+cam.shakeY;
    cx.fillStyle='rgba(255,200,50,.85)';
    cx.fillRect(sx-8,sy-4,16,6);
    cx.fillStyle='rgba(50,50,50,.8)';
    cx.fillRect(sx-3,sy-4,2,6);
    cx.fillStyle='rgba(255,255,255,.7)';cx.font='7px monospace';cx.textAlign='center';

}

function drawBullets(){

function drawPA(dt){
  for(let i=PA.length-1;i>=0;i--){
    const p=PA[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.lf-=dt;
    if(p.k!=='m'&&p.k!=='txt') p.vy+=.28*dt;
    p.vx*=.93;
    if(p.lf<=0){PA.splice(i,1);continue;}
    const sx=p.x-cam.x+cam.shakeX,sy=p.y-cam.y+cam.shakeY;
    if(p.k==='txt'){
      // damage number
      cx.globalAlpha=Math.min(1,p.lf/20);
      cx.fillStyle=p.col;
      cx.font='bold '+(p.big?13:10)+'px monospace';
      cx.textAlign='center';
      cx.fillText((p.big?'*':'')+p.val,sx,sy);
      cx.textAlign='left';
    }else{
      cx.globalAlpha=Math.min(1,p.lf/13);
      cx.fillStyle=p.col;
      if(p.k==='m'){cx.beginPath();cx.arc(sx,sy,p.sz*(1+.04*(18-p.lf)),0,Math.PI*2);cx.fill();}
      else{cx.beginPath();cx.arc(sx,sy,p.sz,0,Math.PI*2);cx.fill();}
    }
  }
  cx.globalAlpha=1;
}

function drawEX(dt){
  for(let i=EX.length-1;i>=0;i--){
    const e=EX[i];e.r+=e.mr/7*dt;e.lf-=dt;
    if(e.lf<=0){EX.splice(i,1);continue;}
    const sx=e.x-cam.x+cam.shakeX,sy=e.y-cam.y+cam.shakeY,a=e.lf/e.ml;
    cx.globalAlpha=a*.54;cx.strokeStyle='#ff7020';cx.lineWidth=3;cx.beginPath();cx.arc(sx,sy,e.r,0,Math.PI*2);cx.stroke();
    cx.globalAlpha=a*.22;cx.strokeStyle='#ffcc30';cx.lineWidth=8;cx.beginPath();cx.arc(sx,sy,e.r*.5,0,Math.PI*2);cx.stroke();
    cx.globalAlpha=a*.1;cx.fillStyle='#ff5000';cx.beginPath();cx.arc(sx,sy,e.r*.75,0,Math.PI*2);cx.fill();
  }
  cx.globalAlpha=1;
}


// ── Pickups ───────────────────────────────────────────────────────
const PKC={ammo:'#ffe060',health:'#40ff60',armor:'#60a0ff',weapon:'#e060ff'};
function spawnPickups(){
  pickups=[];
  const pl=MAP.plats.filter(p=>p.t==='p'||p.t==='p2'||p.t==='ps');
  const types=['health','armor','ammo','weapon','health','ammo','armor','ammo','health','weapon','ammo','armor'];
  const step=Math.max(1,Math.floor(pl.length/types.length));
  types.forEach((tp,i)=>{
    const p=pl[Math.min((i*step+Math.floor(step/2)),pl.length-1)];
    if(!p)return;
    const wi=tp==='weapon'?Math.floor(Math.random()*4):0;
    const label=tp==='weapon'?WD[wi].name.slice(0,3).toUpperCase():{ammo:'AMO',health:'+HP',armor:'ARM'}[tp];
    pickups.push({x:p.x+p.w/2,y:p.y-14,type:tp,wi,active:true,respawn:0,label,glow:PKC[tp]});
  });
}
function updPickups(dt){
  for(const pk of pickups){
    if(!pk.active){pk.respawn-=dt;if(pk.respawn<=0)pk.active=true;continue;}
    if(!p1||p1.dead||isDead)continue;
    if(Math.hypot(p1.x+p1.w/2-pk.x,p1.y+p1.h/2-pk.y)<30){
      if(pk.type==='ammo'){for(const w of p1.wp)w.res=Math.min(w.maxA*3,w.res+w.maxA);addK('+Munitie','#ffe060');}
      else if(pk.type==='health'){const g=Math.min(100-p1.hp,40);p1.hp=Math.min(100,p1.hp+40);addK('+'+Math.round(g)+' HP','#40ff60');}
      else if(pk.type==='armor'){p1.armor=Math.min(100,(p1.armor||0)+50);addK('+Armura','#60a0ff');}
      else if(pk.type==='weapon'){const w=p1.wp[pk.wi];w.ammo=w.maxA;w.res=w.maxA*2;p1.wi=pk.wi;addK('+'+WD[pk.wi].name,'#e060ff');}
      pk.active=false;pk.respawn=1500;
    }
  }
}
function drawPickups(){
  const t=Date.now();
  for(const pk of pickups){
    if(!pk.active)continue;
    const sx=pk.x-cam.x+cam.shakeX,sy=pk.y-cam.y+cam.shakeY;

    cx.fillText(pk.label,sx,sy+3);cx.textAlign='left';

    cx.strokeStyle=pk.glow;cx.lineWidth=2;

}

function drawCrosshair(){

  cx.save();

  cx.setLineDash([]);
  cx.strokeStyle='rgba(255,255,255,0.82)'; cx.lineWidth=1.5;
  cx.beginPath();cx.moveTo(x-10,y);cx.lineTo(x-3,y);cx.stroke();

// ── Screen shake ─────────────────────────────────────────────────
function shake(amount){
  cam.shakeT=8;cam._sa=amount;
}
function updateShake(dt){
  if(cam.shakeT>0){
    cam.shakeT-=dt;
    const a=cam._sa*(cam.shakeT/8);
    cam.shakeX=(Math.random()-.5)*a*2;
    cam.shakeY=(Math.random()-.5)*a*2;

function showStreak(n){
  const ks=document.getElementById('ks');

function addK(msg,col){

  const el=document.createElement('div');el.className='km';
  if(col)el.style.borderLeftColor=col;
  el.textContent=msg;kf.appendChild(el);

}

// ── Explosion ────────────────────────────────────────────────────
function expl(x,y,radius,dmg,own){
  const all=[p1,...bots].filter(e=>e&&!e.dead&&e!==own);
  for(const e of all){
    const tx=e.x+e.w/2,ty=e.y+e.h/2;
    const d=Math.hypot(tx-x,ty-y);
    if(d<radius){e.hp-=dmg*(1-d/radius);e.vx+=(tx-x)/d*8;e.vy+=(ty-y)/d*8-3;e.fl=10;}
  }
  for(let i=0;i<24;i++){const a=Math.random()*Math.PI*2,sp=2+Math.random()*9;
    PA.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,lf:22+Math.random()*16,col:Math.random()<.55?'#ff5010':'#ffbb20',sz:3+Math.random()*4,k:'s'});}
  for(let i=0;i<8;i++) PA.push({x:x+(Math.random()-.5)*radius*.4,y:y+(Math.random()-.5)*radius*.4,
    vx:(Math.random()-.5)*2,vy:-Math.random()*3,lf:38,col:'rgba(110,110,110,.65)',sz:10+Math.random()*10,k:'m'});
  EX.push({x,y,r:0,mr:radius,lf:20,ml:20});
  shake(radius*.18);
}

// ── Death & respawn ──────────────────────────────────────────────
function handleDeath(v,k,zone){
  v.dead=true;
  const kn=k?(!k.isP?TX[lang].bot:(k.nm||'P2')):'?';
  const vn=!v.isP?TX[lang].bot:(v.nm||'TU');
  // Drop weapon
  drops.push({x:v.x+v.w/2,y:v.y,wp:v.wp[v.wi],nm:v.w0.name,wi:v.wi,life:600});
  // Blood
  for(let i=0;i<14;i++) PA.push({x:v.x+v.w/2,y:v.y+v.h/2,
    vx:(Math.random()-.5)*7,vy:-Math.random()*6,lf:24,col:'#aa1818',sz:2.5+Math.random()*3,k:'b'});
  BD.push({x:v.x+v.w/2,y:v.y+v.h,r:14+Math.random()*10,a:.8});

  if(v.isP){
    isDead=true;
    document.getElementById('rsp').style.display='block';
    document.getElementById('rtxt').textContent=TX[lang].rtxt;
    document.getElementById('rsub2').textContent=TX[lang].rsub2;
    respawnTimer=3;
    const ti=document.getElementById('rtimer');
    ti.textContent=Math.ceil(respawnTimer);
    shake(12);
  }else{
    // bot respawn
    setTimeout(()=>{
      if(!v.dead)return;
      const s=SPWN[v.si];
      Object.assign(v,{x:s.x,y:s.y,vx:0,vy:0,hp:100,dead:false,rld:false,coverMode:false});
      v.wp=mkW();v.wi=0;
    },4000);
  }
  if(k&&k.isP){
    kills++;streak++;bestStreak=Math.max(bestStreak,streak);
    if(streak>=2)showStreak(streak);
    const zn=zone||'torso';
    const col=zn==='head'?'#ff4040':zn==='legs'?'#a0a040':'#c03030';
    addK((zn==='head'?'[HEAD] ':zn==='legs'?'[LEGS] ':'')+kn+' '+TX[lang].killed+' '+vn,col);
  }else{
    addK(kn+' '+TX[lang].killed+' '+vn,'#803030');
  }
}

// ── Bullet update ────────────────────────────────────────────────
function updBL(dt){
  for(let i=BL.length-1;i>=0;i--){
    const b=BL[i];
    b.tr.push({x:b.x,y:b.y});if(b.tr.length>b.trl)b.tr.shift();
    if(b.gren){b.vy+=.4*dt;b.vx*=.997;}

    const moveX=b.vx*dt;
    const moveY=b.vy*dt;
    const steps=Math.ceil(Math.max(Math.abs(moveX),Math.abs(moveY))/6)+1;
    const sdx=moveX/steps, sdy=moveY/steps;
    let hit=false;

    for(let s=0;s<steps&&!hit;s++){
      b.x+=sdx; b.y+=sdy; b.life-=dt/steps;
      if(b.minDist>0){ b.minDist-=Math.sqrt(sdx*sdx+sdy*sdy); }

      // Platform collision
      for(const p of MAP.plats){
        if(b.x>p.x&&b.x<p.x+p.w&&b.y>p.y&&b.y<p.y+p.h){
          if(b.gren&&b.bn>0){
            b.bn--;
            if(Math.abs(b.vy)>Math.abs(b.vx)) b.vy*=-.52; else b.vx*=-.52;
            b.vy*=.72;
          } else if(b.gren){
            expl(b.x,b.y,95,b.dmg,b.own); hit=true;
          } else {
            holes.push({x:b.x,y:b.y,r:2+Math.random()*1.5,a:.8});
            if(holes.length>120) holes.shift();
            for(let k=0;k<3;k++) PA.push({x:b.x,y:b.y,vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3,lf:6,col:'#c0a030',sz:1.8,k:'s'});
            hit=true;
          }
          break;
        }
      }
      if(hit) break;

      // Skip entity check until bullet has traveled minimum distance
      if(b.minDist>0) continue;

      // Entity collision using swept segment test:
      // Check if bullet segment (prev→curr) passes through entity hitbox.
      // This catches fast bullets that skip over thin targets.
      const tgts=[p1,...bots].filter(e=>e&&!e.dead&&e!==b.own);
      const px=b.x-sdx, py=b.y-sdy; // previous position
      for(const tg of tgts){
        const cx2=tg.x+tg.w/2;
        const vtop=tg.y-25;          // top of helmet
        const vbot=tg.y+tg.h;        // bottom of feet
        const vleft=cx2-11;           // 22px wide hitbox
        const vright=cx2+11;
        // Quick AABB reject
        const minX=Math.min(b.x,px), maxX=Math.max(b.x,px);
        const minY=Math.min(b.y,py), maxY=Math.max(b.y,py);
        if(maxX<vleft||minX>vright||maxY<vtop||minY>vbot) continue;
        // Passed AABB — find closest point on segment to box center
        // and use that Y for zone calculation
        const hitY=Math.max(vtop,Math.min(vbot, b.y));
        const hitX=Math.max(vleft,Math.min(vright, b.x));
        if(b.gren){
          expl(hitX,hitY,95,b.dmg,b.own);
        } else {
          const rel=(hitY-vtop)/(vbot-vtop);
          const zone = rel<0.26 ? 'head' : rel<0.65 ? 'torso' : 'legs';
          let dmg=b.dmg;
          if(zone==='head')      dmg*=2.5;
          else if(zone==='legs') dmg*=0.65;
          tg.hp-=dmg; tg.vx+=b.vx*.06; tg.vy+=b.vy*.04; tg.fl=6;
          if(zone==='head' && b.own && b.own.isP){
              shake(5);
              addK(TX[lang].headshot+' +'+Math.round(dmg)+'dmg','#ff3030');
            }
            // no shake on regular hits - keeps game smooth
          for(let k=0;k<6;k++) PA.push({
            x:cx2, y:hitY,
            vx:(Math.random()-.5)*5, vy:(Math.random()-.5)*5-1,
            lf:12, col:'#cc1818', sz:2, k:'b'
          });
          PA.push({x:hitX,y:hitY-12,vx:0,vy:-1.2,
            lf:28,col:zone==='head'?'#ff4040':'#ffcc30',sz:0,k:'txt',
            val:Math.round(dmg),big:zone==='head'});
        }
        if(tg.hp<=0&&!tg.dead) handleDeath(tg,b.own,zone);
        hit=true; break;
      }
    }
    if(hit||b.life<=0||b.x<0||b.x>MW||b.y<0||b.y>MH+120) BL.splice(i,1);
  }
}

// ── Bot AI ───────────────────────────────────────────────────────
class Bot extends Ent{
  constructor(x,y,si){
    super(x,y,false);
    this.si=si;this.jcd=0;this.mdir=Math.random()>.5?1:-1;this.dt2=0;
    this.reactT=Math.random()*DIFF.rf;
    this.tX=0;this.tY=0;
    this.coverT=0;this.coverX=0;this.onCover=false;
  }
  ai(t,dt){
    this.uRld(t);this.dt2-=dt;this.reactT-=dt;this.coverT-=dt;
    // pick up weapon drops nearby
    for(let i=drops.length-1;i>=0;i--){
      const d=drops[i];
      if(Math.hypot(this.x-d.x,this.y-d.y)<30&&d.wi>this.wi){
        this.wp[d.wi]={...d.wp};this.wi=d.wi;drops.splice(i,1);break;
      }
    }
    if(!p1||p1.dead){this.phys(dt);return;}
    if(this.reactT<=0){
      this.reactT=DIFF.rf*(.6+Math.random()*.8);
      this.tX=p1.x+p1.w/2;this.tY=p1.y+p1.h/2;
    }
    const dx=this.tX-(this.x+this.w/2);
    const dy=this.tY-(this.y+this.h/2);
    const dist=Math.sqrt(dx*dx+dy*dy);
    // Bot aim: smooth lerp using sin/cos to avoid angle-wrap oscillation
    const targetAim=Math.atan2(dy,dx);
    const ta_sin=Math.sin(targetAim), ta_cos=Math.cos(targetAim);
    const ca_sin=Math.sin(this.aim),   ca_cos=Math.cos(this.aim);
    const spd=Math.min(0.06, 0.018*dt); // very slow, frame-rate independent
    const new_sin=ca_sin+(ta_sin-ca_sin)*spd;
    const new_cos=ca_cos+(ta_cos-ca_cos)*spd;
    this.aim=Math.atan2(new_sin,new_cos);
    // Facing direction with hysteresis
    if(dx>18)       this.fr=true;
    else if(dx<-18) this.fr=false;
    // Cover system: if low HP, look for nearby platform to hide behind
    if(this.hp<40&&this.coverT<=0){
      this.onCover=true;this.coverT=120;
      // move to the side of the player (flank or cover)
      this.coverX=this.x+(Math.random()>.5?120:-120);
    }
    if(this.onCover&&this.coverT>0){
      const cdx=this.coverX-(this.x+this.w/2);
      this.vx+=Math.sign(cdx)*.35*dt;this.mv=true;
      if(Math.abs(cdx)<30)this.onCover=false;
    }else{
      // Normal movement
      if(dist>DIFF.sd*.9){this.vx+=(dx>0?1:-1)*DIFF.ms*dt;this.mv=true;}
      else if(dist<110){this.vx-=(dx>0?1:-1)*DIFF.ms*.7*dt;this.mv=true;}
      else this.mv=false;
    }
    if(this.dt2<=0){this.dt2=60+Math.random()*80;if(Math.random()<.3)this.mdir*=-1;}
    this.vx+=this.mdir*.07*dt;this.vx=Math.max(-3.5,Math.min(3.5,this.vx));
    this.jcd-=dt;
    if(this.onG&&this.jcd<=0&&Math.random()<DIFF.jc){this.vy=-11;this.jcd=55;}
    // aim error applied at shoot time, not permanently on aim angle
    if(Math.random()<DIFF.sc&&dist<DIFF.sd){
      const savedAim=this.aim;
      this.aim+=((Math.random()-.5)*DIFF.ae);
      this.shoot([p1].filter(e=>!e.dead),t);
      this.aim=savedAim;
    }
    this.phys(dt);
  }
}

// ── Difficulty presets ───────────────────────────────────────────
function setDiff(l){
  if(l===0)      DIFF={sc:.010,sd:280,ms:.20,jc:.005,ae:.55,rf:120};
  else if(l===1) DIFF={sc:.016,sd:360,ms:.24,jc:.008,ae:.40,rf:80};
  else           DIFF={sc:.036,sd:540,ms:.40,jc:.015,ae:.12,rf:26};
}

// ── Camera ───────────────────────────────────────────────────────
function updCam(){
  if(!p1)return;
  let tx=p1.x+p1.w/2-GW/2,ty=p1.y+p1.h/2-GH/2;
  cam.x+=(tx-cam.x)*.1;cam.y+=(ty-cam.y)*.1;
  cam.x=Math.max(0,Math.min(MW-GW,cam.x));
  cam.y=Math.max(0,Math.min(MH-GH,cam.y));
}

// ── Ammo crates (static pickups on map) ─────────────────────────
let crates=[];
function spawnCrates(){
  crates=[];
  // Place crates on top of platforms, spread across map
  const platList=MAP.plats.filter(p=>p.t==='p'||p.t==='p2'||p.t==='ps');
  const positions=[0.15,0.3,0.5,0.65,0.8].map(f=>Math.floor(f*platList.length));
  for(const idx of positions){
    if(!platList[idx])continue;
    const p=platList[idx];
    crates.push({x:p.x+p.w/2,y:p.y-14,life:999,respawn:0,active:true});
  }
}
function updCrates(dt){
  for(const c of crates){
    if(!c.active){c.respawn-=dt;if(c.respawn<=0)c.active=true;continue;}
    if(p1&&!p1.dead&&!isDead&&Math.hypot(p1.x+p1.w/2-c.x,p1.y+p1.h-c.y)<32){
      // Refill ALL weapons ammo by half max
      for(const w of p1.wp) w.res=Math.min(w.maxA*3, w.res+Math.floor(w.maxA/2));
      addK('Munitie reincarcata!','#50ff80');
      c.active=false;c.respawn=1800; // 30 seconds respawn
    }
  }
}
function drawCrates(){
  for(const c of crates){
    if(!c.active)continue;
    const sx=c.x-cam.x+cam.shakeX,sy=c.y-cam.y+cam.shakeY;
    if(sx<-30||sx>GW+30)continue;
    // crate box
    cx.fillStyle='#604820';cx.fillRect(sx-10,sy-10,20,18);
    cx.fillStyle='#805830';cx.fillRect(sx-9,sy-9,18,16);
    // cross straps
    cx.strokeStyle='#402810';cx.lineWidth=1.5;
    cx.beginPath();cx.moveTo(sx-10,sy-1);cx.lineTo(sx+10,sy-1);cx.stroke();
    cx.beginPath();cx.moveTo(sx,sy-10);cx.lineTo(sx,sy+8);cx.stroke();
    // ammo icon
    cx.fillStyle='#ffe060';cx.font='bold 8px monospace';cx.textAlign='center';
    cx.fillText('AMO',sx,sy+2);cx.textAlign='left';
    // glow pulse
    cx.globalAlpha=.2+Math.sin(Date.now()*.004)*.15;
    cx.strokeStyle='#80ff80';cx.lineWidth=2;
    cx.beginPath();cx.arc(sx,sy-1,13,0,Math.PI*2);cx.stroke();
    cx.globalAlpha=1;
  }
}
function updDrops(dt){
  for(let i=drops.length-1;i>=0;i--){
    const d=drops[i];
    d.life-=dt;
    if(d.life<=0){drops.splice(i,1);continue;}
    // p1 picks up — bigger radius, auto-pickup always
    if(p1&&!p1.dead&&!isDead&&Math.hypot(p1.x+p1.w/2-d.x,p1.y+p1.h/2-d.y)<36){
      const pw=p1.wp[d.wi];
      if(d.wi===p1.wi){
        // same weapon — refill ammo
        const gained=Math.min(pw.maxA-pw.ammo, d.wp.ammo)+Math.min(pw.res, d.wp.res);
        pw.ammo=Math.min(pw.maxA, pw.ammo+d.wp.ammo);
        pw.res=Math.min(pw.maxA*3, pw.res+d.wp.res);
        if(gained>0)addK('+'+d.wp.ammo+' '+d.nm+' ammo','#ffdd50');
      }else{
        // different weapon — take it, add ammo
        pw.ammo=Math.min(pw.maxA, pw.ammo+d.wp.ammo);
        pw.res=Math.min(pw.maxA*3, pw.res+d.wp.res);
        if(pw.ammo>0)addK('Luat '+d.nm,'#ffdd50');
      }
      drops.splice(i,1);
    }
  }
}

// ── Input ────────────────────────────────────────────────────────
let joyX=0,joyY=0; // mobile joystick
function inp1(dt,t){
  if(!p1||p1.dead||isDead)return;
  // Keyboard movement
  let mv=false;
  if(keys['KeyA']||keys['ArrowLeft']) {p1.vx-=.44*dt;mv=true;}
  if(keys['KeyD']||keys['ArrowRight']){p1.vx+=.44*dt;mv=true;}
  // Mobile joystick
  if(Math.abs(joyX)>.15){p1.vx+=joyX*.5*dt;mv=true;}
  if((keys['KeyW']||keys['ArrowUp']||keys['Space'])&&p1.onG)p1.vy=-11;
  p1.mv=mv;p1.vx=Math.max(-5,Math.min(5,p1.vx));
  // Aim from mouse
  const sxm=p1.fr?1:-1;
  const fX=p1.x+p1.w/2-cam.x,fY=p1.y+p1.h-cam.y;
  const psx=fX+sxm*6,psy=fY-33;
  p1.aim=Math.atan2(mouse.y-psy,mouse.x-psx);
  // Flip with dead-zone — 15px hysteresis prevents jitter
  const ddx=mouse.x-fX;
  if(ddx>15) p1.fr=true;
  else if(ddx<-15) p1.fr=false;
  // Shoot
  const sh=s1m||keys['KeyZ']||keys['KeyF']||keys['ControlLeft']||keys['ControlRight'];
  const md=p1.w0.mode||'single';
  const canShoot=md==='auto'?sh:(sh&&!s1h)||(md==='burst'&&(p1._bl||0)>0);
  if(canShoot){
    p1.shoot([...bots].filter(e=>!e.dead),t);
    if(md==='burst'){p1._bl=(p1._bl||0)>0?p1._bl-1:2;}
  }
  if(!sh)p1._bl=0;
  s1h=sh;
  // Manual reload with R (or if ammo=0 and reserve>0, auto-reload on shoot attempt)
  if(keys['KeyR']&&!p1.rld)p1.sRld(t);
  if(keys['Digit1'])selW(0);if(keys['Digit2'])selW(1);
  if(keys['Digit3'])selW(2);if(keys['Digit4'])selW(3);
  p1.uRld(t);p1.phys(dt);
}
function selW(i){
  if(!p1)return;
  p1.wi=i;
  ['wb0','wb1','wb2','wb3'].forEach((id,idx)=>{
    document.getElementById(id).className='wbtn'+(idx===i?' act':'');
  });
}

// ── Mobile controls ──────────────────────────────────────────────
let joyActive=false,joyBase={x:0,y:0};
const joy=document.getElementById('joy');
const jstick=document.getElementById('jstick');
const R=55; // joystick radius
joy.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.touches[0];const r=joy.getBoundingClientRect();
  joyBase={x:r.left+r.width/2,y:r.top+r.height/2};
  joyActive=true;
},{passive:false});
joy.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(!joyActive)return;
  const t=e.touches[0];
  let dx=t.clientX-joyBase.x,dy=t.clientY-joyBase.y;
  const d=Math.sqrt(dx*dx+dy*dy);
  if(d>R){dx=dx/d*R;dy=dy/d*R;}
  jstick.style.transform='translate(calc(-50% + '+dx+'px), calc(-50% + '+dy+'px))';
  joyX=dx/R;joyY=dy/R;
  if(joyY<-.5&&p1&&p1.onG)p1.vy=-11; // jump on swipe up
},{passive:false});
joy.addEventListener('touchend',e=>{
  joyActive=false;joyX=0;joyY=0;
  jstick.style.transform='translate(-50%,-50%)';
},{passive:false});
function mfireDown(){s1m=true;}
function mfireUp(){s1m=false;}
function mjumpPress(){if(p1&&p1.onG)p1.vy=-11;}
function isMobile(){return window.innerWidth<700||navigator.maxTouchPoints>1;}

function selW(i){
  if(!p1)return; p1.wi=i;
  ['wb0','wb1','wb2','wb3'].forEach((id,j)=>{
    const el=document.getElementById(id);if(el)el.className='wbtn'+(j===i?' act':'');
  });
}


function genCode(){const w=['WOLF','HAWK','IRON','VIPER','BOLT','TANK','GHOST','STORM'];return w[Math.floor(Math.random()*w.length)]+'-'+Math.floor(1000+Math.random()*9000);}
function createRoom(){
  setSt(lang==='ro'?'Conectare...':'Connecting...');
  rcode=genCode();
  peer=new Peer('IF-'+rcode.replace('-','X'),{config:{iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]}});
  peer.on('open',()=>{
    document.getElementById('rcd').textContent=rcode;document.getElementById('rcd').style.display='block';
    document.getElementById('ctp').textContent=TX[lang].click;document.getElementById('ctp').style.display='block';
    setSt(TX[lang].waiting);isHost=true;peer.on('connection',c=>{conn=c;setupConn(true);});
  });
  peer.on('error',e=>setSt('Error: '+e.type));
}
function joinRoom(){
  const code=document.getElementById('jc').value.trim().toUpperCase();
  if(!code){setSt(lang==='ro'?'Introdu codul!':'Enter code!');return;}
  rcode=code;setSt(lang==='ro'?'Conectare...':'Connecting...');
  peer=new Peer(undefined,{config:{iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]}});
  peer.on('open',()=>{conn=peer.connect('IF-'+code.replace('-','X'),{reliable:false,serialization:'json'});setupConn(false);});
  peer.on('error',e=>setSt('Error: '+e.type));
}
function setupConn(host){
  conn.on('open',()=>{setSt(TX[lang].connected);document.getElementById('cst').textContent=lang==='ro'?'Conectat':'Connected';startOnline(host);});
  conn.on('data',handleNet);
  conn.on('close',()=>document.getElementById('cst').textContent=lang==='ro'?'Deconectat':'Disconnected');
}
function handleNet(d){
  if(!p1)return;
  if(d.tp==='ping'){conn.send({tp:'pong',id:d.id});return;}
  if(d.tp==='pong'){pms=Math.round(performance.now()-lping);document.getElementById('pg').textContent='ping '+pms+'ms';return;}
  if(d.tp==='st'&&gMode==='online-client'){
    // apply host state — p1 for host's player, shown as a bot visually
    if(d.p1&&bots[0]){const b=bots[0];b.x=d.p1.x;b.y=d.p1.y;b.vx=d.p1.vx;b.vy=d.p1.vy;b.hp=d.p1.hp;b.dead=d.p1.dead;b.fr=d.p1.fr;b.aim=d.p1.aim;b.wi=d.p1.wi;}
    if(d.bl)BL=[...BL.filter(b=>b.own===p1),...d.bl.map(b=>({...b,tr:[],trl:3,own:null}))];
    if(d.kills){kills=d.kills;}
  }
  if(d.tp==='in'&&gMode==='online-host'){
    // remote player input
    if(bots[0]&&!bots[0].dead){
      const rb=bots[0],k=d.k||{};
      if(k.L){rb.vx-=.44*(d.dt||1);rb.fr=false;}
      if(k.R){rb.vx+=.44*(d.dt||1);rb.fr=true;}
      if(k.U&&rb.onG)rb.vy=-11;
      rb.vx=Math.max(-5,Math.min(5,rb.vx));
      if(k.aim!==undefined)rb.aim=k.aim;
      if(k.S&&rb.w0&&(rb.w0.auto||!rb._sh))rb.shoot([p1,...bots.filter(b=>b!==rb&&!b.dead)],d.t||0);
      rb._sh=k.S;
      if(k.wi!==undefined)rb.wi=k.wi;
      if(k.rl)rb.sRld(d.t||0);
      rb.uRld(d.t||0);rb.phys(d.dt||1);
    }
  }
}
function sendNet(dt,t){
  if(!conn||!conn.open)return;ntick+=dt;
  if(gMode==='online-host'&&ntick>=2){ntick=0;
    conn.send({tp:'st',p1:{x:p1.x,y:p1.y,vx:p1.vx,vy:p1.vy,hp:p1.hp,dead:p1.dead,fr:p1.fr,aim:p1.aim,wi:p1.wi},
      bl:BL.filter(b=>b.own===p1).map(b=>({x:b.x,y:b.y,vx:b.vx,vy:b.vy,dmg:b.dmg,col:b.col,sz:b.sz,gren:b.gren,life:b.life,bn:b.bn})),kills});}
  if(gMode==='online-client'&&ntick>=1){ntick=0;
    const sxm=p1.fr?1:-1,fX=p1.x+p1.w/2-cam.x,fY=p1.y+p1.h-cam.y,psx=fX+sxm*6,psy=fY-33;
    conn.send({tp:'in',dt,t,k:{L:keys['KeyA'],R:keys['KeyD'],U:!!(keys['KeyW']||keys['Space']),
      S:!!(s1m||keys['KeyZ']||keys['KeyF']),aim:p1.aim,wi:p1.wi,rl:!!keys['KeyR']}});}
}
setInterval(()=>{if(conn&&conn.open&&isHost){lping=performance.now();conn.send({tp:'ping',id:lping});}},2000);
function copyCode(){navigator.clipboard.writeText(rcode).then(()=>setSt(TX[lang].copied)).catch(()=>setSt(rcode));}
function setSt(m){document.getElementById('stm').textContent=m;}

// ── Game start ───────────────────────────────────────────────────
function startSolo(){
  const lvl=parseInt(document.getElementById('diff').value);
  setDiff(lvl);botCount=[2,4,6][lvl];
  MAP=MAPS[Math.floor(Math.random()*MAPS.length)];
  genBgObjects();
  const s=SPWN[0];p1=new Ent(s.x,s.y,true);
  p1.nm=document.getElementById('pn').value.trim().slice(0,10)||'TU';
  bots=[];
  for(let i=0;i<botCount;i++){const sp=SPWN[(i+1)%SPWN.length];const b=new Bot(sp.x,sp.y,i+1);bots.push(b);}
  kills=0;streak=0;BL=[];PA=[];EX=[];BD=[];holes=[];drops=[];crates=[];gSec=0;isDead=false;
  spawnCrates();
  document.getElementById('ov').style.display='none';
  if(isMobile())document.getElementById('mc').className='show';
  lts=0;gMode='solo';
}
function startOnline(host){
  isHost=host;gMode=host?'online-host':'online-client';
  MAP=MAPS[0];genBgObjects();
  const s=SPWN[0];p1=new Ent(s.x,s.y,true);
  p1.nm=document.getElementById('pn').value.trim().slice(0,10)||'TU';
  // Create one "remote player" bot slot
  const rb=new Bot(SPWN[1].x,SPWN[1].y,1);
  rb.nm=host?'P2':'HOST';rb.isP=true;
  bots=[rb];
  // Add AI bots for host
  if(host){setDiff(1);for(let i=0;i<3;i++){const sp=SPWN[i+2];bots.push(new Bot(sp.x,sp.y,i+2));}}
  kills=0;streak=0;bestStreak=0;deaths2=0;headshots2=0;totalShots=0;totalHits=0;
  BL=[];PA=[];EX=[];BD=[];holes=[];drops=[];pickups=[];gSec=0;isDead=false;
  spawnPickups();
  document.getElementById('ov').style.display='none';
  document.getElementById('ml').textContent=TX[lang].mlo;
  if(isMobile())document.getElementById('mc').className='show';
  lts=0;
}

// ── Menu BG ──────────────────────────────────────────────────────
function drawMenuBg(){
  const bw=bgcv.width,bh=bgcv.height;if(!bw||!bh)return;
  for(let y=0;y<bh;y+=4){const t=y/bh;bx.fillStyle='rgb('+Math.round(4+8*t)+','+Math.round(7+15*t)+','+Math.round(11+28*t)+')';bx.fillRect(0,y,bw,4);}
  bx.strokeStyle='rgba(26,50,92,.1)';bx.lineWidth=1;
  for(let y=0;y<bh;y+=55){bx.beginPath();bx.moveTo(0,y);bx.lineTo(bw,y);bx.stroke();}
  for(let i=0;i<52;i++){bx.globalAlpha=.26+Math.random()*.36;bx.fillStyle='#aaccff';bx.beginPath();bx.arc((i*137)%bw,(i*97)%bh*.62,Math.random()*1.2+.3,0,Math.PI*2);bx.fill();}
  bx.globalAlpha=1;
  // Silhouette soldiers
  bx.save();bx.translate(bw*.1,bh*.85);bx.globalAlpha=.1;drawSoldier(bx,true,0.1,0,true);bx.restore();
  bx.save();bx.translate(bw*.9,bh*.85);bx.globalAlpha=.1;drawSoldier(bx,false,-Math.PI+0.1,0,false);bx.restore();
  bx.globalAlpha=1;
}

// ── Main loop ────────────────────────────────────────────────────
function loop(ts){
  requestAnimationFrame(loop);
  // Clamp dt tightly — never more than 2 frames to prevent physics spikes on slow frames
  const dt=lts===0?1:Math.min((ts-lts)/16.667,2.0);
  lts=ts; const t=ts;
  // slowMo counter — purely visual (crosshair color), no effect on physics
  if(slowMo>0){ slowMo-=dt; if(slowMo<0) slowMo=0; }

  // Respawn timer
  if(isDead){
    respawnTimer-=dt/60;
    document.getElementById('rtimer').textContent=Math.max(0,Math.ceil(respawnTimer));
    if(respawnTimer<=0) doRespawn();
  }
  // Game logic — physics always at real speed
  if(p1&&!isDead){
    if(gMode==='solo'){
      inp1(dt,t);
      for(const b of bots) if(!b.dead) b.ai(t,dt);
      updBL(dt); updDrops(dt); updCrates(dt);
    }else if(gMode==='online-host'){
      inp1(dt,t);
      for(const b of bots.slice(1)) if(!b.dead) b.ai(t,dt);
      updBL(dt); updDrops(dt); sendNet(dt,t);
    }else if(gMode==='online-client'){
      inp1(dt,t); updBL(dt); sendNet(dt,t);
    }
    updCam();
  }
  for(let i=drops.length-1;i>=0;i--){ drops[i].life-=dt; if(drops[i].life<=0) drops.splice(i,1); }
  for(const h of holes) h.a=Math.max(0,h.a-.0003*dt);
  updateShake(dt);
  // Timer
  if(p1&&!isDead){gSec+=dt/60;const ms=Math.floor(gSec/60),ss=Math.floor(gSec%60);document.getElementById('ti').textContent=ms+':'+(ss<10?'0':'')+ss;}
  // Draw
  if(p1){
    drawBg(); drawBD(); drawPlats(); drawHoles();
    drawCrates(); drawDrops(); drawEX(dt); drawBullets(); drawPA(dt);
    for(const b of bots) if(!b.dead) b.draw();
    if(!p1.dead) p1.draw();
    drawMM(); updateHUD(); drawCrosshair();
  }
}

// ── Keyboard ────────────────────────────────────────────────────
window.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD'].includes(e.code))e.preventDefault();
});
window.addEventListener('keyup',e=>{keys[e.code]=false;});
// Mouse
window.addEventListener('mousemove',e=>{
  const r=cv.getBoundingClientRect();
  if(!r.width)return;
  mouse.x=(e.clientX-r.left)*(GW/r.width);
  mouse.y=(e.clientY-r.top)*(GH/r.height);
});
window.addEventListener('mousedown',e=>{if(e.button===0)s1m=true;});
window.addEventListener('mouseup',e=>{if(e.button===0)s1m=false;});
document.getElementById('gc').addEventListener('contextmenu',e=>e.preventDefault());
// Touch aim (non-joystick area = aim)
cv.addEventListener('touchmove',e=>{
  e.preventDefault();
  const r=cv.getBoundingClientRect();
  for(const t of e.touches){
    const tx=(t.clientX-r.left)*(GW/r.width);
    const ty=(t.clientY-r.top)*(GH/r.height);
    if(tx>GW*.35){mouse.x=tx;mouse.y=ty;} // right side = aim
  }
},{passive:false});
// ── Init ─────────────────────────────────────────────────────────
requestAnimationFrame(loop);
resizeCV();
