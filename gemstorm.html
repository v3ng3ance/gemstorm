<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GemBlast ✦</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Raleway:wght@400;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

body{
  min-height:100vh;
  background:#07051a;
  color:#c8c8ff;
  font-family:'Raleway',sans-serif;
  display:flex;flex-direction:column;align-items:center;
  padding:16px 12px 40px;gap:12px;
  overflow-x:hidden;
}

/* animated starfield */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(1px 1px at 12% 18%,rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 34% 72%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 56% 40%,rgba(200,180,255,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 78% 85%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 90% 25%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 23% 55%,rgba(180,160,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 67% 10%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 45% 92%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(2px 2px at 8%  60%,rgba(160,140,255,.4) 0%,transparent 100%),
    radial-gradient(2px 2px at 82% 48%,rgba(200,180,255,.3) 0%,transparent 100%),
    radial-gradient(500px 500px at 50% 40%,rgba(30,10,80,.7) 0%,transparent 100%);
}

h1{
  position:relative;z-index:1;
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(1.3rem,4vw,2rem);
  background:linear-gradient(135deg,#ffd060,#f0a020,#ffd060);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:titleShimmer 3s linear infinite;
  letter-spacing:.12em;filter:drop-shadow(0 0 12px rgba(240,180,40,.5));
}
@keyframes titleShimmer{to{background-position:200% center}}

.sub{position:relative;z-index:1;font-size:.6rem;letter-spacing:.3em;color:#4040a0;text-transform:uppercase;}

.layout{
  position:relative;z-index:1;
  display:flex;gap:16px;align-items:flex-start;
  flex-wrap:wrap;justify-content:center;width:100%;max-width:720px;
}

/* ── SIDE PANEL ── */
.panel{display:flex;flex-direction:column;gap:10px;width:134px;}
.sbox{
  background:linear-gradient(160deg,#141428,#0e0e22);
  border:1px solid #252550;border-radius:12px;padding:11px 14px;text-align:center;
  box-shadow:0 4px 20px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.05);
}
.slabel{font-size:.54rem;letter-spacing:.28em;text-transform:uppercase;color:#4a4a90;margin-bottom:3px;}
.sval{
  font-family:'Cinzel Decorative',serif;font-size:1.35rem;
  background:linear-gradient(135deg,#ffd060,#f0a020);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.lvlbg{height:6px;background:#10103a;border-radius:3px;margin-top:7px;overflow:hidden;
  box-shadow:inset 0 1px 3px rgba(0,0,0,.5);}
.lvlbar{height:100%;background:linear-gradient(90deg,#6030ff,#f0c040);border-radius:3px;
  transition:width .5s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 8px rgba(100,60,255,.8);}
.btn{
  background:linear-gradient(160deg,#1c0c4a,#140a30);
  border:1px solid #302870;color:#a0a0e0;
  font-family:'Raleway',sans-serif;font-size:.64rem;letter-spacing:.14em;
  text-transform:uppercase;padding:10px;border-radius:9px;cursor:pointer;
  transition:all .18s;width:100%;
  box-shadow:0 3px 12px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.06);
}
.btn:hover{background:linear-gradient(160deg,#2c1c6a,#1c1240);border-color:#a080ff;color:#fff;transform:translateY(-1px);box-shadow:0 6px 20px rgba(80,40,200,.4);}
.btn:active{transform:translateY(0);}
.btn.gold{border-color:#c09020;color:#f0c040;background:linear-gradient(160deg,#2a1800,#1a1000);}
.btn.gold:hover{border-color:#f0c040;box-shadow:0 6px 20px rgba(200,150,20,.3);}

/* ── BOARD WRAPPER ── */
.board-wrap{
  position:relative;
  background:linear-gradient(160deg,#0c0820,#070514);
  border:1px solid #1e1a40;
  border-radius:16px;
  padding:10px;
  box-shadow:
    0 0 0 1px rgba(100,60,255,.15),
    0 0 60px rgba(50,20,140,.6),
    0 20px 60px rgba(0,0,0,.6),
    inset 0 1px 0 rgba(255,255,255,.06);
}

#board{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  gap:4px;
  position:relative;
}

/* ── CELL ── */
.cell{
  width:var(--cs);height:var(--cs);
  position:relative;
  border-radius:8px;
  background:rgba(255,255,255,.02);
  cursor:pointer;
  transition:background .1s;
}
.cell:hover{background:rgba(255,255,255,.05);}

/* ── GEM BASE ── */
.gem{
  position:absolute;
  inset:4%;
  border-radius:4px;
  will-change:transform,opacity;
  overflow:visible;
}
/* SVG fills the gem div */
.gem svg{
  width:100%;height:100%;
  display:block;
  filter:drop-shadow(0 2px 6px rgba(0,0,0,.5));
  overflow:visible;
}
/* hover brighten via SVG filter */
.cell:hover .gem svg{
  filter:drop-shadow(0 2px 6px rgba(0,0,0,.4)) brightness(1.25) saturate(1.15);
}

/* ── SELECTED ── */
@keyframes selPulse{
  0%,100%{filter:drop-shadow(0 0 6px rgba(255,255,255,.9)) drop-shadow(0 0 12px rgba(255,255,255,.5))}
  50%    {filter:drop-shadow(0 0 8px #f0c040) drop-shadow(0 0 20px rgba(240,192,64,.7))}
}
.cell.sel .gem{
  transform:scale(1.18);
  z-index:5;
}
.cell.sel .gem svg{
  animation:selPulse .7s ease-in-out infinite;
}

/* ── HINT ── */
@keyframes hintBounce{
  0%,100%{transform:scale(1) rotate(0deg)}
  25%    {transform:scale(1.2) rotate(-8deg)}
  75%    {transform:scale(1.2) rotate(8deg)}
}
.cell.hint .gem{animation:hintBounce .45s ease-in-out 3;}

/* ── EXPLODE ── */
@keyframes gemExplode{
  0%  {transform:scale(1);   opacity:1}
  30% {transform:scale(1.5); opacity:1}
  60% {transform:scale(1.9); opacity:.4}
  100%{transform:scale(.05); opacity:0}
}
.gem.exploding{
  animation:gemExplode .38s cubic-bezier(.4,0,1,1) forwards;
  z-index:10;
}
.gem.exploding svg{
  filter:drop-shadow(0 0 16px var(--gem-glow,#fff)) brightness(3) saturate(2) !important;
}

/* ── FALL ── */
@keyframes gemFall{
  0%  {transform:translateY(var(--fall-from)) scaleY(.7) scaleX(1.2);opacity:0}
  60% {transform:translateY(4px) scaleY(1.06) scaleX(.97);opacity:1}
  80% {transform:translateY(-3px) scaleY(.97) scaleX(1.02)}
  100%{transform:translateY(0) scaleY(1) scaleX(1);opacity:1}
}
.gem.falling{animation:gemFall .42s cubic-bezier(.22,.6,.36,1) both;}

/* ── SWAP ── */
@keyframes gemSwap{
  0%  {transform:translate(0,0)                  scale(1)}
  40% {transform:translate(var(--sx),var(--sy))  scale(1.1)}
  100%{transform:translate(0,0)                  scale(1)}
}
.gem.swapping{animation:gemSwap .2s cubic-bezier(.4,0,.2,1) both;}

/* ── BONUS GEMS ── */
@keyframes flamePulse{
  0%,100%{filter:drop-shadow(0 0 8px #ff8800) drop-shadow(0 0 16px rgba(255,80,0,.4))}
  50%    {filter:drop-shadow(0 0 14px #ffcc00) drop-shadow(0 0 28px rgba(255,160,0,.7))}
}
.gem.flame svg{animation:flamePulse 1s ease-in-out infinite;}

@keyframes starSpin{
  0%,100%{filter:drop-shadow(0 0 8px #ffdd00) drop-shadow(0 0 20px rgba(255,220,0,.5))}
  50%    {filter:drop-shadow(0 0 14px #ffffff) drop-shadow(0 0 35px rgba(255,240,100,.8))}
}
.gem.star svg{animation:starSpin .8s ease-in-out infinite;}

@keyframes hyperRainbow{
  0%  {filter:drop-shadow(0 0 10px #ff4466) drop-shadow(0 0 22px rgba(255,40,80,.5))}
  25% {filter:drop-shadow(0 0 10px #44aaff) drop-shadow(0 0 22px rgba(40,150,255,.5))}
  50% {filter:drop-shadow(0 0 10px #44ffaa) drop-shadow(0 0 22px rgba(40,220,120,.5))}
  75% {filter:drop-shadow(0 0 10px #ff44ff) drop-shadow(0 0 22px rgba(200,40,255,.5))}
  100%{filter:drop-shadow(0 0 10px #ff4466) drop-shadow(0 0 22px rgba(255,40,80,.5))}
}
.gem.hyper svg{animation:hyperRainbow 1.2s linear infinite;}

/* bonus icon badge */
.bonus-icon{
  position:absolute;
  bottom:-1px;right:-1px;
  font-size:.55em;line-height:1;
  pointer-events:none;z-index:3;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,.8));
}

/* ── PARTICLES ── */
.spark{
  position:absolute;
  border-radius:50%;
  pointer-events:none;
  z-index:15;
  animation:sparkFly var(--dur,.5s) ease-out forwards;
}
@keyframes sparkFly{
  0%  {transform:translate(0,0) scale(1);opacity:1}
  100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}
}

/* ── SCORE POP ── */
@keyframes scoreFloat{
  0%  {transform:translateY(0)    scale(.6);opacity:1}
  20% {transform:translateY(-8px) scale(1.1);opacity:1}
  100%{transform:translateY(-55px) scale(.9);opacity:0}
}
.score-pop{
  position:absolute;pointer-events:none;
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(.75rem,.8rem,1rem);font-weight:700;
  background:linear-gradient(135deg,#fff8c0,#f0c040);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 6px rgba(240,192,64,.8));
  z-index:20;white-space:nowrap;
  animation:scoreFloat .85s cubic-bezier(.2,.8,.4,1) forwards;
}

/* ── COMBO BADGE ── */
@keyframes badgePop{
  0%  {transform:scale(0) rotate(-20deg);opacity:0}
  60% {transform:scale(1.2) rotate(3deg);opacity:1}
  100%{transform:scale(1)   rotate(0deg);opacity:1}
}
.combo-badge{
  position:absolute;top:-10px;right:-10px;
  background:linear-gradient(135deg,#ffd060,#ff6010);
  color:#000;font-family:'Cinzel Decorative',serif;
  font-size:.46rem;font-weight:900;padding:4px 10px;
  border-radius:20px;z-index:30;white-space:nowrap;
  animation:badgePop .4s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 3px 12px rgba(240,140,0,.5);
}

/* ── OVERLAY ── */
#overlay{
  display:none;position:absolute;inset:0;
  background:rgba(0,0,12,.92);
  border-radius:14px;flex-direction:column;align-items:center;
  justify-content:center;gap:14px;z-index:40;
  backdrop-filter:blur(4px);
}
#overlay.show{display:flex;}
#overlay h2{
  font-family:'Cinzel Decorative',serif;
  background:linear-gradient(135deg,#ffd060,#f0a020);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  font-size:1.4rem;text-align:center;
}
#overlay p{color:#5050a0;font-size:.82rem;text-align:center;}

@media(max-width:500px){
  .panel{flex-direction:row;width:100%;flex-wrap:wrap;}
  .sbox{flex:1;min-width:80px;}
  .btn{flex:1;min-width:80px;}
}
</style>
</head>
<body>
<h1>✦ GemBlast ✦</h1>
<p class="sub">Match 3 · Bonus Gems</p>

<div class="layout">
  <div class="panel">
    <div class="sbox">
      <div class="slabel">Scor</div>
      <div class="sval" id="elScore">0</div>
    </div>
    <div class="sbox">
      <div class="slabel">Nivel <span id="elLevel">1</span></div>
      <div class="lvlbg"><div class="lvlbar" id="elBar" style="width:0%"></div></div>
    </div>
    <div class="sbox">
      <div class="slabel">Record</div>
      <div class="sval" id="elBest">0</div>
    </div>
    <button class="btn gold" onclick="hint()">💡 Indiciu</button>
    <button class="btn" onclick="newGame()">↺ Joc Nou</button>
  </div>

  <div class="board-wrap" id="boardWrap">
    <div id="board"></div>
    <div id="overlay">
      <h2 id="ovTitle">Nicio mutare!</h2>
      <p id="ovSub"></p>
      <button class="btn gold" style="width:auto;padding:10px 24px" onclick="newGame()">Joacă din nou</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────
const R=8, C=8;
// ── GEM SVG DEFINITIONS ──────────────────────────────────
// Each gem type: unique faceted shape drawn in SVG with lighting simulation
const GEM_DEFS = [
  // 0 Ruby — octagon/diamond cut
  {
    name:'Ruby', glow:'#ff2255', shadow:'rgba(255,30,70,.8)',
    svg:(id)=>`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <defs>
        <radialGradient id="rg${id}" cx="38%" cy="30%" r="60%">
          <stop offset="0%" stop-color="#ffccd8"/>
          <stop offset="35%" stop-color="#ff3366"/>
          <stop offset="75%" stop-color="#cc0033"/>
          <stop offset="100%" stop-color="#6a0018"/>
        </radialGradient>
        <filter id="rf${id}"><feGaussianBlur stdDeviation="1.5" result="b"/><feComposite in="SourceGraphic" in2="b"/></filter>
      </defs>
      <!-- main octagon facets -->
      <polygon points="50,8 78,22 92,50 78,78 50,92 22,78 8,50 22,22" fill="url(#rg${id})"/>
      <!-- dark facets bottom-right -->
      <polygon points="50,92 78,78 92,50 50,50" fill="rgba(0,0,0,.25)"/>
      <polygon points="50,92 22,78 8,50 50,50"  fill="rgba(0,0,0,.12)"/>
      <!-- light facets top-left -->
      <polygon points="50,8 78,22 50,50"  fill="rgba(255,255,255,.18)"/>
      <polygon points="50,8 22,22 8,50 50,50" fill="rgba(255,255,255,.10)"/>
      <!-- center cross sparkle -->
      <polygon points="50,32 54,48 50,50 46,48" fill="rgba(255,255,255,.55)"/>
      <polygon points="68,50 52,54 50,50 52,46" fill="rgba(255,255,255,.35)"/>
      <!-- top highlight -->
      <ellipse cx="38" cy="28" rx="12" ry="8" fill="rgba(255,255,255,.5)" transform="rotate(-30,38,28)"/>
    </svg>`
  },
  // 1 Sapphire — hexagon
  {
    name:'Sapphire', glow:'#2266ff', shadow:'rgba(20,80,255,.8)',
    svg:(id)=>`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <defs>
        <radialGradient id="rg${id}" cx="35%" cy="28%" r="65%">
          <stop offset="0%" stop-color="#cce0ff"/>
          <stop offset="30%" stop-color="#3388ff"/>
          <stop offset="70%" stop-color="#0033cc"/>
          <stop offset="100%" stop-color="#001066"/>
        </radialGradient>
      </defs>
      <!-- hexagon -->
      <polygon points="50,6 88,28 88,72 50,94 12,72 12,28" fill="url(#rg${id})"/>
      <!-- facets -->
      <polygon points="50,94 88,72 88,28 50,50" fill="rgba(0,0,0,.22)"/>
      <polygon points="50,94 12,72 12,28 50,50"  fill="rgba(0,0,0,.10)"/>
      <polygon points="50,6 88,28 50,50"  fill="rgba(255,255,255,.20)"/>
      <polygon points="50,6 12,28 50,50"  fill="rgba(255,255,255,.12)"/>
      <!-- inner hex lines -->
      <polygon points="50,20 74,34 74,66 50,80 26,66 26,34" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="1"/>
      <!-- sparkle -->
      <polygon points="50,28 53,46 50,50 47,46" fill="rgba(255,255,255,.6)"/>
      <ellipse cx="36" cy="26" rx="11" ry="7" fill="rgba(255,255,255,.55)" transform="rotate(-25,36,26)"/>
    </svg>`
  },
  // 2 Emerald — rectangle cut
  {
    name:'Emerald', glow:'#22cc66', shadow:'rgba(20,190,70,.8)',
    svg:(id)=>`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <defs>
        <radialGradient id="rg${id}" cx="36%" cy="30%" r="62%">
          <stop offset="0%" stop-color="#ccffdd"/>
          <stop offset="30%" stop-color="#33dd77"/>
          <stop offset="68%" stop-color="#009944"/>
          <stop offset="100%" stop-color="#004422"/>
        </radialGradient>
      </defs>
      <!-- emerald cut octagon (stepped) -->
      <polygon points="35,8 65,8 90,30 90,70 65,92 35,92 10,70 10,30" fill="url(#rg${id})"/>
      <!-- step cuts -->
      <polygon points="40,15 60,15 80,33 80,67 60,85 40,85 20,67 20,33" fill="none" stroke="rgba(0,80,20,.3)" stroke-width="1.5"/>
      <polygon points="44,22 56,22 72,36 72,64 56,78 44,78 28,64 28,36" fill="none" stroke="rgba(0,80,20,.2)" stroke-width="1"/>
      <!-- dark facets -->
      <polygon points="65,92 90,70 90,30 65,8 50,50" fill="rgba(0,0,0,.20)"/>
      <!-- light facets -->
      <polygon points="35,8 65,8 50,50" fill="rgba(255,255,255,.22)"/>
      <polygon points="10,30 35,8 50,50" fill="rgba(255,255,255,.14)"/>
      <!-- highlight -->
      <ellipse cx="37" cy="27" rx="13" ry="8" fill="rgba(255,255,255,.52)" transform="rotate(-20,37,27)"/>
      <polygon points="50,26 54,45 50,50 46,45" fill="rgba(255,255,255,.5)"/>
    </svg>`
  },
  // 3 Topaz — teardrop / pear cut
  {
    name:'Topaz', glow:'#ffcc22', shadow:'rgba(240,180,0,.8)',
    svg:(id)=>`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <defs>
        <radialGradient id="rg${id}" cx="38%" cy="28%" r="60%">
          <stop offset="0%" stop-color="#fffacc"/>
          <stop offset="30%" stop-color="#ffdd44"/>
          <stop offset="68%" stop-color="#cc9900"/>
          <stop offset="100%" stop-color="#775500"/>
        </radialGradient>
      </defs>
      <!-- pear/teardrop shape -->
      <path d="M50,8 C72,8 88,26 88,48 C88,70 70,88 50,94 C30,88 12,70 12,48 C12,26 28,8 50,8Z" fill="url(#rg${id})"/>
      <!-- facets -->
      <path d="M50,8 C72,8 88,26 88,48 L50,50Z" fill="rgba(255,255,255,.18)"/>
      <path d="M12,48 C12,26 28,8 50,8 L50,50Z" fill="rgba(255,255,255,.10)"/>
      <path d="M88,48 C88,70 70,88 50,94 L50,50Z" fill="rgba(0,0,0,.22)"/>
      <path d="M50,94 C30,88 12,70 12,48 L50,50Z" fill="rgba(0,0,0,.12)"/>
      <!-- inner oval -->
      <ellipse cx="50" cy="52" rx="22" ry="26" fill="none" stroke="rgba(255,200,0,.2)" stroke-width="1.5"/>
      <!-- highlight -->
      <ellipse cx="37" cy="28" rx="12" ry="8" fill="rgba(255,255,255,.6)" transform="rotate(-25,37,28)"/>
      <polygon points="50,24 54,44 50,50 46,44" fill="rgba(255,255,255,.5)"/>
    </svg>`
  },
  // 4 Amethyst — marquise (oval pointed)
  {
    name:'Amethyst', glow:'#bb44ff', shadow:'rgba(160,20,255,.8)',
    svg:(id)=>`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <defs>
        <radialGradient id="rg${id}" cx="36%" cy="30%" r="64%">
          <stop offset="0%" stop-color="#f0ccff"/>
          <stop offset="30%" stop-color="#cc44ff"/>
          <stop offset="68%" stop-color="#8800cc"/>
          <stop offset="100%" stop-color="#440066"/>
        </radialGradient>
      </defs>
      <!-- marquise diamond shape -->
      <path d="M50,6 C68,14 90,28 90,50 C90,72 68,86 50,94 C32,86 10,72 10,50 C10,28 32,14 50,6Z" fill="url(#rg${id})"/>
      <!-- vertical ridge line facets -->
      <path d="M50,6 L90,50 L50,94 L50,50Z" fill="rgba(0,0,0,.2)"/>
      <path d="M50,6 L10,50 L50,94 L50,50Z" fill="rgba(0,0,0,.08)"/>
      <!-- top sheen -->
      <path d="M50,6 C68,14 90,28 90,50 L50,50Z" fill="rgba(255,255,255,.18)"/>
      <path d="M50,6 C32,14 10,28 10,50 L50,50Z" fill="rgba(255,255,255,.10)"/>
      <!-- inner oval cut -->
      <ellipse cx="50" cy="50" rx="20" ry="28" fill="none" stroke="rgba(220,150,255,.25)" stroke-width="1.5"/>
      <!-- highlight -->
      <ellipse cx="37" cy="27" rx="11" ry="7" fill="rgba(255,255,255,.58)" transform="rotate(-30,37,27)"/>
      <polygon points="50,22 53,44 50,50 47,44" fill="rgba(255,255,255,.55)"/>
    </svg>`
  },
  // 5 Amber — square princess cut
  {
    name:'Amber', glow:'#ff7722', shadow:'rgba(255,90,10,.8)',
    svg:(id)=>`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <defs>
        <radialGradient id="rg${id}" cx="35%" cy="30%" r="60%">
          <stop offset="0%" stop-color="#ffe0bb"/>
          <stop offset="30%" stop-color="#ff8833"/>
          <stop offset="68%" stop-color="#cc4400"/>
          <stop offset="100%" stop-color="#771100"/>
        </radialGradient>
      </defs>
      <!-- square with chamfered corners (princess cut) -->
      <polygon points="22,8 78,8 92,22 92,78 78,92 22,92 8,78 8,22" fill="url(#rg${id})"/>
      <!-- grid facet lines -->

      <line x1="92" y1="78" x2="78" y2="92" stroke="rgba(0,0,0,.12)" stroke-width="1"/>
      <line x1="8"  y1="78" x2="22" y2="92" stroke="rgba(0,0,0,.12)" stroke-width="1"/>
      <!-- dark right/bottom -->
      <polygon points="50,50 92,22 92,78 78,92 50,92" fill="rgba(0,0,0,.22)"/>
      <!-- light top/left -->
      <polygon points="50,50 8,22 22,8 78,8" fill="rgba(255,255,255,.18)"/>
      <!-- highlight -->
      <ellipse cx="33" cy="25" rx="14" ry="9" fill="rgba(255,255,255,.55)" transform="rotate(-20,33,25)"/>

    </svg>`
  },
  // 6 Aquamarine — trillion (triangle) cut
  {
    name:'Aquamarine', glow:'#33ddff', shadow:'rgba(0,190,220,.8)',
    svg:(id)=>`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <defs>
        <radialGradient id="rg${id}" cx="40%" cy="30%" r="62%">
          <stop offset="0%" stop-color="#ccffff"/>
          <stop offset="28%" stop-color="#44eeff"/>
          <stop offset="65%" stop-color="#00aacc"/>
          <stop offset="100%" stop-color="#004455"/>
        </radialGradient>
      </defs>
      <!-- trillion triangle with rounded tips -->
      <path d="M50,6 L90,80 C90,88 82,94 74,94 L26,94 C18,94 10,88 10,80 Z" fill="url(#rg${id})"/>
      <!-- inner triangle facet -->
      <polygon points="50,22 76,70 24,70" fill="none" stroke="rgba(0,200,230,.25)" stroke-width="1.5"/>
      <polygon points="50,36 64,62 36,62" fill="none" stroke="rgba(255,255,255,.15)" stroke-width="1"/>
      <!-- dark right facet -->
      <polygon points="50,50 90,80 74,94 50,94 50,50" fill="rgba(0,0,0,.2)"/>
      <!-- light left facet -->
      <polygon points="50,6 50,50 24,70 10,80" fill="rgba(255,255,255,.15)"/>
      <!-- top facet -->
      <polygon points="50,6 90,80 50,50" fill="rgba(255,255,255,.10)"/>
      <!-- highlight -->
      <ellipse cx="38" cy="28" rx="12" ry="7" fill="rgba(255,255,255,.58)" transform="rotate(-15,38,28)"/>
      <polygon points="50,18 54,42 50,50 46,42" fill="rgba(255,255,255,.55)"/>
    </svg>`
  },
];
const GN=GEM_DEFS.length;
const LVL=[0,500,1200,2200,3500,5200,7500,10500,14000,19000,99999];

// bonus encoding
const BF=100,BS=200,BH=300;
function gc(v){return v>=BH?0:v>=BS?v-BS:v>=BF?v-BF:v;}
function isB(v){return v>=BF;}

// pre-render SVG data URLs once (avoid regenerating every applyGem call)
let _svgCache={};
function getSVG(colorIdx, uid){
  const key=colorIdx+'_'+uid;
  if(!_svgCache[key]){
    const def=GEM_DEFS[colorIdx];
    const svgStr=def.svg(uid).trim();
    _svgCache[key]='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svgStr);
  }
  return _svgCache[key];
}

// ── STATE ─────────────────────────────────────────────────
let board=[], sel=null, busy=false, combo=0;
let score=0, best=+(localStorage.getItem('gb3')||0), level=1;
// DOM refs: cells[r][c] and gems[r][c]
let cells=[], gems=[];

// ── CELL SIZE ─────────────────────────────────────────────
let CS=52;
function calcCS(){
  const wrap=document.getElementById('boardWrap');
  const avail=Math.min(wrap.parentElement.clientWidth-160, 460);
  CS=Math.max(32, Math.floor((Math.max(avail,270)-3*7)/8));
  document.documentElement.style.setProperty('--cs', CS+'px');
}

// ── BUILD DOM BOARD (once) ────────────────────────────────
function buildDOM(){
  calcCS();
  initGemUIDs();
  const boardEl=document.getElementById('board');
  boardEl.innerHTML='';
  cells=[]; gems=[];
  for(let r=0;r<R;r++){
    cells.push([]); gems.push([]);
    for(let c=0;c<C;c++){
      const cell=document.createElement('div');
      cell.className='cell';
      const gem=document.createElement('div');
      gem.className='gem';
      cell.appendChild(gem);
      boardEl.appendChild(cell);
      cells[r].push(cell);
      gems[r].push(gem);
      // click handler
      ;(function(rr,cc){cell.addEventListener('click',()=>onClick(rr,cc));})(r,c);
    }
  }
}

// ── APPLY GEM VISUAL ──────────────────────────────────────
let _gemUID=0;
const _gemSlotID=[];
function initGemUIDs(){
  _gemSlotID.length=0;
  for(let r=0;r<R;r++){_gemSlotID.push([]);for(let c=0;c<C;c++)_gemSlotID[r].push(++_gemUID);}
}

function applyGem(r,c){
  const v=board[r][c];
  const el=gems[r][c];
  if(v===-1){
    el.innerHTML='';el.style.cssText='';el.className='gem';return;
  }
  const ci=gc(v);
  const def=GEM_DEFS[ci];
  const uid=_gemSlotID[r][c];
  const bonusClass=v>=BH?' hyper':v>=BS?' star':v>=BF?' flame':'';
  const icon=v>=BH?'💥':v>=BS?'⭐':v>=BF?'🔥':'';
  el.innerHTML=def.svg(uid)+(icon?`<span class="bonus-icon">${icon}</span>`:'');
  el.style.background='none';
  el.style.setProperty('--gem-glow',def.glow);
  el.style.setProperty('--gem-shadow',`0 4px 18px ${def.shadow},0 2px 8px rgba(0,0,0,.6)`);
  el.style.boxShadow='var(--gem-shadow)';
  el.className='gem'+bonusClass;
}

// ── GRID INIT ─────────────────────────────────────────────
function rg(){return Math.floor(Math.random()*GN);}
function makeBoard(){
  board=[];
  for(let r=0;r<R;r++){
    board.push([]);
    for(let c=0;c<C;c++){
      let v;
      do{v=rg();}while(
        (c>=2&&gc(board[r][c-1])===v&&gc(board[r][c-2])===v)||
        (r>=2&&gc(board[r-1][c])===v&&gc(board[r-2][c])===v)
      );
      board[r].push(v);
    }
  }
  // apply visuals to all cells
  for(let r=0;r<R;r++) for(let c=0;c<C;c++) applyGem(r,c);
}

// ── SELECTION ─────────────────────────────────────────────
function setSel(r,c){
  clearSel();
  sel=[r,c];
  cells[r][c].classList.add('sel');
}
function clearSel(){
  if(sel) cells[sel[0]][sel[1]].classList.remove('sel');
  sel=null;
}

// ── CLICK ─────────────────────────────────────────────────
function onClick(r,c){
  if(busy||board[r][c]===-1)return;
  if(!sel){setSel(r,c);return;}
  const[sr,sc]=sel;
  if(sr===r&&sc===c){clearSel();return;}
  if(Math.abs(sr-r)+Math.abs(sc-c)===1){
    clearSel();
    doSwap(sr,sc,r,c);
  } else {
    setSel(r,c);
  }
}

// ── SWAP ──────────────────────────────────────────────────
function doSwap(r1,c1,r2,c2){
  busy=true;
  const dx=(c2-c1)*(CS+3), dy=(r2-r1)*(CS+3);
  // animate both gems
  animSwap(r1,c1, dx, dy);
  animSwap(r2,c2,-dx,-dy);
  setTimeout(()=>{
    // swap data
    const t=board[r1][c1];board[r1][c1]=board[r2][c2];board[r2][c2]=t;
    applyGem(r1,c1); applyGem(r2,c2);
    const m=findMatches();
    if(!m){
      // swap back
      animSwap(r1,c1,-dx,-dy);
      animSwap(r2,c2, dx, dy);
      setTimeout(()=>{
        const t2=board[r1][c1];board[r1][c1]=board[r2][c2];board[r2][c2]=t2;
        applyGem(r1,c1); applyGem(r2,c2);
        busy=false;
      },200);
    } else {
      combo=0;
      resolve(m);
    }
  },200);
}

function animSwap(r,c,dx,dy){
  const g=gems[r][c];
  g.style.setProperty('--sx',dx+'px');
  g.style.setProperty('--sy',dy+'px');
  g.classList.remove('swapping');
  void g.offsetWidth; // reflow just this element
  g.classList.add('swapping');
  setTimeout(()=>g.classList.remove('swapping'),200);
}

// ── MATCH FINDING ─────────────────────────────────────────
function findMatches(){
  const hG=[],vG=[];
  for(let r=0;r<R;r++){
    for(let c=0;c<C-2;){
      const v=board[r][c];if(v===-1){c++;continue;}
      const vc=gc(v);let l=1;
      while(c+l<C&&board[r][c+l]!==-1&&gc(board[r][c+l])===vc)l++;
      if(l>=3){const cells=[];for(let k=0;k<l;k++)cells.push([r,c+k]);hG.push({cells,len:l,color:vc});}
      c+=l;
    }
  }
  for(let c=0;c<C;c++){
    for(let r=0;r<R-2;){
      const v=board[r][c];if(v===-1){r++;continue;}
      const vc=gc(v);let l=1;
      while(r+l<R&&board[r+l][c]!==-1&&gc(board[r+l][c])===vc)l++;
      if(l>=3){const cells=[];for(let k=0;k<l;k++)cells.push([r+k,c]);vG.push({cells,len:l,color:vc});}
      r+=l;
    }
  }
  if(!hG.length&&!vG.length)return null;

  const hMap=new Map(),vMap=new Map();
  for(const g of hG)for(const[r,c]of g.cells)hMap.set(r*C+c,g);
  for(const g of vG)for(const[r,c]of g.cells)vMap.set(r*C+c,g);

  const done=new Set(), result=[];
  // L/T → hyper
  for(const[k,hg]of hMap){
    if(vMap.has(k)&&!done.has(k)){
      const vg=vMap.get(k);
      const idx=new Set([...hg.cells,...vg.cells].map(([r,c])=>r*C+c));
      const cls=[...idx].map(i=>[Math.floor(i/C),i%C]);
      const piv=[Math.floor(k/C),k%C];
      result.push({type:'hyper',cells:cls,pivot:piv,color:hg.color});
      for(const i of idx)done.add(i);
    }
  }
  for(const g of hG){
    const rem=g.cells.filter(([r,c])=>!done.has(r*C+c));
    if(rem.length<3)continue;
    const piv=rem[Math.floor(rem.length/2)];
    const type=g.len>=5?'star':g.len===4?'flame':'normal';
    result.push({type,cells:rem,pivot:piv,color:g.color});
    for(const[r,c]of rem)done.add(r*C+c);
  }
  for(const g of vG){
    const rem=g.cells.filter(([r,c])=>!done.has(r*C+c));
    if(rem.length<3)continue;
    const piv=rem[Math.floor(rem.length/2)];
    const type=g.len>=5?'star':g.len===4?'flame':'normal';
    result.push({type,cells:rem,pivot:piv,color:g.color});
    for(const[r,c]of rem)done.add(r*C+c);
  }
  return result.length?result:null;
}

// ── CASCADE ───────────────────────────────────────────────
function expandBonus(r,c,v,dst){
  if(v>=BH){
    for(let cc=0;cc<C;cc++)dst.add(r*C+cc);
    for(let rr=0;rr<R;rr++)dst.add(rr*C+c);
  } else if(v>=BS){
    const col=v-BS;
    for(let rr=0;rr<R;rr++)for(let cc=0;cc<C;cc++)
      if(gc(board[rr][cc])===col)dst.add(rr*C+cc);
  } else if(v>=BF){
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
      const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<R&&nc>=0&&nc<C)dst.add(nr*C+nc);
    }
  }
}

function resolve(groups){
  combo++;
  let pts=0;
  for(const g of groups){
    const lb=g.cells.length>=5?4:g.cells.length===4?2:1;
    pts+=g.cells.length*10*lb;
  }
  pts=Math.round(pts*combo);
  score+=pts;
  if(score>best){best=score;localStorage.setItem('gb3',best);}
  updateUI();
  showScore(groups,pts,combo);

  // build destroy set
  const dst=new Set();
  const newB=[];
  for(const g of groups){
    for(const[r,c]of g.cells){
      dst.add(r*C+c);
      if(isB(board[r][c]))expandBonus(r,c,board[r][c],dst);
    }
    if(g.type!=='normal')newB.push({r:g.pivot[0],c:g.pivot[1],btype:g.type,color:g.color});
  }

  // explode
  let pending=0;
  for(const idx of dst){
    const r=Math.floor(idx/C),c=idx%C;
    if(board[r][c]!==-1)pending++;
  }
  if(!pending){gravity(dst,newB);return;}

  let done=0;
  for(const idx of dst){
    const r=Math.floor(idx/C),c=idx%C;
    if(board[r][c]===-1)continue;
    const g=gems[r][c];
    // spawn sparks before exploding
    spawnSparks(r,c,gc(board[r][c]));
    g.classList.remove('exploding');
    void g.offsetWidth;
    g.classList.add('exploding');
    board[r][c]=-1;
    setTimeout(()=>{
      applyGem(r,c);
      if(++done===pending){
        // place bonus gems
        for(const{r:br,c:bc,btype,color}of newB){
          if(board[br][bc]===-1){
            board[br][bc]=btype==='star'?BS+color:btype==='hyper'?BH:BF+color;
            dst.delete(br*C+bc);
          }
        }
        gravity(dst,[]);
      }
    },380);
  }
}

function gravity(matchSet,_){
  const step=CS+3;
  const jobs=[];
  for(let c=0;c<C;c++){
    const stack=[];
    for(let r=R-1;r>=0;r--)if(board[r][c]!==-1)stack.push(board[r][c]);
    while(stack.length<R)stack.push(rg());
    for(let r=R-1;r>=0;r--){
      const nv=stack[R-1-r];
      let eb=0;for(let rr=r+1;rr<R;rr++)if(matchSet.has(rr*C+c))eb++;
      const wasMatch=matchSet.has(r*C+c);
      board[r][c]=nv;
      if(wasMatch||eb>0){
        const fy=wasMatch?-(r+1)*step:-eb*step;
        jobs.push({r,c,fy,delay:(R-1-r)*20});
      }
    }
  }

  if(!jobs.length){chain();return;}

  // apply new visuals first (gems are hidden during fall start)
  for(const{r,c}of jobs) applyGem(r,c);

  let landed=0;
  for(const{r,c,fy,delay}of jobs){
    setTimeout(()=>{
      const g=gems[r][c];
      g.style.setProperty('--fall-from',fy+'px');
      g.classList.remove('falling');
      void g.offsetWidth;
      g.classList.add('falling');
      setTimeout(()=>{
        g.classList.remove('falling');
        if(++landed===jobs.length)chain();
      },380);
    },delay);
  }
}

function chain(){
  const nm=findMatches();
  if(nm){resolve(nm);}
  else{combo=0;busy=false;if(!hasMoves())noMoves();}
}

// ── PARTICLES / SCORE POPUP ───────────────────────────────
function showScore(groups,pts,combo){
  const wrap=document.getElementById('boardWrap');
  // remove old badge
  const old=wrap.querySelector('.combo-badge');if(old)old.remove();

  // score pop
  const allC=groups.flatMap(g=>g.cells);
  const mr=Math.round(allC.reduce((s,[r])=>s+r,0)/allC.length);
  const mc=Math.round(allC.reduce((s,[,c])=>s+c,0)/allC.length);
  const cell=cells[mr][mc];
  const cr=cell.getBoundingClientRect();
  const wr=wrap.getBoundingClientRect();
  const pop=document.createElement('div');
  pop.className='score-pop';
  const pre=groups.some(g=>g.type==='hyper')?'💥 ':groups.some(g=>g.type==='star')?'⭐ ':groups.some(g=>g.type==='flame')?'🔥 ':'';
  pop.textContent=pre+(combo>1?`×${combo} `:'')+'+'+pts;
  pop.style.left=(cr.left-wr.left+cr.width/2-20)+'px';
  pop.style.top=(cr.top-wr.top)+'px';
  wrap.appendChild(pop);
  setTimeout(()=>pop.remove(),850);

  // combo badge
  if(combo>1||groups.some(g=>g.type!=='normal')){
    const badge=document.createElement('div');
    badge.className='combo-badge';
    const isHy=groups.some(g=>g.type==='hyper');
    const isSt=groups.some(g=>g.type==='star');
    const isFl=groups.some(g=>g.type==='flame');
    badge.textContent=isHy?'💥 Hypercube!':isSt?'⭐ Star Gem!':isFl?'🔥 Flame Gem!':`${combo}× Combo!`;
    wrap.appendChild(badge);
    setTimeout(()=>badge.remove(),1400);
  }
}

// ── SPARKS ────────────────────────────────────────────────
function spawnSparks(r,c,colorIdx){
  const wrap=document.getElementById('boardWrap');
  const cell=cells[r][c];
  const cr=cell.getBoundingClientRect();
  const wr=wrap.getBoundingClientRect();
  const cx=cr.left-wr.left+cr.width/2;
  const cy=cr.top-wr.top+cr.height/2;
  const glow=GEM_DEFS[colorIdx].glow;
  const sparkColors=[glow,'#ffffff',glow,'#ffeeaa'];
  const count=10+Math.floor(Math.random()*6);
  for(let i=0;i<count;i++){
    const spark=document.createElement('div');
    spark.className='spark';
    const angle=Math.random()*Math.PI*2;
    const dist=22+Math.random()*38;
    const size=2+Math.random()*4;
    const dur=(.28+Math.random()*.3).toFixed(2);
    spark.style.cssText=`left:${cx}px;top:${cy}px;width:${size}px;height:${size}px;background:${sparkColors[i%4]};--dx:${(Math.cos(angle)*dist).toFixed(1)}px;--dy:${(Math.sin(angle)*dist).toFixed(1)}px;--dur:${dur}s;box-shadow:0 0 4px ${glow};`;
    wrap.appendChild(spark);
    setTimeout(()=>spark.remove(),+dur*1000+60);
  }
}

// ── HINT ─────────────────────────────────────────────────
function hint(){
  if(busy)return;
  const f=findHint();
  if(!f)return;
  const[[r1,c1],[r2,c2]]=f;
  cells[r1][c1].classList.add('hint');
  cells[r2][c2].classList.add('hint');
  setTimeout(()=>{
    cells[r1][c1].classList.remove('hint');
    cells[r2][c2].classList.remove('hint');
  },1200);
}
function findHint(){
  for(let r=0;r<R;r++)for(let c=0;c<C;c++){
    for(const[nr,nc]of[[r,c+1],[r+1,c]]){
      if(nr>=R||nc>=C)continue;
      const t=board[r][c];board[r][c]=board[nr][nc];board[nr][nc]=t;
      const ok=!!findMatches();
      board[nr][nc]=board[r][c];board[r][c]=t;
      if(ok)return[[r,c],[nr,nc]];
    }
  }
  return null;
}
function hasMoves(){
  for(let r=0;r<R;r++)for(let c=0;c<C;c++){
    for(const[nr,nc]of[[r,c+1],[r+1,c]]){
      if(nr>=R||nc>=C)continue;
      const t=board[r][c];board[r][c]=board[nr][nc];board[nr][nc]=t;
      const ok=!!findMatches();
      board[nr][nc]=board[r][c];board[r][c]=t;
      if(ok)return true;
    }
  }
  return false;
}

// ── UI ────────────────────────────────────────────────────
function updateUI(){
  document.getElementById('elScore').textContent=score.toLocaleString();
  document.getElementById('elBest').textContent=best.toLocaleString();
  const lv=LVL.findIndex(v=>score<v);
  const cl=Math.max(1,(lv<0?LVL.length-1:lv)-1);
  level=Math.max(level,cl);
  document.getElementById('elLevel').textContent=level;
  const lo=LVL[level-1]||0,hi=LVL[level]||99999;
  document.getElementById('elBar').style.width=Math.min(100,Math.round((score-lo)/(hi-lo)*100))+'%';
}
function noMoves(){
  document.getElementById('ovTitle').textContent='Nicio mutare!';
  document.getElementById('ovSub').textContent='Scor: '+score;
  document.getElementById('overlay').classList.add('show');
  setTimeout(()=>{document.getElementById('overlay').classList.remove('show');newGame();},2500);
}

// ── NEW GAME ─────────────────────────────────────────────
function newGame(){
  document.getElementById('overlay').classList.remove('show');
  score=0;level=1;combo=0;sel=null;busy=false;
  makeBoard();
  updateUI();
}

// ── INIT ─────────────────────────────────────────────────
buildDOM();
newGame();
window.addEventListener('resize',()=>{
  calcCS();
  // re-apply cell sizes (CSS var updates automatically)
});
</script>
