<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GemBlast ✦</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Raleway:wght@400;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

:root{
  --gold:#f0c040;
  --panel:#12122a;
  --border:#2a2a5a;
  --text:#c8c8ff;
  --dim:#5050a0;
  --cs:52px;
}

body{
  min-height:100vh;
  background:radial-gradient(ellipse 120% 80% at 50% 0%,#1a0a3a 0%,#0a0818 60%,#050510 100%);
  color:var(--text);
  font-family:'Raleway',sans-serif;
  display:flex;flex-direction:column;align-items:center;
  padding:14px 8px 40px;gap:10px;
  overflow-x:hidden;
}

/* stars bg */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(1px 1px at 10% 15%,rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 25% 65%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 40% 35%,rgba(200,180,255,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 60% 80%,rgba(255,255,255,.35) 0%,transparent 100%),
    radial-gradient(1px 1px at 75% 20%,rgba(255,255,255,.45) 0%,transparent 100%),
    radial-gradient(1px 1px at 88% 55%,rgba(200,180,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 50% 50%,rgba(255,255,255,.3) 0%,transparent 100%);
}

h1{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(1.2rem,4vw,1.8rem);
  letter-spacing:.12em;color:var(--gold);
  text-shadow:0 0 24px rgba(240,192,64,.7),0 0 60px rgba(240,192,64,.3);
  text-align:center;position:relative;z-index:1;
}
.subtitle{font-size:.6rem;letter-spacing:.25em;text-transform:uppercase;color:var(--dim);
  text-align:center;position:relative;z-index:1;}

/* ── MODE SELECT ────────────────────────────────────────────── */
.mode-screen{position:relative;z-index:1;width:100%;max-width:500px;
  display:flex;flex-direction:column;align-items:center;gap:14px;}
.mode-intro{font-size:.62rem;letter-spacing:.28em;text-transform:uppercase;color:var(--dim);}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;}
.mode-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;
  padding:16px 12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;
  transition:all .2s;text-align:center;}
.mode-card:hover{border-color:#6040ff;box-shadow:0 0 20px rgba(80,40,200,.4);transform:translateY(-2px);}
.mode-icon{font-size:1.8rem;}
.mode-title{font-family:'Cinzel Decorative',serif;font-size:.68rem;color:var(--gold);}
.mode-desc{font-size:.58rem;color:var(--dim);line-height:1.45;}

/* ── GAME LAYOUT ──────────────────────────────────────────────*/
.game-wrap{display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap;justify-content:center;
  position:relative;z-index:1;width:100%;max-width:760px;}
.side-panel{display:flex;flex-direction:column;gap:10px;min-width:120px;max-width:140px;flex:1;}
.stat-box{background:var(--panel);border:1px solid var(--border);border-radius:12px;
  padding:10px 12px;text-align:center;}
.stat-label{font-size:.54rem;letter-spacing:.28em;text-transform:uppercase;color:var(--dim);margin-bottom:3px;}
.stat-val{font-family:'Cinzel Decorative',serif;font-size:1.3rem;color:var(--gold);}
.stat-val.timer-low{color:#ff4444!important;animation:timerPulse .5s ease-in-out infinite;}
@keyframes timerPulse{0%,100%{opacity:1}50%{opacity:.5}}
.level-bar-wrap{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:10px 12px;}
.level-bar-bg{height:6px;background:#1e1e40;border-radius:3px;margin-top:6px;overflow:hidden;}
.level-bar-fill{height:100%;background:linear-gradient(90deg,#8060ff,#f0c040);
  border-radius:3px;transition:width .5s ease;}
.btn{background:linear-gradient(135deg,#2a1a60,#1a0a40);border:1px solid var(--border);
  color:var(--text);font-family:'Raleway',sans-serif;font-size:.68rem;letter-spacing:.16em;
  text-transform:uppercase;padding:8px 12px;border-radius:8px;cursor:pointer;transition:all .2s;width:100%;}
.btn:hover{background:linear-gradient(135deg,#3a2a80,#2a1a60);color:#fff;}
.btn.gold{background:linear-gradient(135deg,#6a4a00,#4a3000);border-color:var(--gold);color:var(--gold);}

/* ── BOARD ────────────────────────────────────────────────────*/
.board-wrap{
  position:relative;
  border:2px solid #3a3a7a;
  border-radius:16px;
  padding:8px;
  background:radial-gradient(ellipse at 50% 30%,#1a1040 0%,#080618 100%);
  box-shadow:
    0 0 0 1px rgba(100,80,200,.3),
    0 0 60px rgba(60,20,160,.5),
    inset 0 0 60px rgba(0,0,0,.6);
}
#board{
  display:grid;
  grid-template-columns:repeat(8,var(--cs));
  grid-template-rows:repeat(8,var(--cs));
  gap:3px;
  position:relative;
}

/* ── CELL ─────────────────────────────────────────────────────*/
.cell{
  width:var(--cs);height:var(--cs);
  position:relative;
  cursor:pointer;
  border-radius:6px;
}
.cell::before{
  content:'';position:absolute;inset:0;border-radius:6px;
  background:rgba(255,255,255,.02);
}
.cell:hover .gem{filter:brightness(1.2) saturate(1.1);}

/* ── GEM ──────────────────────────────────────────────────────*/
.gem{
  position:absolute;
  inset:4%;
  border-radius:12%;
  will-change:transform,filter,opacity;
  transition:filter .1s;
  /* The SVG background is set via JS */
}

/* gem glow via drop-shadow — hardware accelerated */
.gem{filter:drop-shadow(0 3px 6px var(--glow,rgba(0,0,0,.5)));}

/* ── SELECTED ─────────────────────────────────────────────────*/
@keyframes selPulse{
  0%,100%{transform:scale(1.0);filter:drop-shadow(0 0 6px #fff) drop-shadow(0 0 12px var(--glow,#fff)) brightness(1.15);}
  50%    {transform:scale(1.12);filter:drop-shadow(0 0 10px #fff) drop-shadow(0 0 22px var(--glow,#fff)) brightness(1.3);}
}
.cell.sel .gem{animation:selPulse .65s ease-in-out infinite;}

/* ── HINT ─────────────────────────────────────────────────────*/
@keyframes hintBounce{
  0%,100%{transform:scale(1) rotate(0deg);}
  25%    {transform:scale(1.18) rotate(-8deg);}
  75%    {transform:scale(1.18) rotate(8deg);}
}
.cell.hint .gem{animation:hintBounce .5s ease-in-out 3;}

/* ── SWAP ─────────────────────────────────────────────────────*/
@keyframes swapH{
  0%    {transform:translate(0,0) scale(1);}
  40%   {transform:translate(var(--sdx),var(--sdy)) scale(1.12);}
  100%  {transform:translate(0,0) scale(1);}
}
.gem.swapping{animation:swapH .28s cubic-bezier(.4,0,.2,1) both;}

/* ── FALL ─────────────────────────────────────────────────────*/
@keyframes gemFall{
  0%  {transform:translateY(var(--fall-from)) scaleX(1.08) scaleY(.86);opacity:0;}
  55% {transform:translateY(4px) scaleX(.97) scaleY(1.04);opacity:1;}
  75% {transform:translateY(-3px) scaleX(1.02) scaleY(.98);}
  100%{transform:translateY(0) scaleX(1) scaleY(1);opacity:1;}
}
.gem.falling{animation:gemFall .42s cubic-bezier(.22,.6,.36,1) both;}

/* ── EXPLODE ──────────────────────────────────────────────────*/
@keyframes gemExplode{
  0%  {transform:scale(1);   opacity:1;}
  35% {transform:scale(1.55);opacity:.9;filter:drop-shadow(0 0 16px #fff) brightness(2.5);}
  65% {transform:scale(1.9); opacity:.4;}
  100%{transform:scale(.05); opacity:0;}
}
.gem.exploding{animation:gemExplode .44s cubic-bezier(.4,0,1,1) forwards!important;z-index:10;}

/* ── IDLE SHIMMER (bonus gems only) ──────────────────────────*/
@keyframes shimmer{
  0%,100%{filter:drop-shadow(0 0 8px var(--glow,#fff)) brightness(1);}
  50%    {filter:drop-shadow(0 0 18px var(--glow,#fff)) brightness(1.35) saturate(1.3);}
}
.gem.bonus-flame{animation:shimmer 1.1s ease-in-out infinite;}
.gem.bonus-star {animation:shimmer  .85s ease-in-out infinite;}
.gem.bonus-hyper{animation:shimmer 1.3s ease-in-out infinite;}
.gem.bonus-bomb {animation:shimmer  .7s ease-in-out infinite;}

/* ── PARTICLES ────────────────────────────────────────────────*/
.spark{
  position:absolute;
  border-radius:50%;
  pointer-events:none;
  z-index:20;
  animation:sparkFly var(--dur,.55s) ease-out forwards;
}
@keyframes sparkFly{
  0%  {transform:translate(0,0) scale(1);opacity:1;}
  100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0;}
}
.spark.glow-ring{
  border-radius:50%;
  background:transparent;
  border:3px solid var(--col,#fff);
  animation:glowRing .55s ease-out forwards;
}
@keyframes glowRing{
  0%  {transform:translate(-50%,-50%) scale(.1);opacity:.9;}
  100%{transform:translate(-50%,-50%) scale(3.5);opacity:0;}
}

/* ── SCORE POPUP ─────────────────────────────────────────────*/
@keyframes scoreFloat{
  0%  {transform:translateY(0) scale(.5);opacity:1;}
  20% {transform:translateY(-10px) scale(1.15);opacity:1;}
  100%{transform:translateY(-55px) scale(.9);opacity:0;}
}
.score-pop{
  position:absolute;pointer-events:none;z-index:30;white-space:nowrap;
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(.7rem,.85rem,1.1rem);font-weight:700;
  color:#f0c040;
  text-shadow:0 0 8px rgba(240,192,64,.9);
  animation:scoreFloat .9s cubic-bezier(.2,.8,.4,1) forwards;
}

/* ── COMBO BADGE ─────────────────────────────────────────────*/
@keyframes badgePop{
  0%  {transform:scale(0) rotate(-15deg);opacity:0;}
  60% {transform:scale(1.2) rotate(3deg);opacity:1;}
  100%{transform:scale(1)   rotate(0deg);opacity:1;}
}
.combo-badge{
  position:absolute;top:-8px;right:-8px;
  background:linear-gradient(135deg,#f0c040,#ff7010);
  color:#000;font-family:'Cinzel Decorative',serif;
  font-size:.5rem;font-weight:900;
  padding:4px 10px;border-radius:20px;z-index:25;white-space:nowrap;
  animation:badgePop .42s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 3px 12px rgba(240,140,0,.5);
}

/* ── LEVEL UP BANNER ─────────────────────────────────────────*/
@keyframes luAnim{
  0%  {transform:translate(-50%,-50%) scale(0);opacity:0;}
  18% {transform:translate(-50%,-50%) scale(1.25);opacity:1;}
  75% {transform:translate(-50%,-50%) scale(1);opacity:1;}
  100%{transform:translate(-50%,-62%) scale(.85);opacity:0;}
}
.lu-banner{position:absolute;top:50%;left:50%;pointer-events:none;z-index:50;text-align:center;
  animation:luAnim 2s ease forwards;}
.lu-title{display:block;font-family:'Cinzel Decorative',serif;font-size:clamp(1.2rem,4vw,1.8rem);
  color:var(--gold);text-shadow:0 0 20px rgba(240,192,64,.8);white-space:nowrap;}
.lu-sub{display:block;font-size:.7rem;color:var(--gold);letter-spacing:.15em;margin-top:4px;}

/* ── TOOLTIP ─────────────────────────────────────────────────*/
.bonus-tip{position:absolute;background:rgba(10,6,30,.95);border:1px solid rgba(200,150,255,.4);
  border-radius:10px;padding:8px 12px;font-size:.68rem;color:#e0d0ff;line-height:1.5;
  z-index:60;pointer-events:none;max-width:160px;text-align:center;
  box-shadow:0 4px 20px rgba(0,0,0,.6);animation:tipIn .18s ease;white-space:nowrap;}
@keyframes tipIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.bonus-tip strong{display:block;margin-bottom:2px;font-family:'Cinzel Decorative',serif;
  font-size:.6rem;color:var(--gold);}
.area-hl{position:absolute;border-radius:4px;pointer-events:none;z-index:5;
  background:rgba(255,180,40,.18);box-shadow:inset 0 0 0 2px rgba(255,180,40,.5);}
.area-hl.cross-h{background:rgba(80,180,255,.18);box-shadow:inset 0 0 0 2px rgba(80,180,255,.5);}
.area-hl.cross-v{background:rgba(200,80,255,.18);box-shadow:inset 0 0 0 2px rgba(200,80,255,.5);}

/* ── OVERLAY ─────────────────────────────────────────────────*/
#message{display:none;position:absolute;inset:0;background:rgba(0,0,12,.9);
  border-radius:14px;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:40;
  backdrop-filter:blur(4px);}
#message.visible{display:flex;}
#message h2{font-family:'Cinzel Decorative',serif;color:var(--gold);font-size:1.3rem;text-align:center;}
#message p{color:var(--dim);font-size:.8rem;text-align:center;padding:0 16px;}
#message .btn{width:auto;padding:10px 26px;margin-top:4px;}

@media(max-width:560px){
  .game-wrap{flex-direction:column;align-items:center;}
  .side-panel{flex-direction:row;max-width:100%;min-width:0;flex-wrap:wrap;justify-content:center;width:100%;}
  .stat-box,.level-bar-wrap{flex:1;min-width:80px;}
  .btn{font-size:.6rem;padding:7px 10px;}
}
</style>
</head>
<body>
<h1>✦ GemBlast ✦</h1>
<p class="subtitle" id="subtitle">Match 3 · Bonus Gems</p>

<!-- MODE SELECT -->
<div id="modeScreen" class="mode-screen">
  <p class="mode-intro">Alege modul de joc</p>
  <div class="mode-grid">
    <button class="mode-card" onclick="startMode('classic')">
      <span class="mode-icon">♾️</span>
      <span class="mode-title">Clasic</span>
      <span class="mode-desc">Joc infinit fără limite.</span>
    </button>
    <button class="mode-card" onclick="startMode('moves')">
      <span class="mode-icon">🎯</span>
      <span class="mode-title">Mutări</span>
      <span class="mode-desc">30 de mutări. Maximizează scorul!</span>
    </button>
    <button class="mode-card" onclick="startMode('timer')">
      <span class="mode-icon">⏱️</span>
      <span class="mode-title">Timp</span>
      <span class="mode-desc">60 secunde. Fiecare match adaugă timp!</span>
    </button>
    <button class="mode-card" onclick="startMode('objective')">
      <span class="mode-icon">🏆</span>
      <span class="mode-title">Obiective</span>
      <span class="mode-desc">Colectează gem-uri specifice!</span>
    </button>
  </div>
</div>

<!-- GAME -->
<div id="gameWrap" class="game-wrap" style="display:none">
  <div class="side-panel">
    <div class="stat-box"><div class="stat-label">Scor</div><div class="stat-val" id="score-disp">0</div></div>
    <div class="level-bar-wrap">
      <div class="stat-label">Nivel <span id="level-disp">1</span></div>
      <div class="level-bar-bg"><div class="level-bar-fill" id="level-bar" style="width:0%"></div></div>
    </div>
    <div class="stat-box" id="box-moves" style="display:none"><div class="stat-label">Mutări</div><div class="stat-val" id="moves-disp">30</div></div>
    <div class="stat-box" id="box-timer" style="display:none"><div class="stat-label">Timp</div><div class="stat-val" id="timer-disp">60</div></div>
    <div class="stat-box" id="box-obj"   style="display:none"><div class="stat-label" id="obj-label">Obiectiv</div><div class="stat-val" id="obj-disp">0/20</div></div>
    <div class="stat-box"><div class="stat-label">Record</div><div class="stat-val" id="best-disp">0</div></div>
    <button class="btn gold" onclick="G.hint()">💡 Indiciu</button>
    <button class="btn" onclick="G.newGame()">↺ Restart</button>
    <button class="btn" onclick="backToMenu()">☰ Meniu</button>
  </div>
  <div class="board-wrap" id="boardWrap">
    <div id="board"></div>
    <div id="message">
      <h2 id="msg-title">Game Over</h2>
      <p id="msg-sub"></p>
      <button class="btn gold" onclick="G.newGame()">Joacă din nou</button>
      <button class="btn" onclick="backToMenu()" style="margin-top:4px">☰ Meniu</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  GEM DEFINITIONS — 7 SVG shapes matching Bejeweled 2 style
//  Each gem is a rich inline SVG with multi-layer gradients,
//  facet lines, specular highlights and depth shading.
// ═══════════════════════════════════════════════════════════════
const GEMS_SVG = [

// 0 — RED rounded square ──────────────────────────────────────
`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
<defs>
  <radialGradient id="r0" cx="36%" cy="30%" r="65%">
    <stop offset="0%" stop-color="#ffb0c0"/>
    <stop offset="28%" stop-color="#ff2244"/>
    <stop offset="70%" stop-color="#bb0022"/>
    <stop offset="100%" stop-color="#4a0010"/>
  </radialGradient>
  <radialGradient id="r0s" cx="30%" cy="25%" r="48%">

  </radialGradient>
</defs>
<rect x="8" y="8" width="84" height="84" rx="20" fill="url(#r0)"/>
<rect x="8" y="8" width="84" height="84" rx="20" fill="url(#r0d)"/>
<g stroke="rgba(255,255,255,.22)" stroke-width="1" fill="none">
  <rect x="22" y="22" width="56" height="56" rx="12"/>
  <line x1="22" y1="50" x2="78" y2="50"/>
  <line x1="50" y1="22" x2="50" y2="78"/>
</g>
<rect x="8" y="8" width="84" height="84" rx="20" fill="url(#r0s)"/>
<ellipse cx="26" cy="21" rx="8" ry="5" fill="rgba(255,255,255,.95)" transform="rotate(-28,26,21)"/>
</svg>`,

// 1 — BLUE diamond ────────────────────────────────────────────
`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
<defs>
  <linearGradient id="r1a" x1="25%" y1="5%" x2="75%" y2="95%">
    <stop offset="0%" stop-color="#b0d0ff"/>
    <stop offset="35%" stop-color="#2266ee"/>
    <stop offset="70%" stop-color="#0033bb"/>
    <stop offset="100%" stop-color="#001066"/>
  </linearGradient>
  <radialGradient id="r1s" cx="33%" cy="25%" r="45%">
    <stop offset="0%" stop-color="rgba(255,255,255,.95)"/>

  </radialGradient>
</defs>
<!-- crown top -->
<polygon points="50,6 84,36 50,48 16,36" fill="url(#r1a)"/>
<!-- pavilion -->
<polygon points="16,36 84,36 67,72 50,94 33,72" fill="url(#r1a)"/>
<!-- dark right pavilion -->
<polygon points="50,48 84,36 67,72 50,94" fill="rgba(0,0,60,.35)"/>
<!-- crown facet lines -->
<g stroke="rgba(255,255,255,.28)" stroke-width="1.1" fill="none">
  <line x1="50" y1="6"  x2="50" y2="48"/>
  <line x1="16" y1="36" x2="84" y2="36"/>
  <line x1="32" y1="21" x2="50" y2="48"/>
  <line x1="68" y1="21" x2="50" y2="48"/>
</g>
<g stroke="rgba(0,0,80,.25)" stroke-width="1" fill="none">
  <line x1="33" y1="72" x2="50" y2="48"/>
  <line x1="67" y1="72" x2="50" y2="48"/>
</g>
<!-- specular -->
<polygon points="50,6 84,36 50,48 16,36" fill="url(#r1s)" opacity=".9"/>
<ellipse cx="27" cy="20" rx="9" ry="5.5" fill="rgba(255,255,255,.95)" transform="rotate(-22,27,20)"/>
</svg>`,

// 2 — GREEN circle ────────────────────────────────────────────
`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
<defs>
  <radialGradient id="r2" cx="36%" cy="30%" r="64%">
    <stop offset="0%" stop-color="#aaffcc"/>
    <stop offset="28%" stop-color="#00dd55"/>

<circle cx="50" cy="50" r="42" fill="url(#r2)"/>

<g stroke="rgba(255,255,255,.18)" stroke-width="1" fill="none">
  <circle cx="50" cy="50" r="27"/>

</g>
<circle cx="50" cy="50" r="42" fill="url(#r2s)"/>
<ellipse cx="27" cy="22" rx="9" ry="5.5" fill="rgba(255,255,255,.95)" transform="rotate(-28,27,22)"/>

// glow color per gem type
const GEM_GLOW=['rgba(255,20,50,.8)','rgba(30,90,255,.8)','rgba(0,200,70,.8)',
                'rgba(230,185,0,.8)','rgba(170,30,255,.8)','rgba(255,90,0,.8)','rgba(200,200,200,.7)'];
const GEM_COLORS=[
  ['#ffb0c0','#ff2244','#bb0022','#4a0010'],
  ['#b0d0ff','#2266ee','#0033bb','#001066'],
  ['#aaffcc','#00dd55','#009933','#003d15'],
  ['#fff5aa','#ffcc00','#cc9900','#5a4000'],
  ['#f0aaff','#cc22ff','#8800cc','#300055'],
  ['#ffcc88','#ff7700','#cc4400','#551800'],
  ['#ffffff','#cccccc','#888888','#2a2a2a'],
];

// convert SVG string to data URL for use as background-image
function svgToDataURL(svg){
  return 'url("data:image/svg+xml,' + encodeURIComponent(svg) + '")';
}
// pre-build gem image URLs
const GEM_URLS = GEMS_SVG.map(s=>svgToDataURL(s));

// ═══════════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════════
const ROWS=8,COLS=8,GN=GEMS_SVG.length;
const LEVEL_THRESHOLDS=[0,500,1200,2200,3500,5200,7500,10500,14000,19000,99999];
const BF=100,BS=200,BH=300,BB=400;
function gColor(v){return v>=BB?v-BB:v>=BH?0:v>=BS?v-BS:v>=BF?v-BF:v;}
function isBonus(v){return v>=BF;}

// ═══ GAME MODE STATE ════════════════════════════════════════
let gameMode='classic';
let movesLeft=30,timerSec=60,timerInterval=null;
let objType=0,objTarget=20,objCount=0;
const BEST_KEY={classic:'gb_c',moves:'gb_m',timer:'gb_t',objective:'gb_o'};
function getBest(){return+(localStorage.getItem(BEST_KEY[gameMode])||0);}
function saveBest(v){localStorage.setItem(BEST_KEY[gameMode],v);}

// ═══ CELL SIZE ══════════════════════════════════════════════
let CS=52,GAP=3;
function calcCS(){
  const isMobile=window.innerWidth<=560;
  let avail=isMobile?window.innerWidth-24:Math.min(window.innerWidth-160,480);
  CS=Math.max(36,Math.min(Math.floor((avail-GAP*7)/8),64));
  document.documentElement.style.setProperty('--cs',CS+'px');
}
window.addEventListener('resize',()=>{clearTimeout(window._rt);window._rt=setTimeout(()=>{calcCS();},80);});
window.addEventListener('orientationchange',()=>setTimeout(calcCS,300));

// ═══ MODE NAV ═══════════════════════════════════════════════
function startMode(mode){
  gameMode=mode;
  document.getElementById('modeScreen').style.display='none';
  document.getElementById('gameWrap').style.display='flex';
  document.getElementById('subtitle').textContent=
    {classic:'Clasic',moves:'Mutări Limitate',timer:'Contra Timp',objective:'Obiective'}[mode];
  document.getElementById('box-moves').style.display=mode==='moves'?'':'none';
  document.getElementById('box-timer').style.display=mode==='timer'?'':'none';
  document.getElementById('box-obj').style.display=mode==='objective'?'':'none';
  calcCS();
  G.newGame();
}
function backToMenu(){
  clearInterval(timerInterval);timerInterval=null;
  busy=false;sel=null;
  document.getElementById('message').classList.remove('visible');
  document.getElementById('gameWrap').style.display='none';
  document.getElementById('modeScreen').style.display='flex';
}

// ═══ STATE ══════════════════════════════════════════════════
let board=[],sel=null,busy=false,combo=0,score=0,level=1;
let cells=[],gems=[];   // stable DOM refs

// ═══ BUILD BOARD (once per mode start) ══════════════════════
function buildBoard(){
  const el=document.getElementById('board');
  el.innerHTML='';
  cells=[];gems=[];
  for(let r=0;r<ROWS;r++){
    cells.push([]);gems.push([]);
    for(let c=0;c<COLS;c++){
      const cell=document.createElement('div');
      cell.className='cell';
      const gem=document.createElement('div');
      gem.className='gem';
      cell.appendChild(gem);
      el.appendChild(cell);
      cells[r].push(cell);
      gems[r].push(gem);
      ;(function(rr,cc){cell.addEventListener('click',()=>onCellClick(rr,cc));})(r,c);
    }
  }
}

// Apply visual to a gem DOM element
function applyGem(r,c){
  const v=board[r][c];
  const el=gems[r][c];
  if(v===-1){
    el.style.backgroundImage='none';el.style.background='none';
    el.className='gem';el.style.removeProperty('--glow');return;
  }
  const ci=gColor(v);
  const bt=v>=BB?'bomb':v>=BH?'hyper':v>=BS?'star':v>=BF?'flame':null;

  if(bt){
    let svg;
    if(bt==='hyper') svg=BONUS_SVGS.hyper();
    else if(bt==='bomb') svg=BONUS_SVGS.bomb(GEM_COLORS[ci]);
    else if(bt==='star') svg=BONUS_SVGS.star(GEM_COLORS[ci]);
    else svg=BONUS_SVGS.flame(GEM_COLORS[ci]);
    el.style.backgroundImage=svgToDataURL(svg);
  } else {
    el.style.backgroundImage=GEM_URLS[ci];
  }
  el.style.backgroundSize='100% 100%';
  el.style.backgroundRepeat='no-repeat';
  el.style.setProperty('--glow',GEM_GLOW[ci]);
  el.className='gem'+(bt?' bonus-'+bt:'');
}

// ═══ GRID INIT ══════════════════════════════════════════════
function rndGem(){return Math.floor(Math.random()*GN);}
function makeBoard(){
  board=[];
  for(let r=0;r<ROWS;r++){
    board.push([]);
    for(let c=0;c<COLS;c++){
      let v;
      do{v=rndGem();}while(
        (c>=2&&gColor(board[r][c-1])===v&&gColor(board[r][c-2])===v)||
        (r>=2&&gColor(board[r-1][c])===v&&gColor(board[r-2][c])===v)
      );
      board[r].push(v);
    }
  }
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)applyGem(r,c);
}

// ═══ SELECTION ══════════════════════════════════════════════
function setSel(r,c){
  clearSel();
  sel=[r,c];
  cells[r][c].classList.add('sel');
  if(isBonus(board[r][c]))showBonusTip(r,c,board[r][c]);
}
function clearSel(){
  if(sel)cells[sel[0]][sel[1]].classList.remove('sel');
  sel=null;clearAreaHL();clearBonusTip();
}

// ═══ INPUT ══════════════════════════════════════════════════
let _drag=null,_swiped=false;
const SWIPE_MIN=14;

function getRCFromEvent(clientX,clientY){
  const boardEl=document.getElementById('board');
  const rect=boardEl.getBoundingClientRect();
  const x=clientX-rect.left,y=clientY-rect.top;
  const step=CS+GAP;
  const c=Math.floor(x/step),r=Math.floor(y/step);
  if(r<0||r>=ROWS||c<0||c>=COLS)return null;
  return[r,c];
}

function onStart(cx,cy){
  if(busy)return;
  const rc=getRCFromEvent(cx,cy);if(!rc)return;
  if(board[rc[0]][rc[1]]===-1)return;
  _drag={r:rc[0],c:rc[1],x:cx,y:cy};_swiped=false;
}
function onMove(cx,cy){
  if(!_drag||busy)return;
  const dx=cx-_drag.x,dy=cy-_drag.y;
  if(!_swiped&&(Math.abs(dx)>SWIPE_MIN||Math.abs(dy)>SWIPE_MIN)){
    _swiped=true;
    const{r:r1,c:c1}=_drag;_drag=null;
    let r2=r1,c2=c1;
    if(Math.abs(dx)>Math.abs(dy)){c2=c1+(dx>0?1:-1);}
    else{r2=r1+(dy>0?1:-1);}
    if(r2>=0&&r2<ROWS&&c2>=0&&c2<COLS){clearSel();trySwap(r1,c1,r2,c2);}
  }
}
function onEnd(cx,cy){
  if(!_drag)return;
  const{r:r1,c:c1}=_drag;_drag=null;
  if(_swiped||busy)return;
  if(!sel){setSel(r1,c1);return;}
  const[sr,sc]=sel;
  if(sr===r1&&sc===c1){clearSel();return;}
  if(Math.abs(sr-r1)+Math.abs(sc-c1)===1){clearSel();trySwap(sr,sc,r1,c1);}
  else setSel(r1,c1);
}

// attach to board div
function attachInput(){
  const boardEl=document.getElementById('board');
  boardEl.addEventListener('mousedown',e=>{e.preventDefault();onStart(e.clientX,e.clientY);});
  boardEl.addEventListener('mousemove',e=>{if(_drag)onMove(e.clientX,e.clientY);});
  boardEl.addEventListener('mouseup',e=>onEnd(e.clientX,e.clientY));
  boardEl.addEventListener('mouseleave',()=>{if(_drag&&!_swiped){_drag=null;clearSel();}});
  boardEl.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];onStart(t.clientX,t.clientY);},{passive:false});
  boardEl.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0];onMove(t.clientX,t.clientY);},{passive:false});
  boardEl.addEventListener('touchend',e=>{e.preventDefault();const t=e.changedTouches[0];onEnd(t.clientX,t.clientY);},{passive:false});
  boardEl.addEventListener('touchcancel',()=>{_drag=null;clearSel();});
}

// ═══ SWAP ═══════════════════════════════════════════════════
const SW_DUR=290;  // ms

function trySwap(r1,c1,r2,c2){
  busy=true;
  const dx=(c2-c1)*(CS+GAP),dy=(r2-r1)*(CS+GAP);

  // animate both gems
  animSwapGem(r1,c1, dx, dy);
  animSwapGem(r2,c2,-dx,-dy);

  setTimeout(()=>{
    const v1=board[r1][c1],v2=board[r2][c2];
    const b1=isBonus(v1),b2=isBonus(v2);

    // ── bonus gem activation ──
    if(b1||b2){
      board[r1][c1]=v2;board[r2][c2]=v1;
      applyGem(r1,c1);applyGem(r2,c2);
      const dst=new Set();
      if(b1)expandBonus(r2,c2,v1,dst);
      if(b2)expandBonus(r1,c1,v2,dst);
      dst.add(r1*COLS+c1);dst.add(r2*COLS+c2);
      const pts=dst.size*40;
      combo=0;score+=pts;
      if(score>getBest())saveBest(score);
      updateUI();
      const lbl=v1>=BB||v2>=BB?'💣':v1>=BH||v2>=BH?'💥':v1>=BS||v2>=BS?'⭐':'🔥';
      showScorePop(r1,c1,lbl+' +'+pts);
      explodeDst(dst,()=>doGravity(dst));
      return;
    }

    // ── normal swap ──
    board[r1][c1]=v2;board[r2][c2]=v1;
    applyGem(r1,c1);applyGem(r2,c2);
    const m=findMatches();
    if(!m){
      // swap back
      animSwapGem(r1,c1,-dx,-dy);
      animSwapGem(r2,c2, dx, dy);
      setTimeout(()=>{
        board[r1][c1]=v1;board[r2][c2]=v2;
        applyGem(r1,c1);applyGem(r2,c2);
        busy=false;
      },SW_DUR);
      return;
    }
    combo=0;resolveMatches(m);
  },SW_DUR);
}

function animSwapGem(r,c,dx,dy){
  const g=gems[r][c];
  g.style.setProperty('--sdx',dx+'px');
  g.style.setProperty('--sdy',dy+'px');
  g.classList.remove('swapping');
  void g.offsetWidth;
  g.classList.add('swapping');
  setTimeout(()=>g.classList.remove('swapping'),SW_DUR+20);
}

// ═══ MATCH FINDING ══════════════════════════════════════════
function findMatches(){
  const hG=[],vG=[];
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS-2;){
      const v=board[r][c];if(v===-1){c++;continue;}
      const vc=gColor(v);let l=1;
      while(c+l<COLS&&board[r][c+l]!==-1&&gColor(board[r][c+l])===vc)l++;
      if(l>=3){const cells2=[];for(let k=0;k<l;k++)cells2.push([r,c+k]);hG.push({cells:cells2,len:l,color:vc});}
      c+=l;
    }
  }
  for(let c=0;c<COLS;c++){
    for(let r=0;r<ROWS-2;){
      const v=board[r][c];if(v===-1){r++;continue;}
      const vc=gColor(v);let l=1;
      while(r+l<ROWS&&board[r+l][c]!==-1&&gColor(board[r+l][c])===vc)l++;
      if(l>=3){const cells2=[];for(let k=0;k<l;k++)cells2.push([r+k,c]);vG.push({cells:cells2,len:l,color:vc});}
      r+=l;
    }
  }
  if(!hG.length&&!vG.length)return null;

  const hMap=new Map(),vMap=new Map();
  for(const g of hG)for(const[r,c]of g.cells)hMap.set(r*COLS+c,g);
  for(const g of vG)for(const[r,c]of g.cells)vMap.set(r*COLS+c,g);

  const done=new Set(),result=[];
  for(const[k,hg]of hMap){
    if(vMap.has(k)&&!done.has(k)){
      const vg=vMap.get(k);
      const idx=new Set([...hg.cells,...vg.cells].map(([r,c])=>r*COLS+c));
      const cls=[...idx].map(i=>[Math.floor(i/COLS),i%COLS]);
      const pivot=cls[Math.floor(cls.length/2)];
      result.push({type:'hyper',cells:cls,pivot,color:hg.color});
      for(const i of idx)done.add(i);
    }
  }
  for(const g of hG){
    const rem=g.cells.filter(([r,c])=>!done.has(r*COLS+c));
    if(rem.length<3)continue;
    const pivot=rem[Math.floor(rem.length/2)];
    const type=g.len>=6?'bomb':g.len>=5?'star':g.len===4?'flame':'normal';
    result.push({type,cells:rem,pivot,color:g.color});
    for(const[r,c]of rem)done.add(r*COLS+c);
  }
  for(const g of vG){
    const rem=g.cells.filter(([r,c])=>!done.has(r*COLS+c));
    if(rem.length<3)continue;
    const pivot=rem[Math.floor(rem.length/2)];
    const type=g.len>=6?'bomb':g.len>=5?'star':g.len===4?'flame':'normal';
    result.push({type,cells:rem,pivot,color:g.color});
    for(const[r,c]of rem)done.add(r*COLS+c);
  }
  return result.length?result:null;
}

// ═══ CASCADE ════════════════════════════════════════════════
function expandBonus(r,c,v,dst){
  if(v>=BB){for(let dr=-2;dr<=2;dr++)for(let dc=-2;dc<=2;dc++){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS)dst.add(nr*COLS+nc);}}
  else if(v>=BH){for(let cc=0;cc<COLS;cc++)dst.add(r*COLS+cc);for(let rr=0;rr<ROWS;rr++)dst.add(rr*COLS+c);}
  else if(v>=BS){const col=v-BS;for(let rr=0;rr<ROWS;rr++)for(let cc=0;cc<COLS;cc++)if(gColor(board[rr][cc])===col)dst.add(rr*COLS+cc);}
  else if(v>=BF){for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS)dst.add(nr*COLS+nc);}}
}

function resolveMatches(groups){
  combo++;
  let pts=0;
  for(const g of groups){
    const lb=g.cells.length>=6?8:g.cells.length>=5?4:g.cells.length===4?2:1;
    pts+=g.cells.length*10*lb;
  }
  pts=Math.round(pts*combo*(1+(level-1)*.1));
  const prevLv=level;
  score+=pts;if(score>getBest())saveBest(score);
  updateUI();if(level>prevLv)showLevelUp(level);
  if(gameMode==='moves'){movesLeft--;updateUI();if(movesLeft<=0)setTimeout(()=>endGame('Mutări Epuizate!'),800);}
  if(gameMode==='timer'){const tot=groups.reduce((s,g)=>s+g.cells.length,0);timerSec=Math.min(timerSec+Math.ceil(tot*.5),99);updateUI();}
  if(gameMode==='objective'){let cnt=0;for(const g of groups)if(g.color===objType)cnt+=g.cells.length;objCount=Math.min(objCount+cnt,objTarget);updateUI();if(objCount>=objTarget)setTimeout(()=>endGame('Obiectiv Completat! 🏆'),800);}

  const pre=groups.some(g=>g.type==='bomb')?'💣':groups.some(g=>g.type==='hyper')?'💥':groups.some(g=>g.type==='star')?'⭐':groups.some(g=>g.type==='flame')?'🔥':'';
  const allC=groups.flatMap(g=>g.cells);
  const mr=Math.round(allC.reduce((s,[r])=>s+r,0)/allC.length);
  const mc=Math.round(allC.reduce((s,[,c])=>s+c,0)/allC.length);
  showScorePop(mr,mc,pre+(combo>1?`×${combo} `:'')+'+'+pts);
  if(combo>1||groups.some(g=>g.type!=='normal'))showBadge(combo,groups);

  const dst=new Set(),newB=[];
  for(const g of groups){
    for(const[r,c]of g.cells){dst.add(r*COLS+c);if(isBonus(board[r][c]))expandBonus(r,c,board[r][c],dst);}
    if(g.type!=='normal')newB.push({r:g.pivot[0],c:g.pivot[1],btype:g.type,color:g.color});
  }

  explodeDst(dst,()=>{
    for(const{r:br,c:bc,btype,color}of newB){
      if(board[br][bc]===-1){
        board[br][bc]=btype==='bomb'?BB+color:btype==='star'?BS+color:btype==='hyper'?BH:BF+color;
        dst.delete(br*COLS+bc);
        applyGem(br,bc);
        // pop-in animation
        const g=gems[br][bc];
        g.style.transform='scale(0)';
        requestAnimationFrame(()=>{
          g.style.transition='transform .3s cubic-bezier(.34,1.56,.64,1)';
          g.style.transform='scale(1)';
          setTimeout(()=>{g.style.transition='';g.style.transform='';},320);
        });
      }
    }
    doGravity(dst);
  });
}

function explodeDst(dst,cb){
  let pending=0;
  for(const idx of dst){const r=Math.floor(idx/COLS),c=idx%COLS;if(board[r][c]!==-1)pending++;}
  if(!pending){cb();return;}
  let done2=0;
  for(const idx of dst){
    const r=Math.floor(idx/COLS),c=idx%COLS;
    if(board[r][c]===-1)continue;
    spawnParticles(r,c,gColor(board[r][c]));
    const g=gems[r][c];
    g.classList.remove('exploding');void g.offsetWidth;
    g.classList.add('exploding');
    board[r][c]=-1;
    setTimeout(()=>{
      applyGem(r,c);
      if(++done2===pending)cb();
    },450);
  }
}

function doGravity(matchSet){
  const step=CS+GAP;
  const jobs=[];
  for(let c=0;c<COLS;c++){
    const stack=[];
    for(let r=ROWS-1;r>=0;r--)if(board[r][c]!==-1)stack.push(board[r][c]);
    while(stack.length<ROWS)stack.push(rndGem());
    for(let r=ROWS-1;r>=0;r--){
      const nv=stack[ROWS-1-r];
      let eb=0;for(let rr=r+1;rr<ROWS;rr++)if(matchSet.has(rr*COLS+c))eb++;
      const wasMatch=matchSet.has(r*COLS+c);
      board[r][c]=nv;
      if(wasMatch||eb>0){
        const fy=wasMatch?-(r+1)*step:-eb*step;
        jobs.push({r,c,fy,delay:(ROWS-1-r)*22});
      }
    }
  }
  if(!jobs.length){checkChain();return;}
  for(const{r,c}of jobs)applyGem(r,c);
  let landed=0;
  for(const{r,c,fy,delay}of jobs){
    setTimeout(()=>{
      const g=gems[r][c];
      g.style.setProperty('--fall-from',fy+'px');
      g.classList.remove('falling');void g.offsetWidth;
      g.classList.add('falling');
      setTimeout(()=>{
        g.classList.remove('falling');
        if(++landed===jobs.length)checkChain();
      },450);
    },delay);
  }
}

function checkChain(){
  const nm=findMatches();
  if(nm){resolveMatches(nm);}
  else{combo=0;busy=false;if(!hasMoves())noMoves();}
}

// ═══ PARTICLES ══════════════════════════════════════════════
function spawnParticles(r,c,type){
  const wrap=document.getElementById('boardWrap');
  const boardEl=document.getElementById('board');
  const br=boardEl.getBoundingClientRect(),wr=wrap.getBoundingClientRect();
  const cellEl=cells[r][c];
  const cr=cellEl.getBoundingClientRect();
  const cx=cr.left-wr.left+cr.width/2;
  const cy=cr.top-wr.top+cr.height/2;
  const col=GEM_GLOW[type].replace('rgba(','').replace(',.8)','').replace(',.7)','').replace(',.9)','');
  const hexCol='rgb('+col+')';

  // glow ring
  const ring=document.createElement('div');
  ring.className='spark glow-ring';
  ring.style.cssText=`left:${cx}px;top:${cy}px;width:${CS}px;height:${CS}px;--col:${hexCol};`;
  wrap.appendChild(ring);
  setTimeout(()=>ring.remove(),580);

  // sparks
  const count=10+Math.floor(Math.random()*6);
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2;
    const d=22+Math.random()*38;
    const sz=3+Math.random()*5;
    const dur=(.3+Math.random()*.35).toFixed(2);
    const sp=document.createElement('div');
    sp.className='spark';
    sp.style.cssText=`left:${cx}px;top:${cy}px;width:${sz}px;height:${sz}px;`+
      `background:${i%3===0?'#fff':hexCol};`+
      `box-shadow:0 0 ${sz+2}px ${hexCol};`+
      `--dx:${(Math.cos(a)*d).toFixed(1)}px;--dy:${(Math.sin(a)*d).toFixed(1)}px;--dur:${dur}s;`;
    wrap.appendChild(sp);
    setTimeout(()=>sp.remove(),+dur*1000+60);
  }
}

// ═══ HINT ═══════════════════════════════════════════════════
function findHint(){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    for(const[nr,nc]of[[r,c+1],[r+1,c]]){
      if(nr>=ROWS||nc>=COLS)continue;
      const t=board[r][c];board[r][c]=board[nr][nc];board[nr][nc]=t;
      const ok=!!findMatches();
      board[nr][nc]=board[r][c];board[r][c]=t;
      if(ok)return[[r,c],[nr,nc]];
    }
  }
  return null;
}
function hasMoves(){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    for(const[nr,nc]of[[r,c+1],[r+1,c]]){
      if(nr>=ROWS||nc>=COLS)continue;
      const t=board[r][c];board[r][c]=board[nr][nc];board[nr][nc]=t;
      const ok=!!findMatches();
      board[nr][nc]=board[r][c];board[r][c]=t;
      if(ok)return true;
    }
  }
  return false;
}

// ═══ BONUS TIP + AREA HIGHLIGHT ════════════════════════════
let _tipEl=null,_hlEls=[];
function clearBonusTip(){if(_tipEl){_tipEl.remove();_tipEl=null;}}
function clearAreaHL(){_hlEls.forEach(e=>e.remove());_hlEls=[];}
function showBonusTip(r,c,v){
  clearBonusTip();
  const TIPS={
    flame:{n:'🔥 Flacără',d:'Swipe spre vecin → explozie 3×3'},
    star: {n:'⭐ Star Gem',d:'Swipe spre vecin → distruge toată culoarea'},
    hyper:{n:'💥 Cruce',  d:'Swipe spre vecin → rând + coloană'},
    bomb: {n:'💣 Bombă',  d:'Swipe spre vecin → explozie 5×5'},
  };
  const bt=v>=BB?'bomb':v>=BH?'hyper':v>=BS?'star':'flame';
  const tip=TIPS[bt];if(!tip)return;
  const wrap=document.getElementById('boardWrap');
  const cr=cells[r][c].getBoundingClientRect(),wr=wrap.getBoundingClientRect();
  const el=document.createElement('div');el.className='bonus-tip';
  el.innerHTML=`<strong>${tip.n}</strong>${tip.d}`;
  let left=cr.left-wr.left+cr.width/2-80;
  let top=cr.bottom-wr.top+6;
  left=Math.max(4,Math.min(left,wr.width-170));
  if(top+70>wr.height)top=cr.top-wr.top-80;
  el.style.left=left+'px';el.style.top=top+'px';
  wrap.appendChild(el);_tipEl=el;
  setTimeout(()=>{if(_tipEl===el)clearBonusTip();},3000);
  // area highlight
  clearAreaHL();
  function mkHL(row,col,cls){
    const e=document.createElement('div');
    e.className='area-hl'+(cls?' '+cls:'');
    const cr2=cells[row][col].getBoundingClientRect(),wr2=wrap.getBoundingClientRect();
    e.style.cssText=`left:${cr2.left-wr2.left}px;top:${cr2.top-wr2.top}px;width:${CS}px;height:${CS}px;`;
    wrap.appendChild(e);_hlEls.push(e);
  }
  if(bt==='flame'){for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS)mkHL(nr,nc,'');}}
  else if(bt==='bomb'){for(let dr=-2;dr<=2;dr++)for(let dc=-2;dc<=2;dc++){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS)mkHL(nr,nc,'');}}
  else if(bt==='hyper'){for(let cc=0;cc<COLS;cc++)mkHL(r,cc,'cross-h');for(let rr=0;rr<ROWS;rr++)if(rr!==r)mkHL(rr,c,'cross-v');}
  else if(bt==='star'){const col2=gColor(v);for(let rr=0;rr<ROWS;rr++)for(let cc=0;cc<COLS;cc++)if(gColor(board[rr][cc])===col2)mkHL(rr,cc,'');}
}

// ═══ UI ═════════════════════════════════════════════════════
function updateUI(){
  score=Math.max(0,score);
  document.getElementById('score-disp').textContent=score.toLocaleString();
  document.getElementById('best-disp').textContent=getBest().toLocaleString();
  let lv=1;for(let i=1;i<LEVEL_THRESHOLDS.length;i++){if(score>=LEVEL_THRESHOLDS[i])lv=i+1;else break;}
  lv=Math.min(lv,LEVEL_THRESHOLDS.length-1);level=lv;
  document.getElementById('level-disp').textContent=level;
  const lo=LEVEL_THRESHOLDS[level-1]||0,hi=LEVEL_THRESHOLDS[level]||LEVEL_THRESHOLDS[LEVEL_THRESHOLDS.length-1];
  document.getElementById('level-bar').style.width=(hi>lo?Math.min(100,Math.round((score-lo)/(hi-lo)*100)):100)+'%';
  if(gameMode==='moves')document.getElementById('moves-disp').textContent=movesLeft;
  if(gameMode==='timer'){
    const el=document.getElementById('timer-disp');
    el.textContent=timerSec;
    el.className='stat-val'+(timerSec<=10?' timer-low':'');
  }
  if(gameMode==='objective')document.getElementById('obj-disp').textContent=objCount+'/'+objTarget;
}

function showScorePop(r,c,text){
  const wrap=document.getElementById('boardWrap');
  const cr=cells[r][c].getBoundingClientRect(),wr=wrap.getBoundingClientRect();
  const el=document.createElement('div');el.className='score-pop';
  el.textContent=text;
  el.style.left=(cr.left-wr.left+cr.width/2-24)+'px';
  el.style.top=(cr.top-wr.top)+'px';
  wrap.appendChild(el);setTimeout(()=>el.remove(),950);
}

function showBadge(n,groups){
  const w=document.getElementById('boardWrap');
  const old=w.querySelector('.combo-badge');if(old)old.remove();
  const el=document.createElement('div');el.className='combo-badge';
  const isBm=groups&&groups.some(g=>g.type==='bomb');
  const isHy=groups&&groups.some(g=>g.type==='hyper');
  const isSt=groups&&groups.some(g=>g.type==='star');
  const isFl=groups&&groups.some(g=>g.type==='flame');
  el.textContent=isBm?'💣 Bombă!':isHy?'💥 Cruce!':isSt?'⭐ Star Gem!':isFl?'🔥 Flacără!':`${n}× Combo!`;
  w.appendChild(el);setTimeout(()=>el.remove(),1600);
}

function showLevelUp(lv){
  const w=document.getElementById('boardWrap');
  const old=w.querySelector('.lu-banner');if(old)old.remove();
  const el=document.createElement('div');el.className='lu-banner';
  el.innerHTML=`<span class="lu-title">NIVEL ${lv}</span><span class="lu-sub">+${Math.round((lv-1)*10)}% scor</span>`;
  w.appendChild(el);setTimeout(()=>el.remove(),2100);
}

function noMoves(){endGame('Nicio mutare!');}
function endGame(title){
  busy=true;
  const best=getBest();if(score>best)saveBest(score);
  document.getElementById('msg-title').textContent=title;
  document.getElementById('msg-sub').textContent=`Scor: ${score.toLocaleString()}${score>=best&&score>0?' 🏆 Record!':''}`;
  document.getElementById('message').classList.add('visible');
}

// ═══ TIMER ══════════════════════════════════════════════════
function startTimer(){
  clearInterval(timerInterval);timerSec=60;updateUI();
  timerInterval=setInterval(()=>{timerSec--;updateUI();if(timerSec<=0){clearInterval(timerInterval);timerInterval=null;endGame('Timp expirat!');}},1000);
}

// ═══ PUBLIC ═════════════════════════════════════════════════
const G={
  newGame(){
    clearInterval(timerInterval);timerInterval=null;
    document.getElementById('message').classList.remove('visible');
    score=0;level=1;combo=0;sel=null;busy=false;
    if(gameMode==='moves')movesLeft=30;
    if(gameMode==='objective'){
      objType=Math.floor(Math.random()*GN);
      objTarget=15+Math.floor(Math.random()*10);
      objCount=0;
      document.getElementById('obj-label').textContent='Colectează '+
        ['Roșii','Albastre','Verzi','Galbene','Violet','Portocalii','Albe'][objType];
    }
    buildBoard();
    attachInput();
    makeBoard();
    updateUI();
    if(gameMode==='timer')startTimer();
  },
  hint(){
    if(busy)return;
    const h=findHint();if(!h)return;
    cells[h[0][0]][h[0][1]].classList.add('hint');
    cells[h[1][0]][h[1][1]].classList.add('hint');
    setTimeout(()=>{
      cells[h[0][0]][h[0][1]].classList.remove('hint');
      cells[h[1][0]][h[1][1]].classList.remove('hint');
    },1500);
  }
};

document.getElementById('modeScreen').style.display='flex';
document.getElementById('gameWrap').style.display='none';
