<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GemBlast ✦</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Raleway:wght@400;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

body{
  min-height:100vh;
  background:#07051a;
  color:#c8c8ff;
  font-family:'Raleway',sans-serif;
  display:flex;flex-direction:column;align-items:center;
  padding:12px 8px 32px;gap:10px;
  overflow-x:hidden;
}

@media(max-width:600px){
  body{padding:8px 4px 24px;gap:8px;}
}

/* animated starfield */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(1px 1px at 12% 18%,rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 34% 72%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 56% 40%,rgba(200,180,255,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 78% 85%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 90% 25%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 23% 55%,rgba(180,160,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 67% 10%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 45% 92%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(2px 2px at 8%  60%,rgba(160,140,255,.4) 0%,transparent 100%),
    radial-gradient(2px 2px at 82% 48%,rgba(200,180,255,.3) 0%,transparent 100%),
    radial-gradient(500px 500px at 50% 40%,rgba(30,10,80,.7) 0%,transparent 100%);
}

h1{
  position:relative;z-index:1;
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(1.3rem,4vw,2rem);
  background:linear-gradient(135deg,#ffd060,#f0a020,#ffd060);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:titleShimmer 3s linear infinite;
  letter-spacing:.12em;filter:drop-shadow(0 0 12px rgba(240,180,40,.5));
}
@keyframes titleShimmer{to{background-position:200% center}}

.sub{position:relative;z-index:1;font-size:.6rem;letter-spacing:.3em;color:#4040a0;text-transform:uppercase;}

.layout{
  position:relative;z-index:1;
  display:flex;gap:16px;align-items:flex-start;
  flex-wrap:wrap;justify-content:center;width:100%;max-width:720px;
}

/* ── SIDE PANEL ── */
.panel{display:flex;flex-direction:column;gap:10px;width:134px;}
.sbox{
  background:linear-gradient(160deg,#141428,#0e0e22);
  border:1px solid #252550;border-radius:12px;padding:11px 14px;text-align:center;
  box-shadow:0 4px 20px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.05);
}
.slabel{font-size:.54rem;letter-spacing:.28em;text-transform:uppercase;color:#4a4a90;margin-bottom:3px;}
.sval{
  font-family:'Cinzel Decorative',serif;font-size:1.35rem;
  background:linear-gradient(135deg,#ffd060,#f0a020);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.lvlbg{height:6px;background:#10103a;border-radius:3px;margin-top:7px;overflow:hidden;
  box-shadow:inset 0 1px 3px rgba(0,0,0,.5);}
.lvlbar{height:100%;background:linear-gradient(90deg,#6030ff,#f0c040);border-radius:3px;
  transition:width .5s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 8px rgba(100,60,255,.8);}
.btn{
  background:linear-gradient(160deg,#1c0c4a,#140a30);
  border:1px solid #302870;color:#a0a0e0;
  font-family:'Raleway',sans-serif;font-size:.64rem;letter-spacing:.14em;
  text-transform:uppercase;padding:10px;border-radius:9px;cursor:pointer;
  transition:all .18s;width:100%;
  box-shadow:0 3px 12px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.06);
}
.btn:hover{background:linear-gradient(160deg,#2c1c6a,#1c1240);border-color:#a080ff;color:#fff;transform:translateY(-1px);box-shadow:0 6px 20px rgba(80,40,200,.4);}
.btn:active{transform:translateY(0);}
.btn.gold{border-color:#c09020;color:#f0c040;background:linear-gradient(160deg,#2a1800,#1a1000);}
.btn.gold:hover{border-color:#f0c040;box-shadow:0 6px 20px rgba(200,150,20,.3);}

/* ── MOBILE: panel goes ABOVE board, board fills full width ── */
@media(max-width:600px){
  .layout{flex-direction:column;align-items:center;gap:10px;}
  .panel{
    flex-direction:row;width:100%;max-width:480px;
    flex-wrap:wrap;gap:8px;order:-1;
  }
  .sbox{flex:1;min-width:70px;padding:8px 10px;}
  .sval{font-size:1.1rem;}
  .btn{flex:1;min-width:100px;padding:8px;}
}
.board-wrap{
  position:relative;
  background:linear-gradient(160deg,#0c0820,#070514);
  border:1px solid #1e1a40;
  border-radius:16px;
  padding:6px;
  box-shadow:
    0 0 0 1px rgba(100,60,255,.15),
    0 0 60px rgba(50,20,140,.6),
    0 20px 60px rgba(0,0,0,.6),
    inset 0 1px 0 rgba(255,255,255,.06);
}
@media(max-width:600px){
  .board-wrap{padding:3px;border-radius:10px;}
}

#board{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  gap:var(--gap,3px);
  position:relative;
}

/* ── CELL ── */
.cell{
  width:var(--cs);height:var(--cs);
  position:relative;
  border-radius:8px;
  background:rgba(255,255,255,.02);
  cursor:pointer;
  transition:background .1s;
}
.cell:hover{background:rgba(255,255,255,.05);}

/* ── GEM BASE ── */
.gem{
  position:absolute;
  inset:4%;
  border-radius:4px;
  will-change:transform,opacity;
  overflow:visible;
}
/* SVG fills the gem div */
.gem svg{
  width:100%;height:100%;
  display:block;
  filter:drop-shadow(0 2px 6px rgba(0,0,0,.5));
  overflow:visible;
}
/* hover brighten via SVG filter */
.cell:hover .gem svg{
  filter:drop-shadow(0 2px 6px rgba(0,0,0,.4)) brightness(1.25) saturate(1.15);
}

/* ── SELECTED ── */
@keyframes selPulse{
  0%,100%{filter:drop-shadow(0 0 6px rgba(255,255,255,.9)) drop-shadow(0 0 12px rgba(255,255,255,.5))}
  50%    {filter:drop-shadow(0 0 8px #f0c040) drop-shadow(0 0 20px rgba(240,192,64,.7))}
}
.cell.sel .gem{
  transform:scale(1.18);
  z-index:5;
}
.cell.sel .gem svg{
  animation:selPulse .7s ease-in-out infinite;
}

/* ── HINT ── */
@keyframes hintBounce{
  0%,100%{transform:scale(1) rotate(0deg)}
  25%    {transform:scale(1.2) rotate(-8deg)}
  75%    {transform:scale(1.2) rotate(8deg)}
}
.cell.hint .gem{animation:hintBounce .45s ease-in-out 3;}

/* ── EXPLODE ── */
@keyframes gemExplode{
  0%  {transform:scale(1);   opacity:1}
  30% {transform:scale(1.5); opacity:1}
  60% {transform:scale(1.9); opacity:.4}
  100%{transform:scale(.05); opacity:0}
}
.gem.exploding{
  animation:gemExplode .38s cubic-bezier(.4,0,1,1) forwards;
  z-index:10;
}
.gem.exploding svg{
  filter:drop-shadow(0 0 16px var(--gem-glow,#fff)) brightness(3) saturate(2) !important;
}

/* ── FALL ── */
@keyframes gemFall{
  0%  {transform:translateY(var(--fall-from)) scaleY(.7) scaleX(1.2);opacity:0}
  60% {transform:translateY(4px) scaleY(1.06) scaleX(.97);opacity:1}
  80% {transform:translateY(-3px) scaleY(.97) scaleX(1.02)}
  100%{transform:translateY(0) scaleY(1) scaleX(1);opacity:1}
}
.gem.falling{animation:gemFall .42s cubic-bezier(.22,.6,.36,1) both;}

/* ── SWAP ── */
@keyframes gemSwap{
  0%  {transform:translate(0,0)                  scale(1)}
  40% {transform:translate(var(--sx),var(--sy))  scale(1.1)}
  100%{transform:translate(0,0)                  scale(1)}
}
.gem.swapping{animation:gemSwap .2s cubic-bezier(.4,0,.2,1) both;}

/* ── BONUS GEMS ── */
@keyframes flamePulse{
  0%,100%{filter:drop-shadow(0 0 8px #ff8800) drop-shadow(0 0 16px rgba(255,80,0,.4))}
  50%    {filter:drop-shadow(0 0 14px #ffcc00) drop-shadow(0 0 28px rgba(255,160,0,.7))}
}
.gem.flame svg{animation:flamePulse 1s ease-in-out infinite;}

@keyframes starSpin{
  0%,100%{filter:drop-shadow(0 0 8px #ffdd00) drop-shadow(0 0 20px rgba(255,220,0,.5))}
  50%    {filter:drop-shadow(0 0 14px #ffffff) drop-shadow(0 0 35px rgba(255,240,100,.8))}
}
.gem.star svg{animation:starSpin .8s ease-in-out infinite;}

@keyframes bombPulse{
  0%,100%{filter:drop-shadow(0 0 8px #ff4400) drop-shadow(0 0 20px rgba(255,60,0,.5))}
  50%    {filter:drop-shadow(0 0 16px #ffaa00) drop-shadow(0 0 36px rgba(255,160,0,.8))}
}
.gem.bomb svg{animation:bombPulse .6s ease-in-out infinite;}
  0%  {filter:drop-shadow(0 0 10px #ff4466) drop-shadow(0 0 22px rgba(255,40,80,.5))}
  25% {filter:drop-shadow(0 0 10px #44aaff) drop-shadow(0 0 22px rgba(40,150,255,.5))}
  50% {filter:drop-shadow(0 0 10px #44ffaa) drop-shadow(0 0 22px rgba(40,220,120,.5))}
  75% {filter:drop-shadow(0 0 10px #ff44ff) drop-shadow(0 0 22px rgba(200,40,255,.5))}
  100%{filter:drop-shadow(0 0 10px #ff4466) drop-shadow(0 0 22px rgba(255,40,80,.5))}
}
.gem.hyper svg{animation:hyperRainbow 1.2s linear infinite;}

/* bonus icon badge */
.bonus-icon{
  position:absolute;
  bottom:-1px;right:-1px;
  font-size:.55em;line-height:1;
  pointer-events:none;z-index:3;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,.8));
}

/* ── PARTICLES ── */
.spark{
  position:absolute;
  border-radius:50%;
  pointer-events:none;
  z-index:15;
  animation:sparkFly var(--dur,.5s) ease-out forwards;
}
@keyframes sparkFly{
  0%  {transform:translate(0,0) scale(1);opacity:1}
  100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}
}

/* ── SCORE POP ── */
@keyframes scoreFloat{
  0%  {transform:translateY(0)    scale(.6);opacity:1}
  20% {transform:translateY(-8px) scale(1.1);opacity:1}
  100%{transform:translateY(-55px) scale(.9);opacity:0}
}
.score-pop{
  position:absolute;pointer-events:none;
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(.75rem,.8rem,1rem);font-weight:700;
  background:linear-gradient(135deg,#fff8c0,#f0c040);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 6px rgba(240,192,64,.8));
  z-index:20;white-space:nowrap;
  animation:scoreFloat .85s cubic-bezier(.2,.8,.4,1) forwards;
}

/* ── COMBO BADGE ── */
@keyframes badgePop{
  0%  {transform:scale(0) rotate(-20deg);opacity:0}
  60% {transform:scale(1.2) rotate(3deg);opacity:1}
  100%{transform:scale(1)   rotate(0deg);opacity:1}
}
.combo-badge{
  position:absolute;top:-10px;right:-10px;
  background:linear-gradient(135deg,#ffd060,#ff6010);
  color:#000;font-family:'Cinzel Decorative',serif;
  font-size:.46rem;font-weight:900;padding:4px 10px;
  border-radius:20px;z-index:30;white-space:nowrap;
  animation:badgePop .4s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 3px 12px rgba(240,140,0,.5);
}

/* ── LEVEL UP BANNER ── */
@keyframes luAnim{
  0%  {transform:translate(-50%,-50%) scale(.4);opacity:0}
  15% {transform:translate(-50%,-50%) scale(1.15);opacity:1}
  70% {transform:translate(-50%,-50%) scale(1);opacity:1}
  100%{transform:translate(-50%,-60%) scale(.9);opacity:0}
}
.levelup-banner{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  z-index:50;pointer-events:none;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  animation:luAnim 2s cubic-bezier(.22,.6,.36,1) forwards;
}
.lu-title{
  font-family:'Cinzel Decorative',serif;font-size:clamp(1.4rem,5vw,2rem);
  background:linear-gradient(135deg,#fff8c0,#f0c040,#ff8800);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 12px rgba(240,180,40,.9));
  white-space:nowrap;
}
.lu-sub{
  font-size:clamp(.65rem,2vw,.85rem);color:#f0c040;
  letter-spacing:.15em;text-transform:uppercase;
  text-shadow:0 0 8px rgba(240,192,64,.8);
}

/* ── OVERLAY ── */
#overlay{
  display:none;position:absolute;inset:0;
  background:rgba(0,0,12,.92);
  border-radius:14px;flex-direction:column;align-items:center;
  justify-content:center;gap:14px;z-index:40;
  backdrop-filter:blur(4px);
}
#overlay.show{display:flex;}
#overlay h2{
  font-family:'Cinzel Decorative',serif;
  background:linear-gradient(135deg,#ffd060,#f0a020);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  font-size:1.4rem;text-align:center;
}
#overlay p{color:#5050a0;font-size:.82rem;text-align:center;}

/* ── MODE SELECT SCREEN ── */
.mode-screen{
  position:relative;z-index:1;
  width:100%;max-width:520px;
  display:flex;flex-direction:column;align-items:center;gap:16px;
}
.mode-intro{
  font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;
  color:#5050a0;
}
.mode-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;
}
.mode-card{
  background:linear-gradient(160deg,#141428,#0e0e22);
  border:1px solid #252550;border-radius:14px;
  padding:18px 14px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  transition:all .2s;text-align:center;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
}
.mode-card:hover{
  border-color:#6040ff;
  box-shadow:0 0 24px rgba(80,40,200,.5),0 4px 20px rgba(0,0,0,.4);
  transform:translateY(-2px);
}
.mode-card:active{transform:translateY(0);}
.mode-icon{font-size:2rem;line-height:1;}
.mode-title{
  font-family:'Cinzel Decorative',serif;
  font-size:.75rem;letter-spacing:.08em;
  background:linear-gradient(135deg,#ffd060,#f0a020);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.mode-desc{
  font-size:.62rem;color:#5050a0;line-height:1.5;
}
@media(max-width:400px){
  .mode-grid{grid-template-columns:1fr;}
}

</style>
</head>
<body>
<h1>✦ GemBlast ✦</h1>
<p class="sub" id="modeName">Match 3 · Bonus Gems</p>

<!-- ── MODE SELECT ── -->
<div id="modeScreen" class="mode-screen">
  <p class="mode-intro">Alege modul de joc</p>
  <div class="mode-grid">
    <button class="mode-card" onclick="startMode('classic')">
      <span class="mode-icon">♾️</span>
      <span class="mode-title">Clasic</span>
      <span class="mode-desc">Joc infinit, fără limite. Fă match-uri cât de bine poți.</span>
    </button>
    <button class="mode-card" onclick="startMode('moves')">
      <span class="mode-icon">🎯</span>
      <span class="mode-title">Mutări Limitate</span>
      <span class="mode-desc">30 de mutări. Maximizează scorul înainte să rămâi fără mutări.</span>
    </button>
    <button class="mode-card" onclick="startMode('timer')">
      <span class="mode-icon">⏱️</span>
      <span class="mode-title">Contra Timp</span>
      <span class="mode-desc">60 secunde. Fiecare match adaugă timp bonus!</span>
    </button>
    <button class="mode-card" onclick="startMode('objective')">
      <span class="mode-icon">🏆</span>
      <span class="mode-title">Obiective</span>
      <span class="mode-desc">Colectează gem-uri specifice înainte să rămâi fără mutări.</span>
    </button>
  </div>
</div>

<!-- ── GAME ── -->
<div class="layout" id="gameLayout" style="display:none">
  <div class="panel">
    <div class="sbox">
      <div class="slabel">Scor</div>
      <div class="sval" id="elScore">0</div>
    </div>
    <div class="sbox" id="boxLevel">
      <div class="slabel">Nivel <span id="elLevel">1</span></div>
      <div class="lvlbg"><div class="lvlbar" id="elBar" style="width:0%"></div></div>
    </div>
    <div class="sbox" id="boxMoves" style="display:none">
      <div class="slabel">Mutări</div>
      <div class="sval" id="elMoves">30</div>
    </div>
    <div class="sbox" id="boxTimer" style="display:none">
      <div class="slabel">Timp</div>
      <div class="sval" id="elTimer" style="color:#ff6644">60</div>
    </div>
    <div class="sbox" id="boxObj" style="display:none">
      <div class="slabel" id="objLabel">Obiectiv</div>
      <div class="sval" id="elObj">0/20</div>
    </div>
    <div class="sbox">
      <div class="slabel">Record</div>
      <div class="sval" id="elBest">0</div>
    </div>
    <button class="btn gold" onclick="hint()">💡 Indiciu</button>
    <button class="btn" onclick="backToMenu()">☰ Meniu</button>
    <button class="btn" onclick="newGame()">↺ Restart</button>
  </div>

  <div class="board-wrap" id="boardWrap">
    <div id="board"></div>
    <div id="overlay">
      <h2 id="ovTitle">Game Over</h2>
      <p id="ovSub"></p>
      <button class="btn gold" style="width:auto;padding:10px 24px" onclick="newGame()">Joacă din nou</button>
      <button class="btn" style="width:auto;padding:10px 24px;margin-top:6px" onclick="backToMenu()">☰ Meniu</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────
const R=8, C=8;
// ── GEM SVG DEFINITIONS ──────────────────────────────────
// Each gem type: unique faceted shape drawn in SVG with lighting simulation
const GEM_DEFS = [

// ── 0 DIAMOND (classic Bejeweled diamond) ─────────────────
{name:'Diamond', glow:'#ff2255', shadow:'rgba(255,20,60,.9)',
svg:(id)=>`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
<defs>
  <radialGradient id="g${id}a" cx="38%" cy="28%" r="55%">
    <stop offset="0%" stop-color="#ffd0dc"/>
    <stop offset="40%" stop-color="#ff2255"/>
    <stop offset="80%" stop-color="#aa0030"/>
    <stop offset="100%" stop-color="#550010"/>
  </radialGradient>
  <linearGradient id="g${id}b" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="rgba(255,255,255,.3)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,.2)"/>
  </linearGradient>
</defs>
<!-- crown top -->
<polygon points="22,38 50,6 78,38" fill="url(#g${id}a)"/>
<polygon points="6,38 22,38 50,6" fill="#ff1144" opacity=".9"/>
<polygon points="78,38 94,38 50,6" fill="#cc0033" opacity=".7"/>
<!-- pavilion bottom -->
<polygon points="6,38 22,38 50,94" fill="#dd1144" opacity=".95"/>
<polygon points="22,38 78,38 50,94" fill="url(#g${id}a)"/>
<polygon points="78,38 94,38 50,94" fill="#880022" opacity=".9"/>
<!-- girdle line -->
<line x1="6" y1="38" x2="94" y2="38" stroke="rgba(255,200,200,.4)" stroke-width="1"/>
<!-- crown facet lines -->
<line x1="50" y1="6" x2="22" y2="38" stroke="rgba(255,255,255,.25)" stroke-width="1"/>
<line x1="50" y1="6" x2="78" y2="38" stroke="rgba(255,255,255,.25)" stroke-width="1"/>
<line x1="38" y1="38" x2="50" y2="6" stroke="rgba(255,255,255,.15)" stroke-width="1"/>
<line x1="62" y1="38" x2="50" y2="6" stroke="rgba(255,255,255,.15)" stroke-width="1"/>
<!-- highlights -->
<ellipse cx="36" cy="22" rx="10" ry="6" fill="rgba(255,255,255,.6)" transform="rotate(-35,36,22)"/>
<polygon points="50,14 53,28 50,32 47,28" fill="rgba(255,255,255,.5)"/>
<!-- table sparkle -->
<polygon points="38,38 50,28 62,38 50,48" fill="rgba(255,255,255,.18)"/>
</svg>`},

// ── 1 CIRCLE (smooth sphere like Candy Crush) ─────────────
{name:'Sphere', glow:'#2266ff', shadow:'rgba(20,80,255,.9)',
svg:(id)=>`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
<defs>
  <radialGradient id="g${id}a" cx="36%" cy="30%" r="58%">
    <stop offset="0%" stop-color="#c8e4ff"/>
    <stop offset="25%" stop-color="#4499ff"/>
    <stop offset="60%" stop-color="#0044ee"/>
    <stop offset="100%" stop-color="#001488"/>
  </radialGradient>
  <radialGradient id="g${id}b" cx="50%" cy="50%" r="50%">
    <stop offset="60%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(0,0,80,.4)"/>
  </radialGradient>
</defs>
<!-- main sphere -->
<circle cx="50" cy="52" r="42" fill="url(#g${id}a)"/>
<!-- depth shadow rim -->

const BF=100,BS=200,BH=300,BB=400;
function gc(v){return v>=BB?v-BB:v>=BH?0:v>=BS?v-BS:v>=BF?v-BF:v;}
function isB(v){return v>=BF;}

// pre-render SVG data URLs once (avoid regenerating every applyGem call)
let _svgCache={};
function getSVG(colorIdx, uid){
  const key=colorIdx+'_'+uid;
  if(!_svgCache[key]){
    const def=GEM_DEFS[colorIdx];
    const svgStr=def.svg(uid).trim();
    _svgCache[key]='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svgStr);
  }
  return _svgCache[key];
}

  CS=Math.floor((avail-3*7)/8);

  document.documentElement.style.setProperty('--cs',CS+'px');

  cells=[]; gems=[];
  for(let r=0;r<R;r++){

}

function applyGem(r,c){
  const v=board[r][c];
  const el=gems[r][c];
  if(v===-1){
    el.innerHTML='';el.style.cssText='';el.className='gem';return;
  }
  const ci=gc(v);
  const def=GEM_DEFS[ci];
  // always use a fresh UID so SVG gradient IDs never collide
  const uid = ++_gemUID;

  if(isB(v)){
    const btype = v>=BB?'bomb':v>=BH?'hyper':v>=BS?'star':'flame';
    el.innerHTML=bonusSVG(btype,ci,uid);
    el.style.background='none';
    el.style.removeProperty('--gem-shadow');
    const glowColor = btype==='bomb'  ?'rgba(255,40,0,.9)':
                      btype==='hyper' ?'rgba(180,60,255,.9)':
                      btype==='star'  ?'rgba(255,200,0,.9)':
                                       'rgba(255,120,0,.9)';
    el.style.boxShadow=`0 0 18px ${glowColor}, 0 3px 8px rgba(0,0,0,.6)`;
    el.className='gem '+btype;
  } else {
    el.innerHTML=def.svg(uid);
    el.style.background='none';
    el.style.setProperty('--gem-glow',def.glow);
    el.style.setProperty('--gem-shadow',`0 4px 18px ${def.shadow},0 2px 8px rgba(0,0,0,.6)`);
    el.style.boxShadow='var(--gem-shadow)';
    el.className='gem';
  }
}

// ── GRID INIT ─────────────────────────────────────────────
function rg(){return Math.floor(Math.random()*GN);}
function makeBoard(){
  board=[];
  for(let r=0;r<R;r++){
    board.push([]);
    for(let c=0;c<C;c++){
      let v;
      do{v=rg();}while(
        (c>=2&&gc(board[r][c-1])===v&&gc(board[r][c-2])===v)||
        (r>=2&&gc(board[r-1][c])===v&&gc(board[r-2][c])===v)
      );
      board[r].push(v);
    }
  }
  // apply visuals to all cells
  for(let r=0;r<R;r++) for(let c=0;c<C;c++) applyGem(r,c);
}

  const x=clientX-rect.left, y=clientY-rect.top;
  const step=CS+3;
  const c=Math.floor(x/step), r=Math.floor(y/step);
  if(r<0||r>=R||c<0||c>=C)return null;
  return [r,c];
}

function handleStart(clientX, clientY){
  if(busy)return;
  const rc=getRCFromXY(clientX,clientY);
  if(!rc)return;
  const[r,c]=rc;
  if(board[r][c]===-1)return;
  _dragStart={r,c,x:clientX,y:clientY};
  _didSwipe=false;
  // DON'T select yet — wait to see if it's a tap or swipe
}

function handleMove(clientX, clientY){
  if(!_dragStart||busy)return;
  const{r:r1,c:c1,x:sx,y:sy}=_dragStart;
  const dx=clientX-sx, dy=clientY-sy;
  const adx=Math.abs(dx), ady=Math.abs(dy);
  if(!_didSwipe&&(adx>SWIPE_MIN||ady>SWIPE_MIN)){
    _didSwipe=true;
    let r2=r1,c2=c1;
    if(adx>ady){ c2=c1+(dx>0?1:-1); }
    else        { r2=r1+(dy>0?1:-1); }
    _dragStart=null;
    clearSel();
    if(r2>=0&&r2<R&&c2>=0&&c2<C&&board[r2][c2]!==-1){
      doSwap(r1,c1,r2,c2);
    }
  }
}

function handleEnd(clientX, clientY){
  if(!_dragStart)return;
  const{r:r1,c:c1}=_dragStart;
  _dragStart=null;
  if(_didSwipe)return;
  if(busy)return;

  // confirmed tap — now do select/swap logic
  if(!sel){
    // nothing selected — select this gem
    setSel(r1,c1);
    return;
  }
  const[sr,sc]=sel;
  if(sr===r1&&sc===c1){
    // tapped same gem — deselect
    clearSel();
    return;
  }
  if(Math.abs(sr-r1)+Math.abs(sc-c1)===1){
    // adjacent — swap
    clearSel();
    doSwap(sr,sc,r1,c1);
  } else {
    // not adjacent — move selection
    setSel(r1,c1);
  }
}

function attachInput(){
  const boardEl=document.getElementById('board');

  // ── Mouse ──
  boardEl.addEventListener('mousedown',e=>{
    e.preventDefault();
    handleStart(e.clientX,e.clientY);
  });
  boardEl.addEventListener('mousemove',e=>{
    if(_dragStart) handleMove(e.clientX,e.clientY);
  });
  boardEl.addEventListener('mouseup',e=>{
    handleEnd(e.clientX,e.clientY);
  });
  boardEl.addEventListener('mouseleave',()=>{
    if(_dragStart&&!_didSwipe){_dragStart=null;clearSel();}
    _dragStart=null;
  });

  // ── Touch ──
  boardEl.addEventListener('touchstart',e=>{
    e.preventDefault();
    const t=e.touches[0];
    handleStart(t.clientX,t.clientY);
  },{passive:false});
  boardEl.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(_dragStart){
      const t=e.touches[0];
      handleMove(t.clientX,t.clientY);
    }
  },{passive:false});
  boardEl.addEventListener('touchend',e=>{
    e.preventDefault();
    const t=e.changedTouches[0];
    handleEnd(t.clientX,t.clientY);
  },{passive:false});
  boardEl.addEventListener('touchcancel',()=>{
    _dragStart=null;clearSel();
  });
}

// ── SWAP ──────────────────────────────────────────────────
function doSwap(r1,c1,r2,c2){
  busy=true;
  const dx=(c2-c1)*(CS+3), dy=(r2-r1)*(CS+3);
  // animate both gems
  animSwap(r1,c1, dx, dy);
  animSwap(r2,c2,-dx,-dy);
  setTimeout(()=>{
    // swap data
    const t=board[r1][c1];board[r1][c1]=board[r2][c2];board[r2][c2]=t;
    applyGem(r1,c1); applyGem(r2,c2);
    const m=findMatches();
    if(!m){
      // swap back
      animSwap(r1,c1,-dx,-dy);
      animSwap(r2,c2, dx, dy);
      setTimeout(()=>{
        const t2=board[r1][c1];board[r1][c1]=board[r2][c2];board[r2][c2]=t2;
        applyGem(r1,c1); applyGem(r2,c2);
        busy=false;
      },200);
    } else {
      combo=0;
      resolve(m);
    }
  },200);
}

function animSwap(r,c,dx,dy){
  const g=gems[r][c];
  g.style.setProperty('--sx',dx+'px');
  g.style.setProperty('--sy',dy+'px');
  g.classList.remove('swapping');
  void g.offsetWidth; // reflow just this element
  g.classList.add('swapping');
  setTimeout(()=>g.classList.remove('swapping'),200);
}

// ── MATCH FINDING ─────────────────────────────────────────
function findMatches(){
  const hG=[],vG=[];
  for(let r=0;r<R;r++){
    for(let c=0;c<C-2;){
      const v=board[r][c];if(v===-1){c++;continue;}
      const vc=gc(v);let l=1;
      while(c+l<C&&board[r][c+l]!==-1&&gc(board[r][c+l])===vc)l++;
      if(l>=3){const cells=[];for(let k=0;k<l;k++)cells.push([r,c+k]);hG.push({cells,len:l,color:vc});}
      c+=l;
    }
  }
  for(let c=0;c<C;c++){
    for(let r=0;r<R-2;){
      const v=board[r][c];if(v===-1){r++;continue;}
      const vc=gc(v);let l=1;
      while(r+l<R&&board[r+l][c]!==-1&&gc(board[r+l][c])===vc)l++;
      if(l>=3){const cells=[];for(let k=0;k<l;k++)cells.push([r+k,c]);vG.push({cells,len:l,color:vc});}
      r+=l;
    }
  }
  if(!hG.length&&!vG.length)return null;

  const hMap=new Map(),vMap=new Map();
  for(const g of hG)for(const[r,c]of g.cells)hMap.set(r*C+c,g);
  for(const g of vG)for(const[r,c]of g.cells)vMap.set(r*C+c,g);

  const done=new Set(), result=[];
  // L/T → hyper
  for(const[k,hg]of hMap){
    if(vMap.has(k)&&!done.has(k)){
      const vg=vMap.get(k);
      const idx=new Set([...hg.cells,...vg.cells].map(([r,c])=>r*C+c));
      const cls=[...idx].map(i=>[Math.floor(i/C),i%C]);
      const piv=[Math.floor(k/C),k%C];
      result.push({type:'hyper',cells:cls,pivot:piv,color:hg.color});
      for(const i of idx)done.add(i);
    }
  }
  for(const g of hG){
    const rem=g.cells.filter(([r,c])=>!done.has(r*C+c));
    if(rem.length<3)continue;
    const piv=rem[Math.floor(rem.length/2)];
    const type=g.len>=6?'bomb':g.len>=5?'star':g.len===4?'flame':'normal';
    result.push({type,cells:rem,pivot:piv,color:g.color});
    for(const[r,c]of rem)done.add(r*C+c);
  }
  for(const g of vG){
    const rem=g.cells.filter(([r,c])=>!done.has(r*C+c));
    if(rem.length<3)continue;
    const piv=rem[Math.floor(rem.length/2)];
    const type=g.len>=6?'bomb':g.len>=5?'star':g.len===4?'flame':'normal';
    result.push({type,cells:rem,pivot:piv,color:g.color});
    for(const[r,c]of rem)done.add(r*C+c);
  }
  return result.length?result:null;
}

// ── CASCADE ───────────────────────────────────────────────
function expandBonus(r,c,v,dst){
  if(v>=BB){
    // bomb: 5×5 area
    for(let dr=-2;dr<=2;dr++)for(let dc=-2;dc<=2;dc++){
      const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<R&&nc>=0&&nc<C)dst.add(nr*C+nc);
    }
  } else if(v>=BH){
    // hyper: full row + column
    for(let cc=0;cc<C;cc++)dst.add(r*C+cc);
    for(let rr=0;rr<R;rr++)dst.add(rr*C+c);
  } else if(v>=BS){
    // star: all gems of same color
    const col=v-BS;
    for(let rr=0;rr<R;rr++)for(let cc=0;cc<C;cc++)
      if(gc(board[rr][cc])===col)dst.add(rr*C+cc);
  } else if(v>=BF){
    // flame: 3×3
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
      const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<R&&nc>=0&&nc<C)dst.add(nr*C+nc);
    }
  }
}

function resolve(groups){
  combo++;
  let pts=0;
  for(const g of groups){
    const lb=g.cells.length>=6?8:g.cells.length>=5?4:g.cells.length===4?2:1;
    pts+=g.cells.length*10*lb;
  }
  // level multiplier: cada nivel extra dă +10% scor
  const lvlMult=1+(level-1)*0.1;
  pts=Math.round(pts*combo*lvlMult);
  const prevLevel=level;
  score+=pts;
  if(score>getBest()) setBest(score);
  updateUI();
  if(level>prevLevel) showLevelUp(level);
  showScore(groups,pts,combo);

  // ── Mode-specific effects ──
  if(gameMode==='moves'){
    movesLeft--;
    updateUI();
    if(movesLeft<=0){
      // let current cascade finish, then end
      setTimeout(()=>endGame('Mutări Epuizate!',`Scor: ${score.toLocaleString()}`),800);
    }
  }
  if(gameMode==='timer'){
    // add time for each gem matched
    const total=groups.reduce((s,g)=>s+g.cells.length,0);
    addTimerBonus(total);
  }
  if(gameMode==='objective'){
    let cnt=0;
    for(const g of groups){
      if(g.color===objGemType) cnt+=g.cells.length;
    }
    objCount=Math.min(objCount+cnt, objTarget);
    updateUI();
    if(objCount>=objTarget){
      setTimeout(()=>endGame('Obiectiv Completat! 🏆',`Scor: ${score.toLocaleString()}`),800);
    }
  }

  // build destroy set
  const dst=new Set();
  const newB=[];
  for(const g of groups){
    for(const[r,c]of g.cells){
      dst.add(r*C+c);
      if(isB(board[r][c]))expandBonus(r,c,board[r][c],dst);
    }
    if(g.type!=='normal')newB.push({r:g.pivot[0],c:g.pivot[1],btype:g.type,color:g.color});
  }

  // explode
  let pending=0;
  for(const idx of dst){
    const r=Math.floor(idx/C),c=idx%C;
    if(board[r][c]!==-1)pending++;
  }
  if(!pending){gravity(dst,newB);return;}

  let done=0;
  for(const idx of dst){
    const r=Math.floor(idx/C),c=idx%C;
    if(board[r][c]===-1)continue;
    const g=gems[r][c];
    // spawn sparks before exploding
    spawnSparks(r,c,gc(board[r][c]));
    g.classList.remove('exploding');
    void g.offsetWidth;
    g.classList.add('exploding');
    board[r][c]=-1;
    setTimeout(()=>{
      applyGem(r,c);
      if(++done===pending){
        // place bonus gems
        for(const{r:br,c:bc,btype,color}of newB){
          if(board[br][bc]===-1){
            board[br][bc]=btype==='bomb'?BB+color:btype==='star'?BS+color:btype==='hyper'?BH:BF+color;
            dst.delete(br*C+bc);
          }
        }
        gravity(dst,[]);
      }
    },380);
  }
}

function gravity(matchSet,_){
  const step=CS+3;
  const jobs=[];
  for(let c=0;c<C;c++){
    const stack=[];
    for(let r=R-1;r>=0;r--)if(board[r][c]!==-1)stack.push(board[r][c]);
    while(stack.length<R)stack.push(rg());
    for(let r=R-1;r>=0;r--){
      const nv=stack[R-1-r];
      let eb=0;for(let rr=r+1;rr<R;rr++)if(matchSet.has(rr*C+c))eb++;
      const wasMatch=matchSet.has(r*C+c);
      board[r][c]=nv;
      if(wasMatch||eb>0){
        const fy=wasMatch?-(r+1)*step:-eb*step;
        jobs.push({r,c,fy,delay:(R-1-r)*20});
      }
    }
  }

  if(!jobs.length){chain();return;}

  // apply new visuals first (gems are hidden during fall start)
  for(const{r,c}of jobs) applyGem(r,c);

  let landed=0;
  for(const{r,c,fy,delay}of jobs){
    setTimeout(()=>{
      const g=gems[r][c];
      g.style.setProperty('--fall-from',fy+'px');
      g.classList.remove('falling');
      void g.offsetWidth;
      g.classList.add('falling');
      setTimeout(()=>{
        g.classList.remove('falling');
        if(++landed===jobs.length)chain();
      },380);
    },delay);
  }
}

function chain(){
  const nm=findMatches();
  if(nm){resolve(nm);}
  else{combo=0;busy=false;if(!hasMoves())noMoves();}
}

// ── LEVEL UP BANNER ───────────────────────────────────────
function showLevelUp(lv){
  const wrap=document.getElementById('boardWrap');
  const old=wrap.querySelector('.levelup-banner');if(old)old.remove();
  const el=document.createElement('div');
  el.className='levelup-banner';
  el.innerHTML=`<span class="lu-title">NIVEL ${lv}</span><span class="lu-sub">+Scor ×${Math.min(lv,5)} bonus!</span>`;
  wrap.appendChild(el);
  setTimeout(()=>el.remove(),2000);
}

// ── PARTICLES / SCORE POPUP ───────────────────────────────
function showScore(groups,pts,combo){
  const wrap=document.getElementById('boardWrap');
  const old=wrap.querySelector('.combo-badge');if(old)old.remove();

  // score pop
  const allC=groups.flatMap(g=>g.cells);
  const mr=Math.round(allC.reduce((s,[r])=>s+r,0)/allC.length);
  const mc=Math.round(allC.reduce((s,[,c])=>s+c,0)/allC.length);
  const cell=cells[mr][mc];
  const cr=cell.getBoundingClientRect();
  const wr=wrap.getBoundingClientRect();
  const pop=document.createElement('div');
  pop.className='score-pop';
  const isHy=groups.some(g=>g.type==='hyper');
  const isSt=groups.some(g=>g.type==='star');
  const isFl=groups.some(g=>g.type==='flame');
  const isBm=groups.some(g=>g.type==='bomb');
  const pre=isBm?'💣 ':isHy?'💥 ':isSt?'⭐ ':isFl?'🔥 ':'';
  pop.textContent=pre+(combo>1?`×${combo} `:'')+'+'+pts;
  pop.style.left=(cr.left-wr.left+cr.width/2-20)+'px';
  pop.style.top=(cr.top-wr.top)+'px';
  wrap.appendChild(pop);
  setTimeout(()=>pop.remove(),900);

  // badge
  if(combo>1||isHy||isSt||isFl){
    const badge=document.createElement('div');
    badge.className='combo-badge';
    badge.textContent=isBm?'💣 Bomb!':isHy?'💥 Hypercube!':isSt?'⭐ Star Gem!':isFl?'🔥 Flame Gem!':`${combo}× Combo!`;
    wrap.appendChild(badge);
    setTimeout(()=>badge.remove(),1500);
  }
}

// ── SPARKS ────────────────────────────────────────────────
function spawnSparks(r,c,colorIdx){
  const wrap=document.getElementById('boardWrap');
  const cell=cells[r][c];
  const cr=cell.getBoundingClientRect();
  const wr=wrap.getBoundingClientRect();
  const cx=cr.left-wr.left+cr.width/2;
  const cy=cr.top-wr.top+cr.height/2;
  const glow=GEM_DEFS[colorIdx].glow;
  const sparkColors=[glow,'#ffffff',glow,'#ffeeaa'];
  const count=10+Math.floor(Math.random()*6);
  for(let i=0;i<count;i++){
    const spark=document.createElement('div');
    spark.className='spark';
    const angle=Math.random()*Math.PI*2;
    const dist=22+Math.random()*38;
    const size=2+Math.random()*4;
    const dur=(.28+Math.random()*.3).toFixed(2);
    spark.style.cssText=`left:${cx}px;top:${cy}px;width:${size}px;height:${size}px;background:${sparkColors[i%4]};--dx:${(Math.cos(angle)*dist).toFixed(1)}px;--dy:${(Math.sin(angle)*dist).toFixed(1)}px;--dur:${dur}s;box-shadow:0 0 4px ${glow};`;
    wrap.appendChild(spark);
    setTimeout(()=>spark.remove(),+dur*1000+60);
  }
}

// ── HINT ─────────────────────────────────────────────────
function hint(){
  if(busy)return;
  const f=findHint();
  if(!f)return;
  const[[r1,c1],[r2,c2]]=f;
  cells[r1][c1].classList.add('hint');
  cells[r2][c2].classList.add('hint');
  setTimeout(()=>{
    cells[r1][c1].classList.remove('hint');
    cells[r2][c2].classList.remove('hint');
  },1200);
}
function findHint(){
  for(let r=0;r<R;r++)for(let c=0;c<C;c++){
    for(const[nr,nc]of[[r,c+1],[r+1,c]]){
      if(nr>=R||nc>=C)continue;
      const t=board[r][c];board[r][c]=board[nr][nc];board[nr][nc]=t;
      const ok=!!findMatches();
      board[nr][nc]=board[r][c];board[r][c]=t;
      if(ok)return[[r,c],[nr,nc]];
    }
  }
  return null;
}
function hasMoves(){
  for(let r=0;r<R;r++)for(let c=0;c<C;c++){
    for(const[nr,nc]of[[r,c+1],[r+1,c]]){
      if(nr>=R||nc>=C)continue;
      const t=board[r][c];board[r][c]=board[nr][nc];board[nr][nc]=t;
      const ok=!!findMatches();
      board[nr][nc]=board[r][c];board[r][c]=t;
      if(ok)return true;
    }
  }
  return false;
}

// ── UI ────────────────────────────────────────────────────
function updateUI(){
  const best=getBest();
  document.getElementById('elScore').textContent=score.toLocaleString();
  document.getElementById('elBest').textContent=best.toLocaleString();

  // level (all modes)
  let lv=1;
  for(let i=1;i<LVL.length;i++){ if(score>=LVL[i]) lv=i+1; else break; }
  lv=Math.min(lv,LVL.length-1);
  level=lv;
  document.getElementById('elLevel').textContent=level;
  const lo=LVL[level-1]||0, hi=LVL[level]||LVL[LVL.length-1];
  const pct=hi>lo?Math.min(100,Math.round((score-lo)/(hi-lo)*100)):100;
  document.getElementById('elBar').style.width=pct+'%';

  // mode-specific
  if(gameMode==='moves') document.getElementById('elMoves').textContent=movesLeft;
  if(gameMode==='timer'){
    const el=document.getElementById('elTimer');
    el.textContent=timerSec;
    el.style.color=timerSec<=10?'#ff2244':timerSec<=20?'#ff8800':'#f0c040';
  }
  if(gameMode==='objective'){
    document.getElementById('elObj').textContent=objCount+'/'+objTarget;
  }
}

function endGame(title, sub){
  clearInterval(timerInterval); timerInterval=null;
  busy=true;
  const best=getBest();
  if(score>best) setBest(score);
  document.getElementById('ovTitle').textContent=title;
  document.getElementById('ovSub').textContent=sub+(score>best?' 🏆 NOU RECORD!':'');
  document.getElementById('overlay').classList.add('show');
}

function noMoves(){
  if(gameMode==='classic'){
    endGame('Nicio mutare!',`Scor: ${score.toLocaleString()}`);
    setTimeout(()=>{document.getElementById('overlay').classList.remove('show');newGame();},2500);
  } else {
    endGame('Nicio mutare!',`Scor: ${score.toLocaleString()}`);
  }
}

// ── TIMER MODE ────────────────────────────────────────────
function startTimer(){
  clearInterval(timerInterval);
  timerSec=60;
  updateUI();
  timerInterval=setInterval(()=>{
    timerSec--;
    updateUI();
    if(timerSec<=0){
      clearInterval(timerInterval);timerInterval=null;
      endGame("Timp expirat!",`Scor: ${score.toLocaleString()}`);
    }
  },1000);
}
function addTimerBonus(matchSize){
  // each gem in match adds 0.5s, bonus gems add more
  timerSec=Math.min(timerSec+Math.ceil(matchSize*0.5),99);
  updateUI();
}

// ── NEW GAME ─────────────────────────────────────────────
function newGame(){
  clearInterval(timerInterval); timerInterval=null;
  document.getElementById('overlay').classList.remove('show');
  score=0; level=1; combo=0; sel=null; busy=false;

  // show/hide mode-specific boxes
  document.getElementById('boxLevel').style.display=
    (gameMode==='classic'||gameMode==='objective')?'':'none';
  document.getElementById('boxMoves').style.display=
    gameMode==='moves'?'':'none';
  document.getElementById('boxTimer').style.display=
    gameMode==='timer'?'':'none';
  document.getElementById('boxObj').style.display=
    gameMode==='objective'?'':'none';

  // init per-mode state
  if(gameMode==='moves'){
    movesLeft=30;
  } else if(gameMode==='timer'){
    // timer starts after board is drawn
  } else if(gameMode==='objective'){
    objGemType=Math.floor(Math.random()*GN);
    objTarget=15+Math.floor(Math.random()*10); // 15–24 gems
    objCount=0;
    document.getElementById('objLabel').textContent=
      'Colectează '+GEM_DEFS[objGemType].name;
  }

  makeBoard();
  updateUI();

  if(gameMode==='timer') startTimer();
}

// ── INIT ─────────────────────────────────────────────────
buildDOM();
// show mode screen at start, not game
document.getElementById('modeScreen').style.display='flex';
document.getElementById('gameLayout').style.display='none';
window.addEventListener('resize',()=>{
  clearTimeout(window._rt);
  window._rt=setTimeout(()=>{ calcCS(); },120);
});
window.addEventListener('orientationchange',()=>{
  setTimeout(()=>{ calcCS(); },300);
});
</script>
