<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GemBlast ✦</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Raleway:wght@400;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

body{
  min-height:100vh;
  background:#07051a;
  color:#c8c8ff;
  font-family:'Raleway',sans-serif;
  display:flex;flex-direction:column;align-items:center;
  padding:16px 12px 40px;gap:12px;
  overflow-x:hidden;
}

/* animated starfield */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(1px 1px at 12% 18%,rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 34% 72%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 56% 40%,rgba(200,180,255,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 78% 85%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 90% 25%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 23% 55%,rgba(180,160,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 67% 10%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 45% 92%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(2px 2px at 8%  60%,rgba(160,140,255,.4) 0%,transparent 100%),
    radial-gradient(2px 2px at 82% 48%,rgba(200,180,255,.3) 0%,transparent 100%),
    radial-gradient(500px 500px at 50% 40%,rgba(30,10,80,.7) 0%,transparent 100%);
}

h1{
  position:relative;z-index:1;
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(1.3rem,4vw,2rem);
  background:linear-gradient(135deg,#ffd060,#f0a020,#ffd060);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:titleShimmer 3s linear infinite;
  letter-spacing:.12em;filter:drop-shadow(0 0 12px rgba(240,180,40,.5));
}
@keyframes titleShimmer{to{background-position:200% center}}

.sub{position:relative;z-index:1;font-size:.6rem;letter-spacing:.3em;color:#4040a0;text-transform:uppercase;}

.layout{
  position:relative;z-index:1;
  display:flex;gap:16px;align-items:flex-start;
  flex-wrap:wrap;justify-content:center;width:100%;max-width:720px;
}

/* ── SIDE PANEL ── */
.panel{display:flex;flex-direction:column;gap:10px;width:134px;}
.sbox{
  background:linear-gradient(160deg,#141428,#0e0e22);
  border:1px solid #252550;border-radius:12px;padding:11px 14px;text-align:center;
  box-shadow:0 4px 20px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.05);
}
.slabel{font-size:.54rem;letter-spacing:.28em;text-transform:uppercase;color:#4a4a90;margin-bottom:3px;}
.sval{
  font-family:'Cinzel Decorative',serif;font-size:1.35rem;
  background:linear-gradient(135deg,#ffd060,#f0a020);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.lvlbg{height:6px;background:#10103a;border-radius:3px;margin-top:7px;overflow:hidden;
  box-shadow:inset 0 1px 3px rgba(0,0,0,.5);}
.lvlbar{height:100%;background:linear-gradient(90deg,#6030ff,#f0c040);border-radius:3px;
  transition:width .5s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 8px rgba(100,60,255,.8);}
.btn{
  background:linear-gradient(160deg,#1c0c4a,#140a30);
  border:1px solid #302870;color:#a0a0e0;
  font-family:'Raleway',sans-serif;font-size:.64rem;letter-spacing:.14em;
  text-transform:uppercase;padding:10px;border-radius:9px;cursor:pointer;
  transition:all .18s;width:100%;
  box-shadow:0 3px 12px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.06);
}
.btn:hover{background:linear-gradient(160deg,#2c1c6a,#1c1240);border-color:#a080ff;color:#fff;transform:translateY(-1px);box-shadow:0 6px 20px rgba(80,40,200,.4);}
.btn:active{transform:translateY(0);}
.btn.gold{border-color:#c09020;color:#f0c040;background:linear-gradient(160deg,#2a1800,#1a1000);}
.btn.gold:hover{border-color:#f0c040;box-shadow:0 6px 20px rgba(200,150,20,.3);}

/* ── BOARD WRAPPER ── */
.board-wrap{
  position:relative;
  background:linear-gradient(160deg,#0c0820,#070514);
  border:1px solid #1e1a40;
  border-radius:16px;
  padding:10px;
  box-shadow:
    0 0 0 1px rgba(100,60,255,.15),
    0 0 60px rgba(50,20,140,.6),
    0 20px 60px rgba(0,0,0,.6),
    inset 0 1px 0 rgba(255,255,255,.06);
}

#board{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  gap:4px;
  position:relative;
}

/* ── CELL ── */
.cell{
  width:var(--cs);height:var(--cs);
  position:relative;
  border-radius:8px;
  background:rgba(255,255,255,.02);
  cursor:pointer;
  transition:background .1s;
}
.cell:hover{background:rgba(255,255,255,.05);}

/* ── GEM BASE ── */
.gem{
  position:absolute;
  inset:7%;
  border-radius:50%;
  will-change:transform,opacity;
  /* glow ring */
  outline:2px solid transparent;
  outline-offset:1px;
  transition:filter .12s, outline-color .12s;
}

/* top-left specular highlight */
.gem::after{
  content:'';
  position:absolute;
  top:10%;left:18%;
  width:30%;height:30%;
  background:radial-gradient(circle,rgba(255,255,255,.7) 0%,rgba(255,255,255,.1) 60%,transparent 100%);
  border-radius:50%;
  pointer-events:none;
  z-index:2;
}

/* bottom rim reflection */
.gem::before{
  content:'';
  position:absolute;
  bottom:8%;left:20%;right:20%;height:18%;
  background:radial-gradient(ellipse,rgba(255,255,255,.18),transparent 70%);
  border-radius:50%;
  pointer-events:none;
  z-index:2;
}

.cell:hover .gem{filter:brightness(1.3) saturate(1.2);}

/* ── SELECTED ── */
@keyframes selPulse{
  0%,100%{box-shadow:var(--gem-shadow), 0 0 0 3px rgba(255,255,255,.9), 0 0 20px rgba(255,255,255,.5)}
  50%    {box-shadow:var(--gem-shadow), 0 0 0 3px #f0c040,               0 0 30px rgba(240,192,64,.7)}
}
.cell.sel .gem{
  transform:scale(1.18);
  animation:selPulse .7s ease-in-out infinite;
  z-index:5;
}

/* ── HINT ── */
@keyframes hintBounce{
  0%,100%{transform:scale(1) rotate(0deg)}
  25%    {transform:scale(1.2) rotate(-8deg)}
  75%    {transform:scale(1.2) rotate(8deg)}
}
.cell.hint .gem{animation:hintBounce .45s ease-in-out 3;}

/* ── EXPLODE ── */
@keyframes gemExplode{
  0%  {transform:scale(1);   opacity:1;filter:brightness(1)}
  30% {transform:scale(1.5); opacity:1;filter:brightness(2.5) saturate(2)}
  60% {transform:scale(1.8); opacity:.5;filter:brightness(3)}
  100%{transform:scale(.1);  opacity:0;filter:brightness(4)}
}
.gem.exploding{
  animation:gemExplode .38s cubic-bezier(.4,0,1,1) forwards;
  z-index:10;
}

/* shockwave ring on explode */
.gem.exploding::after{
  animation:shockwave .38s ease-out forwards;
}
@keyframes shockwave{
  0%  {transform:scale(1);opacity:.8;width:30%;height:30%;top:10%;left:18%;}
  100%{transform:scale(4);opacity:0; width:30%;height:30%;top:10%;left:18%;}
}

/* ── FALL ── */
@keyframes gemFall{
  0%  {transform:translateY(var(--fall-from)) scaleY(.7) scaleX(1.2);opacity:0}
  60% {transform:translateY(4px) scaleY(1.05) scaleX(.97);opacity:1}
  80% {transform:translateY(-3px) scaleY(.97) scaleX(1.02)}
  100%{transform:translateY(0) scaleY(1) scaleX(1);opacity:1}
}
.gem.falling{
  animation:gemFall .42s cubic-bezier(.22,.6,.36,1) both;
}

/* ── SWAP ── */
@keyframes gemSwap{
  0%  {transform:translate(0,0)           scale(1)}
  40% {transform:translate(var(--sx),var(--sy)) scale(1.12)}
  100%{transform:translate(0,0)           scale(1)}
}
.gem.swapping{animation:gemSwap .2s cubic-bezier(.4,0,.2,1) both;}

/* ── BONUS GEMS ── */
/* Flame gem — orange pulsing ring */
@keyframes flamePulse{
  0%,100%{box-shadow:var(--gem-shadow),0 0 12px 4px rgba(255,140,20,.6),0 0 28px 8px rgba(255,80,0,.3)}
  50%    {box-shadow:var(--gem-shadow),0 0 20px 8px rgba(255,180,40,.8),0 0 45px 12px rgba(255,120,0,.5)}
}
.gem.flame{animation:flamePulse 1s ease-in-out infinite;}
.gem.flame .bonus-icon{content:'🔥';}

/* Star gem — spinning aura */
@keyframes starSpin{
  0%  {box-shadow:var(--gem-shadow),0 0 0 3px rgba(255,230,80,.9),0 0 25px 6px rgba(255,220,0,.5)}
  50% {box-shadow:var(--gem-shadow),0 0 0 3px rgba(255,255,150,.9),0 0 40px 12px rgba(255,240,80,.7)}
  100%{box-shadow:var(--gem-shadow),0 0 0 3px rgba(255,230,80,.9),0 0 25px 6px rgba(255,220,0,.5)}
}
.gem.star{animation:starSpin .8s ease-in-out infinite;}

/* Hyper gem — rainbow shifting */
@keyframes hyperRainbow{
  0%  {box-shadow:var(--gem-shadow),0 0 0 3px #ff4466,0 0 30px 8px rgba(255,40,80,.5)}
  25% {box-shadow:var(--gem-shadow),0 0 0 3px #44aaff,0 0 30px 8px rgba(40,150,255,.5)}
  50% {box-shadow:var(--gem-shadow),0 0 0 3px #44ffaa,0 0 30px 8px rgba(40,220,120,.5)}
  75% {box-shadow:var(--gem-shadow),0 0 0 3px #ff44ff,0 0 30px 8px rgba(200,40,255,.5)}
  100%{box-shadow:var(--gem-shadow),0 0 0 3px #ff4466,0 0 30px 8px rgba(255,40,80,.5)}
}
.gem.hyper{animation:hyperRainbow 1.2s linear infinite;}

/* bonus icon badge */
.bonus-icon{
  position:absolute;
  bottom:-1px;right:-1px;
  font-size:.55em;line-height:1;
  pointer-events:none;z-index:3;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,.8));
}

/* ── PARTICLES ── */
.spark{
  position:absolute;
  border-radius:50%;
  pointer-events:none;
  z-index:15;
  animation:sparkFly var(--dur,.5s) ease-out forwards;
}
@keyframes sparkFly{
  0%  {transform:translate(0,0) scale(1);opacity:1}
  100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}
}

/* ── SCORE POP ── */
@keyframes scoreFloat{
  0%  {transform:translateY(0)    scale(.6);opacity:1}
  20% {transform:translateY(-8px) scale(1.1);opacity:1}
  100%{transform:translateY(-55px) scale(.9);opacity:0}
}
.score-pop{
  position:absolute;pointer-events:none;
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(.75rem,.8rem,1rem);font-weight:700;
  background:linear-gradient(135deg,#fff8c0,#f0c040);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 6px rgba(240,192,64,.8));
  z-index:20;white-space:nowrap;
  animation:scoreFloat .85s cubic-bezier(.2,.8,.4,1) forwards;
}

/* ── COMBO BADGE ── */
@keyframes badgePop{
  0%  {transform:scale(0) rotate(-20deg);opacity:0}
  60% {transform:scale(1.2) rotate(3deg);opacity:1}
  100%{transform:scale(1)   rotate(0deg);opacity:1}
}
.combo-badge{
  position:absolute;top:-10px;right:-10px;
  background:linear-gradient(135deg,#ffd060,#ff6010);
  color:#000;font-family:'Cinzel Decorative',serif;
  font-size:.46rem;font-weight:900;padding:4px 10px;
  border-radius:20px;z-index:30;white-space:nowrap;
  animation:badgePop .4s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 3px 12px rgba(240,140,0,.5);
}

/* ── OVERLAY ── */
#overlay{
  display:none;position:absolute;inset:0;
  background:rgba(0,0,12,.92);
  border-radius:14px;flex-direction:column;align-items:center;
  justify-content:center;gap:14px;z-index:40;
  backdrop-filter:blur(4px);
}
#overlay.show{display:flex;}
#overlay h2{
  font-family:'Cinzel Decorative',serif;
  background:linear-gradient(135deg,#ffd060,#f0a020);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  font-size:1.4rem;text-align:center;
}
#overlay p{color:#5050a0;font-size:.82rem;text-align:center;}

@media(max-width:500px){
  .panel{flex-direction:row;width:100%;flex-wrap:wrap;}
  .sbox{flex:1;min-width:80px;}
  .btn{flex:1;min-width:80px;}
}
</style>
</head>
<body>
<h1>✦ GemBlast ✦</h1>
<p class="sub">Match 3 · Bonus Gems</p>

<div class="layout">
  <div class="panel">
    <div class="sbox">
      <div class="slabel">Scor</div>
      <div class="sval" id="elScore">0</div>
    </div>
    <div class="sbox">
      <div class="slabel">Nivel <span id="elLevel">1</span></div>
      <div class="lvlbg"><div class="lvlbar" id="elBar" style="width:0%"></div></div>
    </div>
    <div class="sbox">
      <div class="slabel">Record</div>
      <div class="sval" id="elBest">0</div>
    </div>
    <button class="btn gold" onclick="hint()">💡 Indiciu</button>
    <button class="btn" onclick="newGame()">↺ Joc Nou</button>
  </div>

  <div class="board-wrap" id="boardWrap">
    <div id="board"></div>
    <div id="overlay">
      <h2 id="ovTitle">Nicio mutare!</h2>
      <p id="ovSub"></p>
      <button class="btn gold" style="width:auto;padding:10px 24px" onclick="newGame()">Joacă din nou</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────
const R=8, C=8;
const GEM_COLORS=[
  // Ruby
  {
    bg:'radial-gradient(circle at 32% 28%, #ffaabb 0%, #ff2255 45%, #8a0020 100%)',
    shadow:'rgba(255,30,70,.75)',glow:'#ff2255',
    rim:'rgba(255,100,130,.4)'
  },
  // Sapphire
  {
    bg:'radial-gradient(circle at 32% 28%, #aaccff 0%, #1155ff 45%, #001090 100%)',
    shadow:'rgba(20,80,255,.75)',glow:'#2266ff',
    rim:'rgba(80,140,255,.4)'
  },
  // Emerald
  {
    bg:'radial-gradient(circle at 32% 28%, #aaffcc 0%, #11cc55 45%, #005522 100%)',
    shadow:'rgba(20,190,70,.75)',glow:'#22cc66',
    rim:'rgba(80,220,130,.4)'
  },
  // Topaz
  {
    bg:'radial-gradient(circle at 32% 28%, #fff0aa 0%, #ffcc00 45%, #885500 100%)',
    shadow:'rgba(240,180,0,.75)',glow:'#ffcc22',
    rim:'rgba(255,220,80,.4)'
  },
  // Amethyst
  {
    bg:'radial-gradient(circle at 32% 28%, #eaaaff 0%, #aa11ff 45%, #550099 100%)',
    shadow:'rgba(160,20,255,.75)',glow:'#bb44ff',
    rim:'rgba(200,100,255,.4)'
  },
  // Amber
  {
    bg:'radial-gradient(circle at 32% 28%, #ffcc99 0%, #ff6600 45%, #882200 100%)',
    shadow:'rgba(255,90,10,.75)',glow:'#ff7722',
    rim:'rgba(255,150,60,.4)'
  },
  // Aquamarine
  {
    bg:'radial-gradient(circle at 32% 28%, #aaffff 0%, #00ccee 45%, #005566 100%)',
    shadow:'rgba(0,190,220,.75)',glow:'#33ddff',
    rim:'rgba(80,230,255,.4)'
  },
];
const GN=GEM_COLORS.length;
const LVL=[0,500,1200,2200,3500,5200,7500,10500,14000,19000,99999];

// bonus encoding
const BF=100,BS=200,BH=300;
function gc(v){return v>=BH?0:v>=BS?v-BS:v>=BF?v-BF:v;}
function isB(v){return v>=BF;}

// ── STATE ─────────────────────────────────────────────────
let board=[], sel=null, busy=false, combo=0;
let score=0, best=+(localStorage.getItem('gb3')||0), level=1;
// DOM refs: cells[r][c] and gems[r][c]
let cells=[], gems=[];

// ── CELL SIZE ─────────────────────────────────────────────
let CS=52;
function calcCS(){
  const wrap=document.getElementById('boardWrap');
  const avail=Math.min(wrap.parentElement.clientWidth-160, 460);
  CS=Math.max(32, Math.floor((Math.max(avail,270)-3*7)/8));
  document.documentElement.style.setProperty('--cs', CS+'px');
}

// ── BUILD DOM BOARD (once) ────────────────────────────────
function buildDOM(){
  calcCS();
  const boardEl=document.getElementById('board');
  boardEl.innerHTML='';
  cells=[]; gems=[];
  for(let r=0;r<R;r++){
    cells.push([]); gems.push([]);
    for(let c=0;c<C;c++){
      const cell=document.createElement('div');
      cell.className='cell';
      const gem=document.createElement('div');
      gem.className='gem';
      cell.appendChild(gem);
      boardEl.appendChild(cell);
      cells[r].push(cell);
      gems[r].push(gem);
      // click handler
      ;(function(rr,cc){cell.addEventListener('click',()=>onClick(rr,cc));})(r,c);
    }
  }
}

// ── APPLY GEM VISUAL ──────────────────────────────────────
function applyGem(r,c){
  const v=board[r][c];
  const el=gems[r][c];
  if(v===-1){
    el.style.cssText='';
    el.className='gem';
    el.innerHTML='';
    return;
  }
  const col=GEM_COLORS[gc(v)];
  const bonusClass=v>=BH?' hyper':v>=BS?' star':v>=BF?' flame':'';
  const icon=v>=BH?'💥':v>=BS?'⭐':v>=BF?'🔥':'';

  // Multi-layer background: base gem + inner depth shadow
  el.style.background=col.bg;
  el.style.setProperty('--gem-shadow',
    `0 4px 16px ${col.shadow}, 0 2px 6px rgba(0,0,0,.5), inset 0 -2px 6px rgba(0,0,0,.3), inset 0 1px 2px ${col.rim}`
  );
  el.style.boxShadow=`var(--gem-shadow)`;

  el.className='gem'+bonusClass;

  // bonus icon
  el.innerHTML=icon ? `<span class="bonus-icon">${icon}</span>` : '';
}

// ── GRID INIT ─────────────────────────────────────────────
function rg(){return Math.floor(Math.random()*GN);}
function makeBoard(){
  board=[];
  for(let r=0;r<R;r++){
    board.push([]);
    for(let c=0;c<C;c++){
      let v;
      do{v=rg();}while(
        (c>=2&&gc(board[r][c-1])===v&&gc(board[r][c-2])===v)||
        (r>=2&&gc(board[r-1][c])===v&&gc(board[r-2][c])===v)
      );
      board[r].push(v);
    }
  }
  // apply visuals to all cells
  for(let r=0;r<R;r++) for(let c=0;c<C;c++) applyGem(r,c);
}

// ── SELECTION ─────────────────────────────────────────────
function setSel(r,c){
  clearSel();
  sel=[r,c];
  cells[r][c].classList.add('sel');
}
function clearSel(){
  if(sel) cells[sel[0]][sel[1]].classList.remove('sel');
  sel=null;
}

// ── CLICK ─────────────────────────────────────────────────
function onClick(r,c){
  if(busy||board[r][c]===-1)return;
  if(!sel){setSel(r,c);return;}
  const[sr,sc]=sel;
  if(sr===r&&sc===c){clearSel();return;}
  if(Math.abs(sr-r)+Math.abs(sc-c)===1){
    clearSel();
    doSwap(sr,sc,r,c);
  } else {
    setSel(r,c);
  }
}

// ── SWAP ──────────────────────────────────────────────────
function doSwap(r1,c1,r2,c2){
  busy=true;
  const dx=(c2-c1)*(CS+3), dy=(r2-r1)*(CS+3);
  // animate both gems
  animSwap(r1,c1, dx, dy);
  animSwap(r2,c2,-dx,-dy);
  setTimeout(()=>{
    // swap data
    const t=board[r1][c1];board[r1][c1]=board[r2][c2];board[r2][c2]=t;
    applyGem(r1,c1); applyGem(r2,c2);
    const m=findMatches();
    if(!m){
      // swap back
      animSwap(r1,c1,-dx,-dy);
      animSwap(r2,c2, dx, dy);
      setTimeout(()=>{
        const t2=board[r1][c1];board[r1][c1]=board[r2][c2];board[r2][c2]=t2;
        applyGem(r1,c1); applyGem(r2,c2);
        busy=false;
      },200);
    } else {
      combo=0;
      resolve(m);
    }
  },200);
}

function animSwap(r,c,dx,dy){
  const g=gems[r][c];
  g.style.setProperty('--sx',dx+'px');
  g.style.setProperty('--sy',dy+'px');
  g.classList.remove('swapping');
  void g.offsetWidth; // reflow just this element
  g.classList.add('swapping');
  setTimeout(()=>g.classList.remove('swapping'),200);
}

// ── MATCH FINDING ─────────────────────────────────────────
function findMatches(){
  const hG=[],vG=[];
  for(let r=0;r<R;r++){
    for(let c=0;c<C-2;){
      const v=board[r][c];if(v===-1){c++;continue;}
      const vc=gc(v);let l=1;
      while(c+l<C&&board[r][c+l]!==-1&&gc(board[r][c+l])===vc)l++;
      if(l>=3){const cells=[];for(let k=0;k<l;k++)cells.push([r,c+k]);hG.push({cells,len:l,color:vc});}
      c+=l;
    }
  }
  for(let c=0;c<C;c++){
    for(let r=0;r<R-2;){
      const v=board[r][c];if(v===-1){r++;continue;}
      const vc=gc(v);let l=1;
      while(r+l<R&&board[r+l][c]!==-1&&gc(board[r+l][c])===vc)l++;
      if(l>=3){const cells=[];for(let k=0;k<l;k++)cells.push([r+k,c]);vG.push({cells,len:l,color:vc});}
      r+=l;
    }
  }
  if(!hG.length&&!vG.length)return null;

  const hMap=new Map(),vMap=new Map();
  for(const g of hG)for(const[r,c]of g.cells)hMap.set(r*C+c,g);
  for(const g of vG)for(const[r,c]of g.cells)vMap.set(r*C+c,g);

  const done=new Set(), result=[];
  // L/T → hyper
  for(const[k,hg]of hMap){
    if(vMap.has(k)&&!done.has(k)){
      const vg=vMap.get(k);
      const idx=new Set([...hg.cells,...vg.cells].map(([r,c])=>r*C+c));
      const cls=[...idx].map(i=>[Math.floor(i/C),i%C]);
      const piv=[Math.floor(k/C),k%C];
      result.push({type:'hyper',cells:cls,pivot:piv,color:hg.color});
      for(const i of idx)done.add(i);
    }
  }
  for(const g of hG){
    const rem=g.cells.filter(([r,c])=>!done.has(r*C+c));
    if(rem.length<3)continue;
    const piv=rem[Math.floor(rem.length/2)];
    const type=g.len>=5?'star':g.len===4?'flame':'normal';
    result.push({type,cells:rem,pivot:piv,color:g.color});
    for(const[r,c]of rem)done.add(r*C+c);
  }
  for(const g of vG){
    const rem=g.cells.filter(([r,c])=>!done.has(r*C+c));
    if(rem.length<3)continue;
    const piv=rem[Math.floor(rem.length/2)];
    const type=g.len>=5?'star':g.len===4?'flame':'normal';
    result.push({type,cells:rem,pivot:piv,color:g.color});
    for(const[r,c]of rem)done.add(r*C+c);
  }
  return result.length?result:null;
}

// ── CASCADE ───────────────────────────────────────────────
function expandBonus(r,c,v,dst){
  if(v>=BH){
    for(let cc=0;cc<C;cc++)dst.add(r*C+cc);
    for(let rr=0;rr<R;rr++)dst.add(rr*C+c);
  } else if(v>=BS){
    const col=v-BS;
    for(let rr=0;rr<R;rr++)for(let cc=0;cc<C;cc++)
      if(gc(board[rr][cc])===col)dst.add(rr*C+cc);
  } else if(v>=BF){
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
      const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<R&&nc>=0&&nc<C)dst.add(nr*C+nc);
    }
  }
}

function resolve(groups){
  combo++;
  let pts=0;
  for(const g of groups){
    const lb=g.cells.length>=5?4:g.cells.length===4?2:1;
    pts+=g.cells.length*10*lb;
  }
  pts=Math.round(pts*combo);
  score+=pts;
  if(score>best){best=score;localStorage.setItem('gb3',best);}
  updateUI();
  showScore(groups,pts,combo);

  // build destroy set
  const dst=new Set();
  const newB=[];
  for(const g of groups){
    for(const[r,c]of g.cells){
      dst.add(r*C+c);
      if(isB(board[r][c]))expandBonus(r,c,board[r][c],dst);
    }
    if(g.type!=='normal')newB.push({r:g.pivot[0],c:g.pivot[1],btype:g.type,color:g.color});
  }

  // explode
  let pending=0;
  for(const idx of dst){
    const r=Math.floor(idx/C),c=idx%C;
    if(board[r][c]!==-1)pending++;
  }
  if(!pending){gravity(dst,newB);return;}

  let done=0;
  for(const idx of dst){
    const r=Math.floor(idx/C),c=idx%C;
    if(board[r][c]===-1)continue;
    const g=gems[r][c];
    // spawn sparks before exploding
    spawnSparks(r,c,gc(board[r][c]));
    g.classList.remove('exploding');
    void g.offsetWidth;
    g.classList.add('exploding');
    board[r][c]=-1;
    setTimeout(()=>{
      applyGem(r,c);
      if(++done===pending){
        // place bonus gems
        for(const{r:br,c:bc,btype,color}of newB){
          if(board[br][bc]===-1){
            board[br][bc]=btype==='star'?BS+color:btype==='hyper'?BH:BF+color;
            dst.delete(br*C+bc);
          }
        }
        gravity(dst,[]);
      }
    },380);
  }
}

function gravity(matchSet,_){
  const step=CS+3;
  const jobs=[];
  for(let c=0;c<C;c++){
    const stack=[];
    for(let r=R-1;r>=0;r--)if(board[r][c]!==-1)stack.push(board[r][c]);
    while(stack.length<R)stack.push(rg());
    for(let r=R-1;r>=0;r--){
      const nv=stack[R-1-r];
      let eb=0;for(let rr=r+1;rr<R;rr++)if(matchSet.has(rr*C+c))eb++;
      const wasMatch=matchSet.has(r*C+c);
      board[r][c]=nv;
      if(wasMatch||eb>0){
        const fy=wasMatch?-(r+1)*step:-eb*step;
        jobs.push({r,c,fy,delay:(R-1-r)*20});
      }
    }
  }

  if(!jobs.length){chain();return;}

  // apply new visuals first (gems are hidden during fall start)
  for(const{r,c}of jobs) applyGem(r,c);

  let landed=0;
  for(const{r,c,fy,delay}of jobs){
    setTimeout(()=>{
      const g=gems[r][c];
      g.style.setProperty('--fall-from',fy+'px');
      g.classList.remove('falling');
      void g.offsetWidth;
      g.classList.add('falling');
      setTimeout(()=>{
        g.classList.remove('falling');
        if(++landed===jobs.length)chain();
      },380);
    },delay);
  }
}

function chain(){
  const nm=findMatches();
  if(nm){resolve(nm);}
  else{combo=0;busy=false;if(!hasMoves())noMoves();}
}

// ── PARTICLES / SCORE POPUP ───────────────────────────────
function showScore(groups,pts,combo){
  const wrap=document.getElementById('boardWrap');
  // remove old badge
  const old=wrap.querySelector('.combo-badge');if(old)old.remove();

  // score pop
  const allC=groups.flatMap(g=>g.cells);
  const mr=Math.round(allC.reduce((s,[r])=>s+r,0)/allC.length);
  const mc=Math.round(allC.reduce((s,[,c])=>s+c,0)/allC.length);
  const cell=cells[mr][mc];
  const cr=cell.getBoundingClientRect();
  const wr=wrap.getBoundingClientRect();
  const pop=document.createElement('div');
  pop.className='score-pop';
  const pre=groups.some(g=>g.type==='hyper')?'💥 ':groups.some(g=>g.type==='star')?'⭐ ':groups.some(g=>g.type==='flame')?'🔥 ':'';
  pop.textContent=pre+(combo>1?`×${combo} `:'')+'+'+pts;
  pop.style.left=(cr.left-wr.left+cr.width/2-20)+'px';
  pop.style.top=(cr.top-wr.top)+'px';
  wrap.appendChild(pop);
  setTimeout(()=>pop.remove(),850);

  // combo badge
  if(combo>1||groups.some(g=>g.type!=='normal')){
    const badge=document.createElement('div');
    badge.className='combo-badge';
    const isHy=groups.some(g=>g.type==='hyper');
    const isSt=groups.some(g=>g.type==='star');
    const isFl=groups.some(g=>g.type==='flame');
    badge.textContent=isHy?'💥 Hypercube!':isSt?'⭐ Star Gem!':isFl?'🔥 Flame Gem!':`${combo}× Combo!`;
    wrap.appendChild(badge);
    setTimeout(()=>badge.remove(),1400);
  }
}

// ── SPARKS ────────────────────────────────────────────────
function spawnSparks(r,c,colorIdx){
  const wrap=document.getElementById('boardWrap');
  const cell=cells[r][c];
  const cr=cell.getBoundingClientRect();
  const wr=wrap.getBoundingClientRect();
  const cx=cr.left-wr.left+cr.width/2;
  const cy=cr.top-wr.top+cr.height/2;
  const colors=[
    GEM_COLORS[colorIdx].glow,
    '#ffffff',
    GEM_COLORS[colorIdx].glow,
    '#ffeeaa',
  ];
  const count=10+Math.floor(Math.random()*6);
  for(let i=0;i<count;i++){
    const spark=document.createElement('div');
    spark.className='spark';
    const angle=Math.random()*Math.PI*2;
    const dist=20+Math.random()*35;
    const size=2+Math.random()*4;
    const dur=(.28+Math.random()*.3).toFixed(2);
    spark.style.cssText=`
      left:${cx}px;top:${cy}px;
      width:${size}px;height:${size}px;
      background:${colors[i%colors.length]};
      --dx:${(Math.cos(angle)*dist).toFixed(1)}px;
      --dy:${(Math.sin(angle)*dist).toFixed(1)}px;
      --dur:${dur}s;
      box-shadow:0 0 4px ${colors[i%colors.length]};
    `;
    wrap.appendChild(spark);
    setTimeout(()=>spark.remove(), +dur*1000+50);
  }
}

// ── HINT ─────────────────────────────────────────────────
function hint(){
  if(busy)return;
  const f=findHint();
  if(!f)return;
  const[[r1,c1],[r2,c2]]=f;
  cells[r1][c1].classList.add('hint');
  cells[r2][c2].classList.add('hint');
  setTimeout(()=>{
    cells[r1][c1].classList.remove('hint');
    cells[r2][c2].classList.remove('hint');
  },1200);
}
function findHint(){
  for(let r=0;r<R;r++)for(let c=0;c<C;c++){
    for(const[nr,nc]of[[r,c+1],[r+1,c]]){
      if(nr>=R||nc>=C)continue;
      const t=board[r][c];board[r][c]=board[nr][nc];board[nr][nc]=t;
      const ok=!!findMatches();
      board[nr][nc]=board[r][c];board[r][c]=t;
      if(ok)return[[r,c],[nr,nc]];
    }
  }
  return null;
}
function hasMoves(){
  for(let r=0;r<R;r++)for(let c=0;c<C;c++){
    for(const[nr,nc]of[[r,c+1],[r+1,c]]){
      if(nr>=R||nc>=C)continue;
      const t=board[r][c];board[r][c]=board[nr][nc];board[nr][nc]=t;
      const ok=!!findMatches();
      board[nr][nc]=board[r][c];board[r][c]=t;
      if(ok)return true;
    }
  }
  return false;
}

// ── UI ────────────────────────────────────────────────────
function updateUI(){
  document.getElementById('elScore').textContent=score.toLocaleString();
  document.getElementById('elBest').textContent=best.toLocaleString();
  const lv=LVL.findIndex(v=>score<v);
  const cl=Math.max(1,(lv<0?LVL.length-1:lv)-1);
  level=Math.max(level,cl);
  document.getElementById('elLevel').textContent=level;
  const lo=LVL[level-1]||0,hi=LVL[level]||99999;
  document.getElementById('elBar').style.width=Math.min(100,Math.round((score-lo)/(hi-lo)*100))+'%';
}
function noMoves(){
  document.getElementById('ovTitle').textContent='Nicio mutare!';
  document.getElementById('ovSub').textContent='Scor: '+score;
  document.getElementById('overlay').classList.add('show');
  setTimeout(()=>{document.getElementById('overlay').classList.remove('show');newGame();},2500);
}

// ── NEW GAME ─────────────────────────────────────────────
function newGame(){
  document.getElementById('overlay').classList.remove('show');
  score=0;level=1;combo=0;sel=null;busy=false;
  makeBoard();
  updateUI();
}

// ── INIT ─────────────────────────────────────────────────
buildDOM();
newGame();
window.addEventListener('resize',()=>{
  calcCS();
  // re-apply cell sizes (CSS var updates automatically)
});
