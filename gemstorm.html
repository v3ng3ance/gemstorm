<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GemBlast ✦</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Raleway:wght@400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#f0c040;--panel:#12122a;--border:#2a2a5a;--text:#c8c8ff;--dim:#5050a0;--cs:52px;}
body{min-height:100vh;background:radial-gradient(ellipse 120% 80% at 50% 0%,#1a0a3a,#0a0818 60%,#050510);
  color:var(--text);font-family:'Raleway',sans-serif;
  display:flex;flex-direction:column;align-items:center;padding:14px 8px 40px;gap:10px;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;
  background-image:radial-gradient(1px 1px at 15% 20%,rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 40% 60%,rgba(200,180,255,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 70% 30%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 85% 75%,rgba(255,255,255,.4) 0%,transparent 100%);}
h1{font-family:'Cinzel Decorative',serif;font-size:clamp(1.2rem,4vw,1.8rem);letter-spacing:.12em;
  color:var(--gold);text-shadow:0 0 24px rgba(240,192,64,.7);text-align:center;position:relative;z-index:1;}
.subtitle{font-size:.6rem;letter-spacing:.25em;text-transform:uppercase;color:var(--dim);text-align:center;position:relative;z-index:1;}
.mode-screen{position:relative;z-index:1;width:100%;max-width:500px;display:flex;flex-direction:column;align-items:center;gap:14px;}
.mode-intro{font-size:.62rem;letter-spacing:.28em;text-transform:uppercase;color:var(--dim);}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;}
.mode-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px 12px;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all .2s;text-align:center;}
.mode-card:hover{border-color:#6040ff;box-shadow:0 0 20px rgba(80,40,200,.4);transform:translateY(-2px);}
.mode-icon{font-size:1.8rem;}.mode-title{font-family:'Cinzel Decorative',serif;font-size:.68rem;color:var(--gold);}
.mode-desc{font-size:.58rem;color:var(--dim);line-height:1.45;}
.game-wrap{display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap;justify-content:center;
  position:relative;z-index:1;width:100%;max-width:760px;}
.side-panel{display:flex;flex-direction:column;gap:10px;min-width:120px;max-width:140px;flex:1;}
.stat-box{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:10px 12px;text-align:center;}
.stat-label{font-size:.54rem;letter-spacing:.28em;text-transform:uppercase;color:var(--dim);margin-bottom:3px;}
.stat-val{font-family:'Cinzel Decorative',serif;font-size:1.3rem;color:var(--gold);}
.stat-val.timer-low{color:#ff4444!important;animation:timerPulse .5s ease-in-out infinite;}
@keyframes timerPulse{0%,100%{opacity:1}50%{opacity:.5}}
.level-bar-wrap{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:10px 12px;}
.level-bar-bg{height:6px;background:#1e1e40;border-radius:3px;margin-top:6px;overflow:hidden;}
.level-bar-fill{height:100%;background:linear-gradient(90deg,#8060ff,#f0c040);border-radius:3px;transition:width .5s ease;}
.btn{background:linear-gradient(135deg,#2a1a60,#1a0a40);border:1px solid var(--border);color:var(--text);
  font-family:'Raleway',sans-serif;font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;
  padding:8px 12px;border-radius:8px;cursor:pointer;transition:all .2s;width:100%;}
.btn:hover{background:linear-gradient(135deg,#3a2a80,#2a1a60);color:#fff;}
.btn.gold{background:linear-gradient(135deg,#6a4a00,#4a3000);border-color:var(--gold);color:var(--gold);}
.board-wrap{position:relative;border:2px solid #3a3a7a;border-radius:16px;padding:8px;
  background:radial-gradient(ellipse at 50% 30%,#1a1040,#080618);
  box-shadow:0 0 60px rgba(60,20,160,.5),inset 0 0 60px rgba(0,0,0,.6);}
#board{display:grid;grid-template-columns:repeat(8,var(--cs));grid-template-rows:repeat(8,var(--cs));
  gap:3px;position:relative;}
.cell{width:var(--cs);height:var(--cs);position:relative;cursor:pointer;border-radius:6px;}
.cell::before{content:'';position:absolute;inset:0;border-radius:6px;background:rgba(255,255,255,.02);}
/* Gem is a canvas element inside each cell */
.gem-canvas{position:absolute;inset:3%;width:94%;height:94%;border-radius:8%;
  will-change:transform,opacity;transition:none;}
.combo-badge{position:absolute;top:-8px;right:-8px;
  background:linear-gradient(135deg,#f0c040,#ff7010);color:#000;
  font-family:'Cinzel Decorative',serif;font-size:.5rem;font-weight:900;
  padding:4px 10px;border-radius:20px;z-index:25;white-space:nowrap;
  animation:badgePop .42s cubic-bezier(.34,1.56,.64,1);box-shadow:0 3px 12px rgba(240,140,0,.5);}
@keyframes badgePop{0%{transform:scale(0) rotate(-15deg);opacity:0}60%{transform:scale(1.2) rotate(3deg);opacity:1}100%{transform:scale(1) rotate(0deg);opacity:1}}
@keyframes luAnim{0%{transform:translate(-50%,-50%) scale(0);opacity:0}18%{transform:translate(-50%,-50%) scale(1.25);opacity:1}75%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-62%) scale(.85);opacity:0}}
.lu-banner{position:absolute;top:50%;left:50%;pointer-events:none;z-index:50;text-align:center;animation:luAnim 2s ease forwards;}
.lu-title{display:block;font-family:'Cinzel Decorative',serif;font-size:clamp(1.2rem,4vw,1.8rem);color:var(--gold);text-shadow:0 0 20px rgba(240,192,64,.8);white-space:nowrap;}
.lu-sub{display:block;font-size:.7rem;color:var(--gold);letter-spacing:.15em;margin-top:4px;}
.bonus-tip{position:absolute;background:rgba(10,6,30,.95);border:1px solid rgba(200,150,255,.4);
  border-radius:10px;padding:8px 12px;font-size:.68rem;color:#e0d0ff;line-height:1.5;
  z-index:60;pointer-events:none;max-width:160px;text-align:center;
  box-shadow:0 4px 20px rgba(0,0,0,.6);white-space:nowrap;}
.bonus-tip strong{display:block;margin-bottom:2px;font-family:'Cinzel Decorative',serif;font-size:.6rem;color:var(--gold);}
.area-hl{position:absolute;border-radius:4px;pointer-events:none;z-index:5;
  background:rgba(255,180,40,.18);box-shadow:inset 0 0 0 2px rgba(255,180,40,.5);}
.area-hl.cross-h{background:rgba(80,180,255,.18);box-shadow:inset 0 0 0 2px rgba(80,180,255,.5);}
.area-hl.cross-v{background:rgba(200,80,255,.18);box-shadow:inset 0 0 0 2px rgba(200,80,255,.5);}
#message{display:none;position:absolute;inset:0;background:rgba(0,0,12,.9);border-radius:14px;
  flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:40;backdrop-filter:blur(4px);}
#message.visible{display:flex;}
#message h2{font-family:'Cinzel Decorative',serif;color:var(--gold);font-size:1.3rem;text-align:center;}
#message p{color:var(--dim);font-size:.8rem;text-align:center;padding:0 16px;}
#message .btn{width:auto;padding:10px 26px;margin-top:4px;}
.score-pop{position:absolute;pointer-events:none;z-index:30;white-space:nowrap;
  font-family:'Cinzel Decorative',serif;font-size:.9rem;font-weight:700;color:#f0c040;
  text-shadow:0 0 8px rgba(240,192,64,.9);}
.spark{position:absolute;border-radius:50%;pointer-events:none;z-index:20;
  animation:sparkFly var(--dur,.5s) ease-out forwards;}
@keyframes sparkFly{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}
.glow-ring{position:absolute;border-radius:50%;pointer-events:none;z-index:19;
  background:transparent;border-width:3px;border-style:solid;
  animation:glowExpand .6s ease-out forwards;}
@keyframes glowExpand{0%{transform:translate(-50%,-50%) scale(.1);opacity:.9}100%{transform:translate(-50%,-50%) scale(3.2);opacity:0}}
@media(max-width:560px){
  .game-wrap{flex-direction:column;align-items:center;}
  .side-panel{flex-direction:row;max-width:100%;min-width:0;flex-wrap:wrap;justify-content:center;width:100%;}
  .stat-box,.level-bar-wrap{flex:1;min-width:80px;}
  .btn{font-size:.6rem;padding:7px 10px;}
}
</style>
</head>
<body>
<h1>✦ GemBlast ✦</h1>
<p class="subtitle" id="subtitle">Match 3 · Bonus Gems</p>
<div id="modeScreen" class="mode-screen">
  <p class="mode-intro">Alege modul de joc</p>
  <div class="mode-grid">
    <button class="mode-card" onclick="startMode('classic')"><span class="mode-icon">♾️</span><span class="mode-title">Clasic</span><span class="mode-desc">Joc infinit fără limite.</span></button>
    <button class="mode-card" onclick="startMode('moves')"><span class="mode-icon">🎯</span><span class="mode-title">Mutări</span><span class="mode-desc">30 de mutări. Maximizează scorul!</span></button>
    <button class="mode-card" onclick="startMode('timer')"><span class="mode-icon">⏱️</span><span class="mode-title">Timp</span><span class="mode-desc">60 secunde. Fiecare match adaugă timp!</span></button>
    <button class="mode-card" onclick="startMode('objective')"><span class="mode-icon">🏆</span><span class="mode-title">Obiective</span><span class="mode-desc">Colectează gem-uri specifice!</span></button>
  </div>
</div>
<div id="gameWrap" class="game-wrap" style="display:none">
  <div class="side-panel">
    <div class="stat-box"><div class="stat-label">Scor</div><div class="stat-val" id="score-disp">0</div></div>
    <div class="level-bar-wrap"><div class="stat-label">Nivel <span id="level-disp">1</span></div><div class="level-bar-bg"><div class="level-bar-fill" id="level-bar" style="width:0%"></div></div></div>
    <div class="stat-box" id="box-moves" style="display:none"><div class="stat-label">Mutări</div><div class="stat-val" id="moves-disp">30</div></div>
    <div class="stat-box" id="box-timer" style="display:none"><div class="stat-label">Timp</div><div class="stat-val" id="timer-disp">60</div></div>
    <div class="stat-box" id="box-obj" style="display:none"><div class="stat-label" id="obj-label">Obiectiv</div><div class="stat-val" id="obj-disp">0/20</div></div>
    <div class="stat-box"><div class="stat-label">Record</div><div class="stat-val" id="best-disp">0</div></div>
    <button class="btn gold" onclick="G.hint()">💡 Indiciu</button>
    <button class="btn" onclick="G.newGame()">↺ Restart</button>
    <button class="btn" onclick="backToMenu()">☰ Meniu</button>
  </div>
  <div class="board-wrap" id="boardWrap">
    <div id="board"></div>
    <div id="message">
      <h2 id="msg-title">Game Over</h2><p id="msg-sub"></p>
      <button class="btn gold" onclick="G.newGame()">Joacă din nou</button>
      <button class="btn" onclick="backToMenu()" style="margin-top:4px">☰ Meniu</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  GEM RENDERER — Per-pixel shading on individual <canvas> elements
//  Each gem cell has its own canvas. Drawing uses layered techniques:
//  1. Shape clip  2. Radial body  3. Facet polygons  4. Fresnel rim
//  5. Caustic inner glow  6. Primary specular  7. Secondary spec dot
//  Animations use spring physics for natural motion.
// ═══════════════════════════════════════════════════════════════

// Light direction (normalized, from top-left)
const LIGHT = { x: -0.6, y: -0.75, z: 0.5 };

// Gem palette: [shadow, deep, base, mid, bright, flare, glow, rimColor]
const GEM_PAL = [
  // 0 RED
  ['#3a0008','#880018','#cc0030','#ff3355','#ff99aa','#ffd0d8','rgba(255,20,50,.9)','#ff6680'],
  // 1 BLUE
  ['#000a44','#001888','#1144cc','#2266ff','#88aaff','#ccdeff','rgba(30,90,255,.9)','#5588ff'],
  // 2 GREEN
  ['#001a08','#003a15','#007730','#00bb55','#66ee99','#c0ffd8','rgba(0,190,70,.9)','#33cc66'],
  // 3 YELLOW
  ['#3a2800','#886600','#ccaa00','#ffcc00','#ffee77','#fffacc','rgba(230,185,0,.9)','#ffdd44'],
  // 4 PURPLE
  ['#1a003a','#440088','#7700bb','#aa33ee','#dd88ff','#f5ccff','rgba(160,30,255,.9)','#cc66ff'],
  // 5 ORANGE
  ['#3a1000','#882200','#cc4400','#ff7700','#ffaa55','#ffd8aa','rgba(255,90,0,.9)','#ff9944'],
  // 6 WHITE
  ['#2a2a2a','#666666','#999999','#cccccc','#eeeeee','#ffffff','rgba(200,200,200,.9)','#dddddd'],
];

// Shape definitions — returns path data for gem silhouette
// Each shape has different facet geometry for depth
const SHAPES = [
  // 0: Rounded square
  { clip:(ctx,cx,cy,r)=>{
      const k=r*.32;
      ctx.beginPath();ctx.moveTo(cx-r+k,cy-r);ctx.lineTo(cx+r-k,cy-r);
      ctx.arcTo(cx+r,cy-r,cx+r,cy-r+k,k);ctx.lineTo(cx+r,cy+r-k);
      ctx.arcTo(cx+r,cy+r,cx+r-k,cy+r,k);ctx.lineTo(cx-r+k,cy+r);
      ctx.arcTo(cx-r,cy+r,cx-r,cy+r-k,k);ctx.lineTo(cx-r,cy-r+k);
      ctx.arcTo(cx-r,cy-r,cx-r+k,cy-r,k);ctx.closePath();},
    facets:(cx,cy,r)=>[
      {pts:[[cx-r*.55,cy-r],[cx+r*.55,cy-r],[cx+r,cy-r*.55],[cx+r,cy+r*.55],[cx+r*.55,cy+r],[cx-r*.55,cy+r],[cx-r,cy+r*.55],[cx-r,cy-r*.55]],bri:.0},
      {pts:[[cx-r*.3,cy-r*.7],[cx+r*.3,cy-r*.7],[cx+r*.6,cy-r*.3],[cx+r*.6,cy+r*.3],[cx+r*.3,cy+r*.7],[cx-r*.3,cy+r*.7],[cx-r*.6,cy+r*.3],[cx-r*.6,cy-r*.3]],bri:.35},
      {pts:[[cx-r*.1,cy-r*.45],[cx+r*.1,cy-r*.45],[cx+r*.35,cy-r*.1],[cx+r*.35,cy+r*.1],[cx+r*.1,cy+r*.45],[cx-r*.1,cy+r*.45],[cx-r*.35,cy+r*.1],[cx-r*.35,cy-r*.1]],bri:.7},
    ]
  },
  // 1: Diamond (Bejeweled classic)
  { clip:(ctx,cx,cy,r)=>{
      ctx.beginPath();ctx.moveTo(cx,cy-r);
      ctx.lineTo(cx+r*.82,cy-r*.18);ctx.lineTo(cx+r*.6,cy+r*.85);
      ctx.lineTo(cx,cy+r*.55);ctx.lineTo(cx-r*.6,cy+r*.85);
      ctx.lineTo(cx-r*.82,cy-r*.18);ctx.closePath();},
    facets:(cx,cy,r)=>[
      // crown faces
      {pts:[[cx,cy-r],[cx+r*.82,cy-r*.18],[cx+r*.4,cy-r*.04]],bri:.6},
      {pts:[[cx,cy-r],[cx-r*.82,cy-r*.18],[cx-r*.4,cy-r*.04]],bri:.8},
      {pts:[[cx+r*.82,cy-r*.18],[cx+r*.6,cy+r*.85],[cx+r*.35,cy+r*.3],[cx+r*.4,cy-r*.04]],bri:-.1},
      {pts:[[cx-r*.82,cy-r*.18],[cx-r*.6,cy+r*.85],[cx-r*.35,cy+r*.3],[cx-r*.4,cy-r*.04]],bri:.2},
      {pts:[[cx,cy-r],[cx+r*.4,cy-r*.04],[cx,cy+r*.1],[cx-r*.4,cy-r*.04]],bri:.9},
      // pavilion
      {pts:[[cx+r*.6,cy+r*.85],[cx,cy+r*.55],[cx+r*.35,cy+r*.3]],bri:-.3},
      {pts:[[cx-r*.6,cy+r*.85],[cx,cy+r*.55],[cx-r*.35,cy+r*.3]],bri:-.2},
      {pts:[[cx+r*.4,cy-r*.04],[cx+r*.35,cy+r*.3],[cx,cy+r*.1]],bri:-.05},
      {pts:[[cx-r*.4,cy-r*.04],[cx-r*.35,cy+r*.3],[cx,cy+r*.1]],bri:.05},
    ]
  },
  // 2: Circle
  { clip:(ctx,cx,cy,r)=>{ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);},
    facets:(cx,cy,r)=>{
      const f=[];
      for(let i=0;i<12;i++){
        const a=i/12*Math.PI*2,b=(i+1)/12*Math.PI*2;
        const bri=Math.cos(a+Math.PI*.3+.2)*.55;
        f.push({pts:[[cx,cy],[cx+Math.cos(a)*r,cy+Math.sin(a)*r],[cx+Math.cos(b)*r,cy+Math.sin(b)*r]],bri});
      }
      // inner ring facets
      for(let i=0;i<8;i++){
        const a=i/8*Math.PI*2,b=(i+1)/8*Math.PI*2;
        const bri=Math.cos(a+Math.PI*.3)*.35+.1;
        f.push({pts:[[cx+Math.cos(a)*r*.55,cy+Math.sin(a)*r*.55],[cx+Math.cos(a)*r*.3,cy+Math.sin(a)*r*.3],[cx+Math.cos(b)*r*.3,cy+Math.sin(b)*r*.3],[cx+Math.cos(b)*r*.55,cy+Math.sin(b)*r*.55]],bri});
      }
      return f;}
  },
  // 3: Rhombus (rotated square)
  { clip:(ctx,cx,cy,r)=>{
      ctx.beginPath();ctx.moveTo(cx,cy-r);ctx.lineTo(cx+r*.9,cy);
      ctx.lineTo(cx,cy+r);ctx.lineTo(cx-r*.9,cy);ctx.closePath();},
    facets:(cx,cy,r)=>[
      {pts:[[cx,cy-r],[cx+r*.9,cy],[cx,cy]],bri:.75},
      {pts:[[cx,cy-r],[cx-r*.9,cy],[cx,cy]],bri:.9},
      {pts:[[cx+r*.9,cy],[cx,cy+r],[cx,cy]],bri:-.25},
      {pts:[[cx-r*.9,cy],[cx,cy+r],[cx,cy]],bri:-.1},
      {pts:[[cx,cy-r*.5],[cx+r*.45,cy],[cx,cy+r*.5],[cx-r*.45,cy]],bri:.5},
    ]
  },
  // 4: Triangle
  { clip:(ctx,cx,cy,r)=>{
      ctx.beginPath();ctx.moveTo(cx,cy-r);
      ctx.lineTo(cx+r*.92,cy+r*.72);ctx.lineTo(cx-r*.92,cy+r*.72);
      ctx.closePath();},
    facets:(cx,cy,r)=>[
      {pts:[[cx,cy-r],[cx+r*.92,cy+r*.72],[cx+r*.45,cy+r*.1]],bri:-.1},
      {pts:[[cx,cy-r],[cx-r*.92,cy+r*.72],[cx-r*.45,cy+r*.1]],bri:.6},
      {pts:[[cx,cy-r],[cx+r*.45,cy+r*.1],[cx,cy+r*.05],[cx-r*.45,cy+r*.1]],bri:.9},
      {pts:[[cx+r*.92,cy+r*.72],[cx-r*.92,cy+r*.72],[cx,cy+r*.72]],bri:-.3},
      {pts:[[cx+r*.45,cy+r*.1],[cx,cy+r*.72],[cx-r*.45,cy+r*.1]],bri:.1},
    ]
  },
  // 5: Hexagon
  { clip:(ctx,cx,cy,r)=>{
      ctx.beginPath();
      for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6;i===0?ctx.moveTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r):ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);}
      ctx.closePath();},
    facets:(cx,cy,r)=>{
      const pts=(a)=>[cx+Math.cos(a*Math.PI/3-Math.PI/6)*r,cy+Math.sin(a*Math.PI/3-Math.PI/6)*r];
      const bris=[.8,.4,.15,-.2,-.35,-.05];
      return Array.from({length:6},(_,i)=>({pts:[pts(i),pts(i+1),[cx,cy]],bri:bris[i]}));}
  },
  // 6: Oval (white/silver)
  { clip:(ctx,cx,cy,r)=>{ctx.beginPath();ctx.ellipse(cx,cy,r*.82,r,0,0,Math.PI*2);},
    facets:(cx,cy,r)=>{
      const f=[];
      for(let i=0;i<10;i++){
        const a=i/10*Math.PI*2,b=(i+1)/10*Math.PI*2;
        const bri=Math.cos(a+Math.PI*.25+.15)*.6;
        f.push({pts:[[cx,cy],[cx+Math.cos(a)*r*.82,cy+Math.sin(a)*r],[cx+Math.cos(b)*r*.82,cy+Math.sin(b)*r]],bri});
      }
      return f;}
  },
];

// Pre-render gems to ImageBitmap for fast blitting
const GEM_CACHE={};
let _cacheBuilt=false;

function renderGemToCanvas(vc,sz,bonus){
  const key=`${vc}_${sz}_${bonus}`;
  if(GEM_CACHE[key])return GEM_CACHE[key];
  const dim=sz*2+20;
  const oc=new OffscreenCanvas(dim,dim);
  const ox=oc.getContext('2d');
  const cx=dim/2,cy=dim/2,r=sz*.88;
  const pal=bonus==='hyper'?['#1a003a','#440088','#7700bb','#aa33ee','#dd88ff','#f5ccff','rgba(160,30,255,.9)','#cc66ff']:
             bonus==='bomb'?['#2a0000','#660000','#aa1100','#dd2200','#ff7755','#ffc8b0','rgba(220,30,0,.9)','#ff6644']:
             GEM_PAL[vc];
  const [SH,DP,BA,MI,BR,FL,GW,RM]=pal;
  const shape=SHAPES[vc]||SHAPES[2];

  // helper to mix two hex colors
  function mixHex(a,b,t){
    const pa=parseInt(a.slice(1),16),pb=parseInt(b.slice(1),16);
    const ra=(pa>>16)&255,ga=(pa>>8)&255,ba2=pa&255;
    const rb=(pb>>16)&255,gb=(pb>>8)&255,bb2=pb&255;
    const r2=Math.round(ra+(rb-ra)*t),g2=Math.round(ga+(gb-ga)*t),b2=Math.round(ba2+(bb2-ba2)*t);
    return`rgb(${r2},${g2},${b2})`;
  }
  function briToColor(bri){
    // bri: -1(shadow)..0(base)..1(flare)
    if(bri>0.7)return mixHex(BR,FL,(bri-.7)/.3);
    if(bri>0.0)return mixHex(MI,BR,bri/.7);
    if(bri>-.4)return mixHex(BA,MI,(bri+.4)/.4);  // wait, mix BA→MI not MI→BA
    if(bri>-.4)return mixHex(DP,BA,(bri+1)/.6);
    return mixHex(SH,DP,(bri+1)/.6);
  }

  // 1. Background glow halo
  const halo=ox.createRadialGradient(cx,cy,r*.3,cx,cy,r*1.6);
  halo.addColorStop(0,GW.replace(',.9)',', .6)').replace(',.8)',', .6)'));
  halo.addColorStop(1,'rgba(0,0,0,0)');
  ox.fillStyle=halo;ox.beginPath();ox.arc(cx,cy,r*1.6,0,Math.PI*2);ox.fill();

  // 2. Draw each facet polygon
  const facets=shape.facets(cx,cy,r);
  for(const{pts,bri} of facets){
    if(!pts||pts.length<2)continue;
    ox.beginPath();ox.moveTo(pts[0][0],pts[0][1]);
    for(let i=1;i<pts.length;i++)ox.lineTo(pts[i][0],pts[i][1]);
    ox.closePath();
    // clip to gem shape first
    ox.save();shape.clip(ox,cx,cy,r);ox.clip();
    ox.fillStyle=briToColor(bri);
    ox.fill();
    // subtle edge between facets
    ox.strokeStyle=bri>0.2?'rgba(255,255,255,.18)':'rgba(0,0,0,.22)';
    ox.lineWidth=.7;ox.stroke();
    ox.restore();
  }

  // 3. Fresnel rim glow (bright edge)
  ox.save();shape.clip(ox,cx,cy,r);ox.clip();
  const rim=ox.createRadialGradient(cx,cy,r*.62,cx,cy,r*1.01);
  rim.addColorStop(0,'rgba(0,0,0,0)');
  rim.addColorStop(.7,'rgba(0,0,0,0)');
  rim.addColorStop(1,RM.replace('#','rgba(').replace(/(..)(..)(..)$/,(m,r2,g2,b2)=>
    `${parseInt(r2,16)},${parseInt(g2,16)},${parseInt(b2,16)},.45)`));
  ox.fillStyle=rim;ox.fillRect(0,0,dim,dim);
  ox.restore();

  // 4. Inner caustic glow
  ox.save();shape.clip(ox,cx,cy,r);ox.clip();
  const caus=ox.createRadialGradient(cx+r*.05,cy+r*.08,0,cx+r*.05,cy+r*.08,r*.7);
  caus.addColorStop(0,GW.replace(',.9)',', .25)').replace(',.8)',', .25)').replace(',.7)',', .25)'));
  caus.addColorStop(1,'rgba(0,0,0,0)');
  ox.fillStyle=caus;ox.fillRect(0,0,dim,dim);
  ox.restore();

  // 5. Primary specular (large soft blob, top-left)
  ox.save();shape.clip(ox,cx,cy,r);ox.clip();
  const spec1=ox.createRadialGradient(cx-r*.3,cy-r*.38,0,cx-r*.28,cy-r*.36,r*.55);
  spec1.addColorStop(0,'rgba(255,255,255,.85)');
  spec1.addColorStop(.35,'rgba(255,255,255,.32)');
  spec1.addColorStop(1,'rgba(255,255,255,0)');
  ox.fillStyle=spec1;ox.fillRect(0,0,dim,dim);
  ox.restore();

  // 6. Secondary specular dot (tiny pinpoint)
  ox.save();shape.clip(ox,cx,cy,r);ox.clip();
  const spec2=ox.createRadialGradient(cx-r*.44,cy-r*.5,0,cx-r*.44,cy-r*.5,r*.18);
  spec2.addColorStop(0,'rgba(255,255,255,1)');
  spec2.addColorStop(.5,'rgba(255,255,255,.5)');
  spec2.addColorStop(1,'rgba(255,255,255,0)');
  ox.fillStyle=spec2;ox.fillRect(0,0,dim,dim);
  ox.restore();

  // 7. Bottom counter-reflection
  ox.save();shape.clip(ox,cx,cy,r);ox.clip();
  const bot=ox.createRadialGradient(cx+r*.28,cy+r*.5,0,cx+r*.28,cy+r*.5,r*.35);
  bot.addColorStop(0,'rgba(255,255,255,.18)');
  bot.addColorStop(1,'rgba(255,255,255,0)');
  ox.fillStyle=bot;ox.fillRect(0,0,dim,dim);
  ox.restore();

  // 8. Outline
  ox.strokeStyle='rgba(255,255,255,.12)';ox.lineWidth=1;
  shape.clip(ox,cx,cy,r);ox.stroke();

  // 9. Bonus label text
  if(bonus!=='none'){
    ox.textAlign='center';ox.textBaseline='middle';
    const labels={flame:'3×3',star:'★ALL',hyper:'R+C',bomb:'5×5'};
    const lbl=labels[bonus]||'';
    if(lbl){
      ox.font=`bold ${Math.max(8,sz*.44)}px Arial`;
      ox.fillStyle='rgba(0,0,0,.4)';ox.fillText(lbl,cx+1,cy+1);
      ox.fillStyle='rgba(255,255,255,.95)';ox.fillText(lbl,cx,cy);
    }
  }

  GEM_CACHE[key]=oc;
  return oc;
}

function buildCache(sz){
  for(let v=0;v<7;v++){
    renderGemToCanvas(v,sz,'none');
    renderGemToCanvas(v,sz,'flame');
    renderGemToCanvas(v,sz,'star');
  }
  renderGemToCanvas(0,sz,'hyper');
  renderGemToCanvas(0,sz,'bomb');
  _cacheBuilt=true;
}

// ═══════════════════════════════════════════════════════════════
//  SPRING ANIMATION ENGINE
//  Each gem has a spring state: pos, vel, target
//  Spring equation: a = -stiffness*(pos-target) - damping*vel
// ═══════════════════════════════════════════════════════════════
const SPRING={stiffness:180,damping:18};
const SPRING_SLOW={stiffness:100,damping:14};

function springStep(pos,vel,target,dt,cfg=SPRING){
  const acc=-cfg.stiffness*(pos-target)-cfg.damping*vel;
  const newVel=vel+acc*dt;
  const newPos=pos+newVel*dt;
  return{pos:newPos,vel:newVel};
}

// Per-cell animation state
let animState=[];   // [r][c] = {x,vx,y,vy,sx,vsx,sy,vsy,alpha,valpha,tx,ty,tsx,tsy,talpha,type,onDone,t}
let rafId=null,lastT=0;

function initAnimState(){
  animState=[];
  for(let r=0;r<8;r++){animState.push([]);for(let c=0;c<8;c++)animState[r].push(null);}
}

function rafLoop(ts){
  rafId=requestAnimationFrame(rafLoop);
  const dt=Math.min((ts-lastT)/1000,.05);lastT=ts;
  let anyActive=false;
  for(let r=0;r<8;r++)for(let c=0;c<8;c++){
    const s=animState[r][c];
    if(!s)continue;
    anyActive=true;
    s.t+=dt;
    const el=gemCanvases[r][c];
    if(!el)continue;
    if(s.type==='explode'){
      const prog=Math.min(1,s.t/s.dur);
      const sc=1+prog*.7;
      const al=Math.max(0,1-prog*1.1);
      el.style.transform=`scale(${sc})`;
      el.style.opacity=al;
      if(prog>=1){el.style.transform='scale(0)';el.style.opacity='0';animState[r][c]=null;if(s.onDone)s.onDone();}
    } else if(s.type==='fall'){
      const sp=SPRING_SLOW;
      const xr=springStep(s.y,s.vy,0,dt,sp);
      s.y=xr.pos;s.vy=xr.vel;
      const ar=springStep(s.alpha,s.valpha,1,dt,{stiffness:80,damping:10});
      s.alpha=ar.pos;s.valpha=ar.vel;
      el.style.transform=`translateY(${s.y}px)`;
      el.style.opacity=Math.max(0,Math.min(1,s.alpha));
      const settled=Math.abs(s.y)<.4&&Math.abs(s.vy)<1&&Math.abs(s.alpha-1)<.02;
      if(settled){el.style.transform='';el.style.opacity='1';animState[r][c]=null;if(s.onDone)s.onDone();}
    } else if(s.type==='swap'){
      const sp=SPRING;
      const xr=springStep(s.x,s.vx,s.tx,dt,sp);
      const yr=springStep(s.y,s.vy,s.ty,dt,sp);
      s.x=xr.pos;s.vx=xr.vel;s.y=yr.pos;s.vy=yr.vel;
      el.style.transform=`translate(${s.x}px,${s.y}px)`;
      const settled=Math.abs(s.x-s.tx)<.3&&Math.abs(s.vx)<.5&&Math.abs(s.y-s.ty)<.3&&Math.abs(s.vy)<.5;
      if(settled){el.style.transform=s.tx===0&&s.ty===0?'':el.style.transform;if(s.onDone){animState[r][c]=null;s.onDone();}}
    } else if(s.type==='sel'){
      const pulse=Math.sin(s.t*5.5)*.06+1;
      el.style.transform=`scale(${pulse})`;
    } else if(s.type==='hint'){
      const bounce=Math.sin(s.t*12)*.1+1;
      const rot=Math.sin(s.t*10)*5;
      el.style.transform=`scale(${bounce}) rotate(${rot}deg)`;
      if(s.t>1.2){el.style.transform='';animState[r][c]=null;}
    }
  }
  if(!anyActive&&rafId){/* keep running for sel animations */}
}

const ROWS=8,COLS=8,GN=7;
const LEVEL_THRESHOLDS=[0,500,1200,2200,3500,5200,7500,10500,14000,19000,99999];
const BF=100,BS=200,BH=300,BB=400;
function gColor(v){return v>=BB?v-BB:v>=BH?0:v>=BS?v-BS:v>=BF?v-BF:v;}
function isBonus(v){return v>=BF;}

let gameMode='classic',movesLeft=30,timerSec=60,timerInterval=null;
let objType=0,objTarget=20,objCount=0;
const BEST_KEY={classic:'gb_c',moves:'gb_m',timer:'gb_t',objective:'gb_o'};
function getBest(){return+(localStorage.getItem(BEST_KEY[gameMode])||0);}
function saveBest(v){localStorage.setItem(BEST_KEY[gameMode],v);}

let CS=52,GAP=3;
function calcCS(){
  const isMobile=window.innerWidth<=560;
  let avail=isMobile?window.innerWidth-24:Math.min(window.innerWidth-160,480);
  CS=Math.max(36,Math.min(Math.floor((avail-GAP*7)/8),64));
  document.documentElement.style.setProperty('--cs',CS+'px');
}
window.addEventListener('resize',()=>{clearTimeout(window._rt);window._rt=setTimeout(calcCS,80);});
window.addEventListener('orientationchange',()=>setTimeout(calcCS,300));

function startMode(mode){
  gameMode=mode;
  document.getElementById('modeScreen').style.display='none';
  document.getElementById('gameWrap').style.display='flex';
  document.getElementById('subtitle').textContent=
    {classic:'Clasic',moves:'Mutări Limitate',timer:'Contra Timp',objective:'Obiective'}[mode];
  document.getElementById('box-moves').style.display=mode==='moves'?'':'none';
  document.getElementById('box-timer').style.display=mode==='timer'?'':'none';
  document.getElementById('box-obj').style.display=mode==='objective'?'':'none';
  calcCS();
  // build gem cache at correct size
  const sz=Math.ceil(CS*.88);
  if(!_cacheBuilt)buildCache(sz);
  G.newGame();
}
function backToMenu(){
  clearInterval(timerInterval);timerInterval=null;
  busy=false;sel=null;
  document.getElementById('message').classList.remove('visible');
  document.getElementById('gameWrap').style.display='none';
  document.getElementById('modeScreen').style.display='flex';
}

let board=[],sel=null,busy=false,combo=0,score=0,level=1;
let cells=[],gemCanvases=[];

function buildBoard(){
  const el=document.getElementById('board');
  el.innerHTML='';cells=[];gemCanvases=[];
  for(let r=0;r<ROWS;r++){
    cells.push([]);gemCanvases.push([]);
    for(let c=0;c<COLS;c++){
      const cell=document.createElement('div');cell.className='cell';
      const gc=document.createElement('canvas');
      gc.className='gem-canvas';gc.width=Math.ceil(CS*.88)*2+20;gc.height=Math.ceil(CS*.88)*2+20;
      cell.appendChild(gc);el.appendChild(cell);
      cells[r].push(cell);gemCanvases[r].push(gc);
      ;(function(rr,cc){cell.addEventListener('click',()=>onCellClick(rr,cc));})(r,c);
    }
  }
  initAnimState();
}

function drawGemOnCanvas(r,c){
  const v=board[r][c];
  const cvs=gemCanvases[r][c];
  const ctx=cvs.getContext('2d');
  ctx.clearRect(0,0,cvs.width,cvs.height);
  if(v===-1)return;
  const ci=gColor(v);
  const sz=Math.ceil(CS*.88);
  const bonus=v>=BB?'bomb':v>=BH?'hyper':v>=BS?'star':v>=BF?'flame':'none';
  // use ci for normal, 0 for hyper/bomb (color index doesn't matter for those)
  const cacheVc=bonus==='hyper'||bonus==='bomb'?0:ci;
  const oc=renderGemToCanvas(cacheVc,sz,bonus);
  // need to tint for correct color if flame/star (same shape, different color)
  const drawn=bonus==='flame'||bonus==='star'?renderGemToCanvas(ci,sz,bonus):oc;
  ctx.drawImage(drawn,0,0,cvs.width,cvs.height);
}

function drawAllGems(){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)drawGemOnCanvas(r,c);
}

function setSel(r,c){
  clearSel();sel=[r,c];
  animState[r][c]={type:'sel',t:0};
  if(isBonus(board[r][c]))showBonusTip(r,c,board[r][c]);
}
function clearSel(){
  if(sel){
    const[sr,sc]=sel;
    if(animState[sr][sc]?.type==='sel'){animState[sr][sc]=null;gemCanvases[sr][sc].style.transform='';}
  }
  sel=null;clearAreaHL();clearBonusTip();
}

// input
let _drag=null,_swiped=false;
function getRCFromXY(clientX,clientY){
  const boardEl=document.getElementById('board');
  const rect=boardEl.getBoundingClientRect();
  const c=Math.floor((clientX-rect.left)/(CS+GAP));
  const r=Math.floor((clientY-rect.top)/(CS+GAP));
  if(r<0||r>=ROWS||c<0||c>=COLS)return null;
  return[r,c];
}
function onStart(cx,cy){if(busy)return;const rc=getRCFromXY(cx,cy);if(!rc||board[rc[0]][rc[1]]===-1)return;_drag={r:rc[0],c:rc[1],x:cx,y:cy};_swiped=false;}
function onMove(cx,cy){
  if(!_drag||busy)return;
  const dx=cx-_drag.x,dy=cy-_drag.y;
  if(!_swiped&&(Math.abs(dx)>14||Math.abs(dy)>14)){
    _swiped=true;const{r:r1,c:c1}=_drag;_drag=null;
    let r2=r1,c2=c1;
    if(Math.abs(dx)>Math.abs(dy)){c2=c1+(dx>0?1:-1);}else{r2=r1+(dy>0?1:-1);}
    if(r2>=0&&r2<ROWS&&c2>=0&&c2<COLS){clearSel();trySwap(r1,c1,r2,c2);}
  }
}
function onEnd(cx,cy){
  if(!_drag)return;const{r:r1,c:c1}=_drag;_drag=null;
  if(_swiped||busy)return;
  if(!sel){setSel(r1,c1);return;}
  const[sr,sc]=sel;
  if(sr===r1&&sc===c1){clearSel();return;}
  if(Math.abs(sr-r1)+Math.abs(sc-c1)===1){clearSel();trySwap(sr,sc,r1,c1);}
  else setSel(r1,c1);
}
function attachInput(){
  const boardEl=document.getElementById('board');
  boardEl.addEventListener('mousedown',e=>{e.preventDefault();onStart(e.clientX,e.clientY);});
  boardEl.addEventListener('mousemove',e=>{if(_drag)onMove(e.clientX,e.clientY);});
  boardEl.addEventListener('mouseup',e=>onEnd(e.clientX,e.clientY));
  boardEl.addEventListener('mouseleave',()=>{if(_drag&&!_swiped){_drag=null;clearSel();}});
  boardEl.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];onStart(t.clientX,t.clientY);},{passive:false});
  boardEl.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0];onMove(t.clientX,t.clientY);},{passive:false});
  boardEl.addEventListener('touchend',e=>{e.preventDefault();const t=e.changedTouches[0];onEnd(t.clientX,t.clientY);},{passive:false});
  boardEl.addEventListener('touchcancel',()=>{_drag=null;clearSel();});
}

// ═══ SWAP WITH SPRING PHYSICS ══════════════════════════════
function trySwap(r1,c1,r2,c2){
  busy=true;
  const dx=(c2-c1)*(CS+GAP),dy=(r2-r1)*(CS+GAP);
  let d1=false,d2=false;
  function afterBoth(){
    const v1=board[r1][c1],v2=board[r2][c2];
    const b1=isBonus(v1),b2=isBonus(v2);
    if(b1||b2){
      board[r1][c1]=v2;board[r2][c2]=v1;
      drawGemOnCanvas(r1,c1);drawGemOnCanvas(r2,c2);
      const dst=new Set();
      if(b1)expandBonus(r2,c2,v1,dst);
      if(b2)expandBonus(r1,c1,v2,dst);
      dst.add(r1*COLS+c1);dst.add(r2*COLS+c2);
      const pts=dst.size*40;combo=0;score+=pts;
      if(score>getBest())saveBest(score);updateUI();
      const lbl=v1>=BB||v2>=BB?'💣':v1>=BH||v2>=BH?'💥':v1>=BS||v2>=BS?'⭐':'🔥';
      showScorePop(r1,c1,lbl+' +'+pts);
      explodeDst(dst,()=>doGravity(dst));return;
    }
    board[r1][c1]=v2;board[r2][c2]=v1;
    drawGemOnCanvas(r1,c1);drawGemOnCanvas(r2,c2);
    const m=findMatches();
    if(!m){
      // spring back
      animSwap(r1,c1,-dx,-dy,()=>{board[r1][c1]=v1;board[r2][c2]=v2;drawGemOnCanvas(r1,c1);drawGemOnCanvas(r2,c2);busy=false;});
      animSwap(r2,c2, dx, dy,null);
      return;
    }
    combo=0;resolveMatches(m);
  }
  // spring toward target then back
  animSwap(r1,c1,dx,dy,()=>{d1=true;if(d1&&d2)afterBoth();});
  animSwap(r2,c2,-dx,-dy,()=>{d2=true;if(d1&&d2)afterBoth();});
}

function animSwap(r,c,tx,ty,cb){
  const el=gemCanvases[r][c];
  animState[r][c]={type:'swap',x:0,vx:tx*.6,y:0,vy:ty*.6,tx,ty,t:0,onDone:cb};
  if(cb){
    // after reaching target, spring back to 0
    const orig=animState[r][c];
    orig.onDone=()=>{
      animState[r][c]={type:'swap',x:tx,vx:0,y:ty,vy:0,tx:0,ty:0,t:0,onDone:()=>{
        el.style.transform='';animState[r][c]=null;if(cb)cb();
      }};
    };
  }
}

// ═══ MATCH / CASCADE (same logic as working version) ════════
function findMatches(){
  const hG=[],vG=[];
  for(let r=0;r<ROWS;r++){for(let c=0;c<COLS-2;){const v=board[r][c];if(v===-1){c++;continue;}const vc=gColor(v);let l=1;while(c+l<COLS&&board[r][c+l]!==-1&&gColor(board[r][c+l])===vc)l++;if(l>=3){const cs=[];for(let k=0;k<l;k++)cs.push([r,c+k]);hG.push({cells:cs,len:l,color:vc});}c+=l;}}
  for(let c=0;c<COLS;c++){for(let r=0;r<ROWS-2;){const v=board[r][c];if(v===-1){r++;continue;}const vc=gColor(v);let l=1;while(r+l<ROWS&&board[r+l][c]!==-1&&gColor(board[r+l][c])===vc)l++;if(l>=3){const cs=[];for(let k=0;k<l;k++)cs.push([r+k,c]);vG.push({cells:cs,len:l,color:vc});}r+=l;}}
  if(!hG.length&&!vG.length)return null;
  const hMap=new Map(),vMap=new Map();
  for(const g of hG)for(const[r,c]of g.cells)hMap.set(r*COLS+c,g);
  for(const g of vG)for(const[r,c]of g.cells)vMap.set(r*COLS+c,g);
  const done=new Set(),result=[];
  for(const[k,hg]of hMap){if(vMap.has(k)&&!done.has(k)){const vg=vMap.get(k);const idx=new Set([...hg.cells,...vg.cells].map(([r,c])=>r*COLS+c));const cls=[...idx].map(i=>[Math.floor(i/COLS),i%COLS]);const pivot=cls[Math.floor(cls.length/2)];result.push({type:'hyper',cells:cls,pivot,color:hg.color});for(const i of idx)done.add(i);}}
  for(const g of hG){const rem=g.cells.filter(([r,c])=>!done.has(r*COLS+c));if(rem.length<3)continue;const pivot=rem[Math.floor(rem.length/2)];const type=g.len>=6?'bomb':g.len>=5?'star':g.len===4?'flame':'normal';result.push({type,cells:rem,pivot,color:g.color});for(const[r,c]of rem)done.add(r*COLS+c);}
  for(const g of vG){const rem=g.cells.filter(([r,c])=>!done.has(r*COLS+c));if(rem.length<3)continue;const pivot=rem[Math.floor(rem.length/2)];const type=g.len>=6?'bomb':g.len>=5?'star':g.len===4?'flame':'normal';result.push({type,cells:rem,pivot,color:g.color});for(const[r,c]of rem)done.add(r*COLS+c);}
  return result.length?result:null;
}

function expandBonus(r,c,v,dst){
  if(v>=BB){for(let dr=-2;dr<=2;dr++)for(let dc=-2;dc<=2;dc++){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS)dst.add(nr*COLS+nc);}}
  else if(v>=BH){for(let cc=0;cc<COLS;cc++)dst.add(r*COLS+cc);for(let rr=0;rr<ROWS;rr++)dst.add(rr*COLS+c);}
  else if(v>=BS){const col=v-BS;for(let rr=0;rr<ROWS;rr++)for(let cc=0;cc<COLS;cc++)if(gColor(board[rr][cc])===col)dst.add(rr*COLS+cc);}
  else if(v>=BF){for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS)dst.add(nr*COLS+nc);}}
}

function resolveMatches(groups){
  combo++;
  let pts=0;
  for(const g of groups){const lb=g.cells.length>=6?8:g.cells.length>=5?4:g.cells.length===4?2:1;pts+=g.cells.length*10*lb;}
  pts=Math.round(pts*combo*(1+(level-1)*.1));
  const prevLv=level;score+=pts;if(score>getBest())saveBest(score);updateUI();if(level>prevLv)showLevelUp(level);
  if(gameMode==='moves'){movesLeft--;updateUI();if(movesLeft<=0)setTimeout(()=>endGame('Mutări Epuizate!'),800);}
  if(gameMode==='timer'){const tot=groups.reduce((s,g)=>s+g.cells.length,0);timerSec=Math.min(timerSec+Math.ceil(tot*.5),99);updateUI();}
  if(gameMode==='objective'){let cnt=0;for(const g of groups)if(g.color===objType)cnt+=g.cells.length;objCount=Math.min(objCount+cnt,objTarget);updateUI();if(objCount>=objTarget)setTimeout(()=>endGame('Obiectiv Completat! 🏆'),800);}
  const pre=groups.some(g=>g.type==='bomb')?'💣':groups.some(g=>g.type==='hyper')?'💥':groups.some(g=>g.type==='star')?'⭐':groups.some(g=>g.type==='flame')?'🔥':'';
  const allC=groups.flatMap(g=>g.cells);
  const mr=Math.round(allC.reduce((s,[r])=>s+r,0)/allC.length),mc=Math.round(allC.reduce((s,[,c])=>s+c,0)/allC.length);
  showScorePop(mr,mc,pre+(combo>1?`×${combo} `:'')+'+'+pts);
  if(combo>1||groups.some(g=>g.type!=='normal'))showBadge(combo,groups);
  const dst=new Set(),newB=[];
  for(const g of groups){for(const[r,c]of g.cells){dst.add(r*COLS+c);if(isBonus(board[r][c]))expandBonus(r,c,board[r][c],dst);}if(g.type!=='normal')newB.push({r:g.pivot[0],c:g.pivot[1],btype:g.type,color:g.color});}
  explodeDst(dst,()=>{
    for(const{r:br,c:bc,btype,color}of newB){if(board[br][bc]===-1){board[br][bc]=btype==='bomb'?BB+color:btype==='star'?BS+color:btype==='hyper'?BH:BF+color;dst.delete(br*COLS+bc);drawGemOnCanvas(br,bc);const el=gemCanvases[br][bc];el.style.opacity='0';el.style.transform='scale(0)';requestAnimationFrame(()=>{el.style.transition='transform .35s cubic-bezier(.34,1.56,.64,1),opacity .25s';el.style.opacity='1';el.style.transform='scale(1)';setTimeout(()=>{el.style.transition='';},360);});}}
    doGravity(dst);
  });
}

function explodeDst(dst,cb){
  let pending=0;
  for(const idx of dst){const r=Math.floor(idx/COLS),c=idx%COLS;if(board[r][c]!==-1)pending++;}
  if(!pending){cb();return;}
  let done2=0;
  for(const idx of dst){
    const r=Math.floor(idx/COLS),c=idx%COLS;if(board[r][c]===-1)continue;
    spawnParticles(r,c,gColor(board[r][c]));
    animState[r][c]={type:'explode',t:0,dur:.48,onDone:()=>{
      board[r][c]=-1;drawGemOnCanvas(r,c);
      gemCanvases[r][c].style.transform='';gemCanvases[r][c].style.opacity='1';
      if(++done2===pending)cb();
    }};
  }
}

function doGravity(matchSet){
  const step=CS+GAP;const jobs=[];
  for(let c=0;c<COLS;c++){
    const stack=[];for(let r=ROWS-1;r>=0;r--)if(board[r][c]!==-1)stack.push(board[r][c]);
    while(stack.length<ROWS)stack.push(Math.floor(Math.random()*GN));
    for(let r=ROWS-1;r>=0;r--){
      const nv=stack[ROWS-1-r];let eb=0;
      for(let rr=r+1;rr<ROWS;rr++)if(matchSet.has(rr*COLS+c))eb++;
      const wasMt=matchSet.has(r*COLS+c);board[r][c]=nv;
      if(wasMt||eb>0){const fy=wasMt?-(r+1)*step:-eb*step;jobs.push({r,c,fy,delay:(ROWS-1-r)*25});}
    }
  }
  if(!jobs.length){checkChain();return;}
  for(const{r,c}of jobs)drawGemOnCanvas(r,c);
  let landed=0;
  for(const{r,c,fy,delay}of jobs){
    setTimeout(()=>{
      const el=gemCanvases[r][c];
      el.style.opacity='0';
      animState[r][c]={type:'fall',y:fy,vy:0,alpha:0,valpha:0,t:0,
        onDone:()=>{if(++landed===jobs.length)checkChain();}};
    },delay);
  }
}

function checkChain(){const nm=findMatches();if(nm)resolveMatches(nm);else{combo=0;busy=false;if(!hasMoves())noMoves();}}

// ═══ PARTICLES ══════════════════════════════════════════════
function spawnParticles(r,c,type){
  const wrap=document.getElementById('boardWrap');
  const boardEl=document.getElementById('board');
  const br=boardEl.getBoundingClientRect(),wr=wrap.getBoundingClientRect();
  const cell=cells[r][c];const cr=cell.getBoundingClientRect();
  const cx=cr.left-wr.left+cr.width/2,cy=cr.top-wr.top+cr.height/2;
  const glowColor=GEM_PAL[type]?.[6]?.replace(',.9)',', .8)')||'rgba(255,255,255,.8)';
  const hexCol=`rgb(${GEM_PAL[type]?.[3]?.slice(1).match(/../g).map(h=>parseInt(h,16)).join(',')||'255,255,255'})`;
  // glow ring
  const ring=document.createElement('div');ring.className='glow-ring';
  ring.style.cssText=`left:${cx}px;top:${cy}px;width:${CS*.8}px;height:${CS*.8}px;border-color:${hexCol};`;
  wrap.appendChild(ring);setTimeout(()=>ring.remove(),650);
  // sparks
  for(let i=0;i<12;i++){
    const a=Math.random()*Math.PI*2,d=20+Math.random()*42,sz=2.5+Math.random()*5,dur=(.32+Math.random()*.38).toFixed(2);
    const sp=document.createElement('div');sp.className='spark';
    sp.style.cssText=`left:${cx}px;top:${cy}px;width:${sz}px;height:${sz}px;`+
      `background:${i%4===0?'#ffffff':hexCol};box-shadow:0 0 ${sz+3}px ${hexCol};`+
      `--dx:${(Math.cos(a)*d).toFixed(1)}px;--dy:${(Math.sin(a)*d).toFixed(1)}px;--dur:${dur}s;`;
    wrap.appendChild(sp);setTimeout(()=>sp.remove(),+dur*1000+80);
  }
}

// ═══ HINT / MOVE CHECK ══════════════════════════════════════
function findHint(){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)for(const[nr,nc]of[[r,c+1],[r+1,c]]){
    if(nr>=ROWS||nc>=COLS)continue;
    const t=board[r][c];board[r][c]=board[nr][nc];board[nr][nc]=t;
    const ok=!!findMatches();board[nr][nc]=board[r][c];board[r][c]=t;
    if(ok)return[[r,c],[nr,nc]];
  }return null;
}
function hasMoves(){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)for(const[nr,nc]of[[r,c+1],[r+1,c]]){
    if(nr>=ROWS||nc>=COLS)continue;
    const t=board[r][c];board[r][c]=board[nr][nc];board[nr][nc]=t;
    const ok=!!findMatches();board[nr][nc]=board[r][c];board[r][c]=t;
    if(ok)return true;
  }return false;
}

// ═══ BONUS TIP + AREA HL ════════════════════════════════════
let _tipEl=null,_hlEls=[];
function clearBonusTip(){if(_tipEl){_tipEl.remove();_tipEl=null;}}
function clearAreaHL(){_hlEls.forEach(e=>e.remove());_hlEls=[];}
function showBonusTip(r,c,v){
  clearBonusTip();
  const TIPS={flame:{n:'🔥 Flacără',d:'Swipe → explozie 3×3'},star:{n:'⭐ Star Gem',d:'Swipe → distruge toată culoarea'},hyper:{n:'💥 Cruce',d:'Swipe → rând + coloană'},bomb:{n:'💣 Bombă',d:'Swipe → explozie 5×5'}};
  const bt=v>=BB?'bomb':v>=BH?'hyper':v>=BS?'star':'flame';
  const tip=TIPS[bt];if(!tip)return;
  const wrap=document.getElementById('boardWrap');
  const cr=cells[r][c].getBoundingClientRect(),wr=wrap.getBoundingClientRect();
  const el=document.createElement('div');el.className='bonus-tip';
  el.innerHTML=`<strong>${tip.n}</strong>${tip.d}`;
  let left=cr.left-wr.left+cr.width/2-80,top=cr.bottom-wr.top+6;
  left=Math.max(4,Math.min(left,wr.width-170));if(top+70>wr.height)top=cr.top-wr.top-82;
  el.style.left=left+'px';el.style.top=top+'px';
  wrap.appendChild(el);_tipEl=el;setTimeout(()=>{if(_tipEl===el)clearBonusTip();},3000);
  clearAreaHL();
  function mkHL(row,col,cls){const e=document.createElement('div');e.className='area-hl'+(cls?' '+cls:'');const cr2=cells[row][col].getBoundingClientRect(),wr2=wrap.getBoundingClientRect();e.style.cssText=`left:${cr2.left-wr2.left}px;top:${cr2.top-wr2.top}px;width:${CS}px;height:${CS}px;`;wrap.appendChild(e);_hlEls.push(e);}
  if(bt==='flame'){for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS)mkHL(nr,nc,'');}}
  else if(bt==='bomb'){for(let dr=-2;dr<=2;dr++)for(let dc=-2;dc<=2;dc++){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS)mkHL(nr,nc,'');}}
  else if(bt==='hyper'){for(let cc=0;cc<COLS;cc++)mkHL(r,cc,'cross-h');for(let rr=0;rr<ROWS;rr++)if(rr!==r)mkHL(rr,c,'cross-v');}
  else if(bt==='star'){const col=gColor(v);for(let rr=0;rr<ROWS;rr++)for(let cc=0;cc<COLS;cc++)if(gColor(board[rr][cc])===col)mkHL(rr,cc,'');}
}

// ═══ UI ═════════════════════════════════════════════════════
function updateUI(){
  score=Math.max(0,score);
  document.getElementById('score-disp').textContent=score.toLocaleString();
  document.getElementById('best-disp').textContent=getBest().toLocaleString();
  let lv=1;for(let i=1;i<LEVEL_THRESHOLDS.length;i++){if(score>=LEVEL_THRESHOLDS[i])lv=i+1;else break;}
  lv=Math.min(lv,LEVEL_THRESHOLDS.length-1);level=lv;
  document.getElementById('level-disp').textContent=level;
  const lo=LEVEL_THRESHOLDS[level-1]||0,hi=LEVEL_THRESHOLDS[level]||LEVEL_THRESHOLDS[LEVEL_THRESHOLDS.length-1];
  document.getElementById('level-bar').style.width=(hi>lo?Math.min(100,Math.round((score-lo)/(hi-lo)*100)):100)+'%';
  if(gameMode==='moves')document.getElementById('moves-disp').textContent=movesLeft;
  if(gameMode==='timer'){const el=document.getElementById('timer-disp');el.textContent=timerSec;el.className='stat-val'+(timerSec<=10?' timer-low':'');}
  if(gameMode==='objective')document.getElementById('obj-disp').textContent=objCount+'/'+objTarget;
}
function showScorePop(r,c,text){
  const wrap=document.getElementById('boardWrap');
  const cr=cells[r][c].getBoundingClientRect(),wr=wrap.getBoundingClientRect();
  const el=document.createElement('div');el.className='score-pop';el.textContent=text;
  el.style.left=(cr.left-wr.left+cr.width/2-22)+'px';el.style.top=(cr.top-wr.top)+'px';
  el.style.animation='scorePopAnim .95s cubic-bezier(.2,.8,.4,1) forwards';
  const kf=`@keyframes scorePopAnim{0%{transform:translateY(0) scale(.5);opacity:1}20%{transform:translateY(-12px) scale(1.15);opacity:1}100%{transform:translateY(-60px) scale(.9);opacity:0}}`;
  if(!document.getElementById('scoreKF')){const st=document.createElement('style');st.id='scoreKF';st.textContent=kf;document.head.appendChild(st);}
  wrap.appendChild(el);setTimeout(()=>el.remove(),1000);
}
function showBadge(n,groups){
  const w=document.getElementById('boardWrap');const old=w.querySelector('.combo-badge');if(old)old.remove();
  const el=document.createElement('div');el.className='combo-badge';
  const isBm=groups?.some(g=>g.type==='bomb'),isHy=groups?.some(g=>g.type==='hyper'),isSt=groups?.some(g=>g.type==='star'),isFl=groups?.some(g=>g.type==='flame');
  el.textContent=isBm?'💣 Bombă!':isHy?'💥 Cruce!':isSt?'⭐ Star Gem!':isFl?'🔥 Flacără!':`${n}× Combo!`;
  w.appendChild(el);setTimeout(()=>el.remove(),1800);
}
function showLevelUp(lv){
  const w=document.getElementById('boardWrap');const old=w.querySelector('.lu-banner');if(old)old.remove();
  const el=document.createElement('div');el.className='lu-banner';
  el.innerHTML=`<span class="lu-title">NIVEL ${lv}</span><span class="lu-sub">+${Math.round((lv-1)*10)}% scor</span>`;
  w.appendChild(el);setTimeout(()=>el.remove(),2100);
}
function noMoves(){endGame('Nicio mutare!');}
function endGame(title){busy=true;const best=getBest();if(score>best)saveBest(score);document.getElementById('msg-title').textContent=title;document.getElementById('msg-sub').textContent=`Scor: ${score.toLocaleString()}${score>=best&&score>0?' 🏆 Record!':''}`;document.getElementById('message').classList.add('visible');}
function startTimer(){clearInterval(timerInterval);timerSec=60;updateUI();timerInterval=setInterval(()=>{timerSec--;updateUI();if(timerSec<=0){clearInterval(timerInterval);timerInterval=null;endGame('Timp expirat!');}},1000);}

// ═══ PUBLIC ═════════════════════════════════════════════════
const G={
  newGame(){
    clearInterval(timerInterval);timerInterval=null;
    document.getElementById('message').classList.remove('visible');
    score=0;level=1;combo=0;sel=null;busy=false;
    if(gameMode==='moves')movesLeft=30;
    if(gameMode==='objective'){objType=Math.floor(Math.random()*GN);objTarget=15+Math.floor(Math.random()*10);objCount=0;document.getElementById('obj-label').textContent='Colectează '+['Roșii','Albastre','Verzi','Galbene','Violet','Portocalii','Albe'][objType];}
    buildBoard();attachInput();
    board=[];
    for(let r=0;r<ROWS;r++){board.push([]);for(let c=0;c<COLS;c++){let v;do{v=Math.floor(Math.random()*GN);}while((c>=2&&gColor(board[r][c-1])===v&&gColor(board[r][c-2])===v)||(r>=2&&gColor(board[r-1][c])===v&&gColor(board[r-2][c])===v));board[r].push(v);}}
    drawAllGems();updateUI();
    if(gameMode==='timer')startTimer();
    if(!rafId)rafId=requestAnimationFrame(rafLoop);
  },
  hint(){
    if(busy)return;const h=findHint();if(!h)return;
    for(const[r,c]of h){animState[r][c]={type:'hint',t:0};}
    setTimeout(()=>{for(const[r,c]of h){if(animState[r][c]?.type==='hint'){animState[r][c]=null;gemCanvases[r][c].style.transform='';}}}  ,1400);
  }
};

// ═══ INIT ═══════════════════════════════════════════════════
document.getElementById('modeScreen').style.display='flex';
document.getElementById('gameWrap').style.display='none';
