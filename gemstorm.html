<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GemBlast ✦ Match-3</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Raleway:wght@300;400;600&display=swap');

:root {
  --bg:#0a0a1a; --panel:#12122a; --border:#2a2a5a;
  --gold:#f0c040; --glow:#8060ff; --text:#c8c8ff; --dim:#6060a0;
}
*{margin:0;padding:0;box-sizing:border-box}
body {
  background:var(--bg);
  color:var(--text);
  font-family:'Raleway',sans-serif;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  justify-content:flex-start;
  padding:20px 12px 40px;
  gap:10px;
  overflow-x:hidden;
  position:relative;
}
body::before {
  content:'';position:fixed;inset:0;
  background-image:
    radial-gradient(1px 1px at 20% 30%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 70% 60%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 45% 80%,rgba(255,255,255,.25) 0%,transparent 100%),
    radial-gradient(1px 1px at 85% 20%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 10% 70%,rgba(255,255,255,.2) 0%,transparent 100%),
    radial-gradient(2px 2px at 55% 45%,rgba(180,160,255,.4) 0%,transparent 100%),
    radial-gradient(600px 600px at 50% 50%,rgba(40,20,80,.6) 0%,transparent 100%);
  pointer-events:none;z-index:0;
}
h1 {
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(1.3rem,4vw,2rem);
  letter-spacing:.12em;color:var(--gold);
  text-shadow:0 0 20px rgba(240,192,64,.7),0 0 60px rgba(240,192,64,.3);
  text-align:center;position:relative;z-index:1;
}
.subtitle {
  font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;
  color:var(--dim);text-align:center;position:relative;z-index:1;
}
.game-wrap {
  display:flex;gap:20px;align-items:flex-start;
  flex-wrap:wrap;justify-content:center;
  position:relative;z-index:1;width:100%;max-width:760px;
}
.side-panel {
  display:flex;flex-direction:column;gap:12px;min-width:130px;max-width:150px;flex:1;
}
.stat-box {
  background:var(--panel);border:1px solid var(--border);
  border-radius:12px;padding:12px 16px;text-align:center;
  box-shadow:0 0 20px rgba(80,60,160,.2);
}
.stat-label {
  font-size:.58rem;letter-spacing:.3em;text-transform:uppercase;
  color:var(--dim);margin-bottom:4px;
}
.stat-val {
  font-family:'Cinzel Decorative',serif;font-size:1.4rem;
  color:var(--gold);text-shadow:0 0 10px rgba(240,192,64,.5);
}
.level-bar-wrap {
  background:var(--panel);border:1px solid var(--border);
  border-radius:12px;padding:12px 16px;
  box-shadow:0 0 20px rgba(80,60,160,.2);
}
.level-bar-bg {
  height:7px;background:#1e1e40;border-radius:4px;
  margin-top:7px;overflow:hidden;
}
.level-bar-fill {
  height:100%;
  background:linear-gradient(90deg,#8060ff,#f0c040);
  border-radius:4px;transition:width .4s ease;
  box-shadow:0 0 8px rgba(128,96,255,.8);
}
.btn {
  background:linear-gradient(135deg,#2a1a60,#1a0a40);
  border:1px solid var(--border);color:var(--text);
  font-family:'Raleway',sans-serif;font-size:.72rem;
  letter-spacing:.18em;text-transform:uppercase;
  padding:9px 14px;border-radius:8px;cursor:pointer;
  transition:all .2s;width:100%;
  box-shadow:0 0 10px rgba(80,60,160,.2);
}
.btn:hover{background:linear-gradient(135deg,#3a2a80,#2a1a60);box-shadow:0 0 20px rgba(80,60,160,.5);color:#fff;}
.btn.gold{background:linear-gradient(135deg,#6a4a00,#4a3000);border-color:var(--gold);color:var(--gold);}
.btn.gold:hover{box-shadow:0 0 20px rgba(240,192,64,.4);}

.board-container {
  position:relative;
  border:2px solid var(--border);border-radius:16px;padding:8px;
  background:rgba(10,10,30,.8);
  box-shadow:0 0 40px rgba(80,60,160,.4),0 0 80px rgba(80,60,160,.15),
             inset 0 0 40px rgba(0,0,0,.5);
}
#gameCanvas{display:block;border-radius:10px;cursor:pointer;touch-action:none;}

/* Score pop & particles — positioned relative to board-container */
.score-pop {
  position:absolute;
  font-family:'Cinzel Decorative',serif;font-size:1rem;
  color:var(--gold);text-shadow:0 0 8px rgba(240,192,64,.8);
  pointer-events:none;z-index:20;
  animation:float-up .9s ease-out forwards;white-space:nowrap;
}
@keyframes float-up{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-55px);opacity:0}}
.burst-p {
  position:absolute;width:7px;height:7px;border-radius:50%;
  pointer-events:none;z-index:10;
  animation:burst .5s ease-out forwards;
}
@keyframes burst{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}
.combo-badge {
  position:absolute;top:-6px;right:-6px;
  background:linear-gradient(135deg,#f0c040,#ff8020);
  color:#000;font-family:'Cinzel Decorative',serif;
  font-size:.52rem;font-weight:900;padding:3px 7px;
  border-radius:20px;z-index:25;
  animation:badge-pop .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;
}
@keyframes badge-pop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}

/* Game-over overlay inside board */
#message {
  display:none;position:absolute;inset:0;
  background:rgba(0,0,10,.88);border-radius:14px;
  flex-direction:column;align-items:center;justify-content:center;
  gap:12px;z-index:30;
}
#message.visible{display:flex;}
#message h2{font-family:'Cinzel Decorative',serif;color:var(--gold);font-size:1.4rem;
  text-shadow:0 0 20px rgba(240,192,64,.8);text-align:center;}
#message p{color:var(--dim);font-size:.82rem;text-align:center;padding:0 16px;}
#message .btn{width:auto;padding:11px 28px;margin-top:6px;}

@media(max-width:520px){
  .side-panel{flex-direction:row;max-width:100%;min-width:0;flex-wrap:wrap;justify-content:center;}
  .stat-box,.level-bar-wrap{flex:1;min-width:90px;}
  .btn{font-size:.62rem;padding:8px 10px;}
}
</style>
</head>
<body>
<h1>✦ GemBlast ✦</h1>
<p class="subtitle">Match 3 · No Ads · Pure Bliss</p>

<div class="game-wrap">
  <div class="side-panel">
    <div class="stat-box">
      <div class="stat-label">Scor</div>
      <div class="stat-val" id="score-disp">0</div>
    </div>
    <div class="level-bar-wrap">
      <div class="stat-label">Nivel <span id="level-disp">1</span></div>
      <div class="level-bar-bg"><div class="level-bar-fill" id="level-bar" style="width:0%"></div></div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Record</div>
      <div class="stat-val" id="best-disp">0</div>
    </div>
    <button class="btn gold" onclick="G.hint()">💡 Indiciu</button>
    <button class="btn" onclick="G.newGame()">↺ Joc Nou</button>
  </div>

  <div class="board-container" id="boardWrap">
    <canvas id="gameCanvas"></canvas>
    <div id="message">
      <h2 id="msg-title">Nicio mutare!</h2>
      <p id="msg-sub">Tabla se resetează...</p>
      <button class="btn gold" onclick="G.newGame()">Joacă din nou</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  GEMS — same style as the reference model (circles
//  with radial gradient + highlight dot)
// ═══════════════════════════════════════════════════════
const GEMS = [
  {color:'#ff3355', name:'Ruby'},
  {color:'#3388ff', name:'Sapphire'},
  {color:'#33cc66', name:'Emerald'},
  {color:'#ffcc22', name:'Topaz'},
  {color:'#aa44ff', name:'Amethyst'},
  {color:'#ff7722', name:'Amber'},
  {color:'#44ddff', name:'Diamond'},
];
const LEVEL_THRESHOLDS = [0,500,1200,2200,3500,5200,7500,10500,14000,19000,99999];
const ROWS=8, COLS=8, GN=GEMS.length;

// ═══════════════════════════════════════════════════════
//  CANVAS SETUP
// ═══════════════════════════════════════════════════════
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
let CELL=56, GAP=3, BOARD_PX;

function resize(){
  const maxW = Math.min(window.innerWidth - 180, 500);
  CELL = Math.max(36, Math.floor((maxW - GAP*(COLS-1)) / COLS));
  BOARD_PX = CELL*COLS + GAP*(COLS-1);
  canvas.width  = BOARD_PX;
  canvas.height = BOARD_PX;
}
window.addEventListener('resize',()=>{resize();});

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let board=[], sel=null;
let score=0, best=+(localStorage.getItem('gb_best')||0), level=1;
let busy=false, comboCount=0;

// Per-cell animation: {type, t, dur, ...extra}
// All mutations go through these — never touch other cells
let anims=[];          // anims[r][c]
let particles=[];      // [{x,y,vx,vy,r,alpha,color}]
let floaters=[];       // score pops drawn on canvas

function initAnims(){
  anims=[];
  for(let r=0;r<ROWS;r++){anims.push([]);for(let c=0;c<COLS;c++)anims[r].push(null);}
}

// ═══════════════════════════════════════════════════════
//  RAF LOOP
// ═══════════════════════════════════════════════════════
let lastT=null;
function loop(ts){
  requestAnimationFrame(loop);
  const dt = lastT ? Math.min((ts-lastT)/1000, 0.05) : 0.016;
  lastT=ts;

  // advance per-cell anims
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const a=anims[r][c]; if(!a) continue;
    a.t += dt/a.dur;
    if(a.t>=1){a.t=1; const cb=a.onDone; anims[r][c]=null; if(cb) cb();}
  }
  // particles
  for(const p of particles){
    p.x+=p.vx*dt*60; p.y+=p.vy*dt*60; p.vy+=0.25*dt*60;
    p.alpha-=dt*2.8; p.r*=0.96;
  }
  particles=particles.filter(p=>p.alpha>0&&p.r>0.2);
  // floaters
  for(const f of floaters){ f.y-=dt*50; f.alpha-=dt*1.4; }
  floaters=floaters.filter(f=>f.alpha>0);

  drawAll();
}

// ═══════════════════════════════════════════════════════
//  EASING
// ═══════════════════════════════════════════════════════
function easeOut(t){return 1-Math.pow(1-t,3);}
function easeInOut(t){return t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
function easeOutBack(t){const c=1.70158;return 1+(c+1)*Math.pow(t-1,3)+c*Math.pow(t-1,2);}
function easeOutBounce(t){
  const n=7.5625,d=2.75;
  if(t<1/d)return n*t*t;
  if(t<2/d)return n*(t-=1.5/d)*t+.75;
  if(t<2.5/d)return n*(t-=2.25/d)*t+.9375;
  return n*(t-=2.625/d)*t+.984375;
}

// ═══════════════════════════════════════════════════════
//  DRAW
// ═══════════════════════════════════════════════════════
function cellXY(r,c){ return {x:c*(CELL+GAP), y:r*(CELL+GAP)}; }

function drawAll(){
  ctx.clearRect(0,0,BOARD_PX,BOARD_PX);

  // board bg
  ctx.fillStyle='rgba(10,8,28,.6)';
  roundRect(ctx,0,0,BOARD_PX,BOARD_PX,10); ctx.fill();

  // cells
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const {x,y}=cellXY(r,c);
    // cell bg
    ctx.fillStyle='rgba(255,255,255,.03)';
    roundRect(ctx,x,y,CELL,CELL,6); ctx.fill();

    const v=board[r][c];
    if(v===-1) continue;

    const a=anims[r][c];
    let ox=0,oy=0,scale=1,alpha=1;

    if(a){
      if(a.type==='explode'){
        scale=1+easeOut(a.t)*0.55; alpha=1-a.t;
      } else if(a.type==='fall'){
        const e=easeOutBounce(a.t);
        oy=(1-e)*a.fromY; alpha=Math.min(1,a.t*6);
      } else if(a.type==='swap'){
        const e=a.t<.5?easeInOut(a.t*2):easeInOut((1-a.t)*2);
        ox=a.dx*e; oy=a.dy*e;
      } else if(a.type==='sel'){
        scale=1+Math.sin(a.t*Math.PI*8)*0.04;
      } else if(a.type==='hint'){
        scale=1+Math.sin(a.t*Math.PI*6)*0.1;
        alpha=0.5+0.5*Math.sin(a.t*Math.PI*6);
      }
    }

    const isSel=sel&&sel[0]===r&&sel[1]===c;
    const cx=x+CELL/2+ox, cy=y+CELL/2+oy;
    const gemR=(CELL*0.38)*scale;

    ctx.save();
    ctx.globalAlpha=alpha;

    // selected highlight bg
    if(isSel){
      ctx.fillStyle='rgba(255,255,255,.09)';
      roundRect(ctx,x+ox,y+oy,CELL,CELL,6); ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,.4)';
      ctx.lineWidth=2;
      roundRect(ctx,x+ox+1,y+oy+1,CELL-2,CELL-2,6); ctx.stroke();
    }

    // glow
    ctx.shadowColor=GEMS[v].color;
    ctx.shadowBlur=isSel?22:8;

    // main circle — radial gradient like reference model
    const g=ctx.createRadialGradient(cx-gemR*.28,cy-gemR*.28,gemR*.05,cx,cy,gemR);
    g.addColorStop(0,lighten(GEMS[v].color,70));
    g.addColorStop(0.45,GEMS[v].color);
    g.addColorStop(1,darken(GEMS[v].color,50));
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(cx,cy,gemR,0,Math.PI*2); ctx.fill();

    ctx.shadowBlur=0;

    // specular highlight (top-left dot like reference)
    const hg=ctx.createRadialGradient(cx-gemR*.3,cy-gemR*.35,0,cx-gemR*.3,cy-gemR*.35,gemR*.45);
    hg.addColorStop(0,'rgba(255,255,255,.55)');
    hg.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=hg;
    ctx.beginPath(); ctx.arc(cx,cy,gemR,0,Math.PI*2); ctx.fill();

    // rim
    ctx.strokeStyle='rgba(255,255,255,.12)';
    ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.arc(cx,cy,gemR-.6,0,Math.PI*2); ctx.stroke();

    ctx.restore();
  }

  // particles
  for(const p of particles){
    ctx.save();
    ctx.globalAlpha=p.alpha;
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // floating score texts
  for(const f of floaters){
    ctx.save();
    ctx.globalAlpha=f.alpha;
    ctx.font=`bold ${CELL*.32}px 'Cinzel Decorative',serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='#f0c040';
    ctx.shadowColor='#f0c040'; ctx.shadowBlur=10;
    ctx.fillText(f.text,f.x,f.y);
    ctx.restore();
  }
}

function lighten(hex,amt){
  return '#'+hex.replace(/[0-9a-f]{2}/gi,m=>Math.min(255,parseInt(m,16)+amt).toString(16).padStart(2,'0'));
}
function darken(hex,amt){
  return '#'+hex.replace(/[0-9a-f]{2}/gi,m=>Math.max(0,parseInt(m,16)-amt).toString(16).padStart(2,'0'));
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// ═══════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════
function getRC(e){
  const rect=canvas.getBoundingClientRect();
  const px=(e.clientX??e.touches[0].clientX)-rect.left;
  const py=(e.clientY??e.touches[0].clientY)-rect.top;
  const c=Math.floor(px/(CELL+GAP)), r=Math.floor(py/(CELL+GAP));
  if(r<0||r>=ROWS||c<0||c>=COLS)return null;
  return [r,c];
}
canvas.addEventListener('click',e=>{const rc=getRC(e);if(rc)onCell(rc[0],rc[1]);});
canvas.addEventListener('touchend',e=>{e.preventDefault();const rc=getRC(e);if(rc)onCell(rc[0],rc[1]);},{passive:false});

function onCell(r,c){
  if(busy||board[r][c]===-1)return;
  if(!sel){
    sel=[r,c];
    // idle sel animation
    anims[r][c]={type:'sel',t:0,dur:999};
    return;
  }
  const[sr,sc]=sel;
  if(sr===r&&sc===c){
    sel=null; anims[r][c]=null; return;
  }
  if(Math.abs(sr-r)+Math.abs(sc-c)===1){
    anims[sr][sc]=null; sel=null;
    doSwap(sr,sc,r,c);
  } else {
    anims[sr][sc]=null;
    sel=[r,c];
    anims[r][c]={type:'sel',t:0,dur:999};
  }
}

// ═══════════════════════════════════════════════════════
//  GRID
// ═══════════════════════════════════════════════════════
function rnd(){return Math.floor(Math.random()*GN);}
function makeBoard(){
  board=[];
  for(let r=0;r<ROWS;r++){
    board.push([]);
    for(let c=0;c<COLS;c++){
      let v;
      do{v=rnd();}while(
        (c>=2&&board[r][c-1]===v&&board[r][c-2]===v)||
        (r>=2&&board[r-1][c]===v&&board[r-2][c]===v)
      );
      board[r].push(v);
    }
  }
}

// ═══════════════════════════════════════════════════════
//  SWAP
// ═══════════════════════════════════════════════════════
const SW=0.18;
function doSwap(r1,c1,r2,c2){
  busy=true;
  const dx=(c2-c1)*(CELL+GAP), dy=(r2-r1)*(CELL+GAP);
  let d1=false,d2=false;
  function afterBoth(){
    // swap data
    const t=board[r1][c1];board[r1][c1]=board[r2][c2];board[r2][c2]=t;
    const m=findMatches();
    if(!m.length){
      // swap back
      const t2=board[r1][c1];board[r1][c1]=board[r2][c2];board[r2][c2]=t2;
      let e1=false,e2=false;
      function afterBack(){if(e1&&e2){busy=false;}}
      anims[r1][c1]={type:'swap',t:0,dur:SW,dx:-dx,dy:-dy,onDone:()=>{e1=true;afterBack();}};
      anims[r2][c2]={type:'swap',t:0,dur:SW,dx: dx,dy: dy,onDone:()=>{e2=true;afterBack();}};
      return;
    }
    comboCount=0;
    resolveMatches(m);
  }
  anims[r1][c1]={type:'swap',t:0,dur:SW,dx, dy,onDone:()=>{d1=true;if(d1&&d2)afterBoth();}};
  anims[r2][c2]={type:'swap',t:0,dur:SW,dx:-dx,dy:-dy,onDone:()=>{d2=true;if(d1&&d2)afterBoth();}};
}

// ═══════════════════════════════════════════════════════
//  MATCH
// ═══════════════════════════════════════════════════════
function findMatches(){
  const hit=new Set();
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS-2;){
      const v=board[r][c];let l=1;
      while(c+l<COLS&&board[r][c+l]===v)l++;
      if(l>=3)for(let k=0;k<l;k++)hit.add(r*COLS+c+k);
      c+=l;
    }
  }
  for(let c=0;c<COLS;c++){
    for(let r=0;r<ROWS-2;){
      const v=board[r][c];let l=1;
      while(r+l<ROWS&&board[r+l][c]===v)l++;
      if(l>=3)for(let k=0;k<l;k++)hit.add((r+k)*COLS+c);
      r+=l;
    }
  }
  return[...hit].map(i=>[Math.floor(i/COLS),i%COLS]);
}

// ═══════════════════════════════════════════════════════
//  CASCADE
// ═══════════════════════════════════════════════════════
const EX=0.28, FL=0.28;

function resolveMatches(matches){
  comboCount++;
  const pts=matches.length*10*comboCount;
  score+=pts;
  if(score>best){best=score;localStorage.setItem('gb_best',best);}
  updateUI();
  // score floater at center of matches
  const mr=matches.reduce((s,[r])=>s+r,0)/matches.length;
  const mc=matches.reduce((s,[,c])=>s+c,0)/matches.length;
  const {x,y}=cellXY(Math.round(mr),Math.round(mc));
  floaters.push({x:x+CELL/2,y:y+CELL/2,text:(comboCount>1?`×${comboCount} `:'+')+pts,alpha:1});

  if(comboCount>1) showComboBadge(comboCount);

  // explode matched — only these cells
  const matchSet=new Set(matches.map(([r,c])=>r*COLS+c));
  let pending=matches.length;
  for(const[r,c]of matches){
    spawnParticles(r,c,board[r][c]);
    anims[r][c]={type:'explode',t:0,dur:EX,onDone:()=>{
      board[r][c]=-1;
      if(--pending===0) doGravity(matchSet);
    }};
  }
}

function doGravity(matchSet){
  // compute per-column, set board data, schedule fall anims
  // only cells that actually move get an anim
  const step=CELL+GAP;
  let totalPending=0;
  const fallJobs=[];

  for(let c=0;c<COLS;c++){
    const stack=[];
    for(let r=ROWS-1;r>=0;r--)if(board[r][c]!==-1)stack.push(board[r][c]);
    const numNew=ROWS-stack.length;
    for(let i=0;i<numNew;i++)stack.push(rnd());
    for(let r=ROWS-1;r>=0;r--){
      const nv=stack[ROWS-1-r];
      let emptyBelow=0;
      for(let rr=r+1;rr<ROWS;rr++)if(matchSet.has(rr*COLS+c))emptyBelow++;
      const wasMatch=matchSet.has(r*COLS+c);
      board[r][c]=nv;
      if(wasMatch||emptyBelow>0){
        const fromY=wasMatch ? -(r+1)*step : -emptyBelow*step;
        fallJobs.push({r,c,fromY,delay:(ROWS-1-r)*0.018});
        totalPending++;
      }
    }
  }

  if(!totalPending){checkChain();return;}

  let landed=0;
  for(const{r,c,fromY,delay}of fallJobs){
    setTimeout(()=>{
      anims[r][c]={type:'fall',t:0,dur:FL,fromY,onDone:()=>{
        if(++landed===totalPending)checkChain();
      }};
    },delay*1000);
  }
}

function checkChain(){
  const nm=findMatches();
  if(nm.length){resolveMatches(nm);}
  else{
    comboCount=0;busy=false;
    if(!hasMoves())showNoMoves();
  }
}

// ═══════════════════════════════════════════════════════
//  PARTICLES (canvas-based, no DOM)
// ═══════════════════════════════════════════════════════
function spawnParticles(r,c,type){
  const {x,y}=cellXY(r,c);
  const cx=x+CELL/2, cy=y+CELL/2;
  const col=GEMS[type].color;
  for(let i=0;i<9;i++){
    const a=Math.random()*Math.PI*2, spd=1.2+Math.random()*2.2;
    particles.push({x:cx,y:cy,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-0.8,
      r:2.5+Math.random()*2.5,alpha:1,color:col});
  }
}

// ═══════════════════════════════════════════════════════
//  COMBO BADGE (DOM, outside canvas — brief flash)
// ═══════════════════════════════════════════════════════
function showComboBadge(n){
  const wrap=document.getElementById('boardWrap');
  const old=wrap.querySelector('.combo-badge'); if(old)old.remove();
  const el=document.createElement('div'); el.className='combo-badge';
  el.textContent=`${n}× COMBO!`;
  wrap.appendChild(el);
  setTimeout(()=>el.remove(),1300);
}

// ═══════════════════════════════════════════════════════
//  HINT
// ═══════════════════════════════════════════════════════
function findHint(){
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    for(const[nr,nc]of[[r,c+1],[r+1,c]]){
      if(nr>=ROWS||nc>=COLS)continue;
      const t=board[r][c];board[r][c]=board[nr][nc];board[nr][nc]=t;
      const ok=findMatches().length>0;
      board[nr][nc]=board[r][c];board[r][c]=t;
      if(ok)return[[r,c],[nr,nc]];
    }
  }
  return null;
}

// ═══════════════════════════════════════════════════════
//  MOVES CHECK
// ═══════════════════════════════════════════════════════
function hasMoves(){
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    for(const[nr,nc]of[[r,c+1],[r+1,c]]){
      if(nr>=ROWS||nc>=COLS)continue;
      const t=board[r][c];board[r][c]=board[nr][nc];board[nr][nc]=t;
      const ok=findMatches().length>0;
      board[nr][nc]=board[r][c];board[r][c]=t;
      if(ok)return true;
    }
  }
  return false;
}

// ═══════════════════════════════════════════════════════
//  UI
// ═══════════════════════════════════════════════════════
function updateUI(){
  document.getElementById('score-disp').textContent=score.toLocaleString();
  document.getElementById('best-disp').textContent=best.toLocaleString();
  const lvl=LEVEL_THRESHOLDS.findIndex(v=>score<v);
  const curLevel=Math.max(1,lvl-1||LEVEL_THRESHOLDS.length-1);
  level=Math.max(level,curLevel);
  document.getElementById('level-disp').textContent=level;
  const lo=LEVEL_THRESHOLDS[level-1]||0, hi=LEVEL_THRESHOLDS[level]||99999;
  const pct=Math.min(100,Math.round((score-lo)/(hi-lo)*100));
  document.getElementById('level-bar').style.width=pct+'%';
}

function showNoMoves(){
  document.getElementById('msg-title').textContent='Nicio mutare!';
  document.getElementById('msg-sub').textContent=`Scor final: ${score}. Se resetează...`;
  document.getElementById('message').classList.add('visible');
  setTimeout(()=>{document.getElementById('message').classList.remove('visible');G.newGame();},2400);
}

// ═══════════════════════════════════════════════════════
//  PUBLIC API
// ═══════════════════════════════════════════════════════
const G = {
  newGame(){
    document.getElementById('message').classList.remove('visible');
    score=0; level=1; comboCount=0; sel=null; busy=false;
    particles=[]; floaters=[];
    makeBoard(); initAnims(); updateUI();
  },
  hint(){
    if(busy)return;
    const h=findHint();
    if(!h)return;
    for(const[r,c]of h){
      anims[r][c]={type:'hint',t:0,dur:0.9};
    }
  }
};

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
resize();
G.newGame();
requestAnimationFrame(loop);
</script>
