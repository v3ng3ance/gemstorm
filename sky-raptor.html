/* ================= SKY RAPTOR — v5.5 (mini-boss perfect + rachete auto-aim) =================
   - mini-boss: mişcare identică cu boss-ul final (fără jitter)
   - rachete auto-aim active de la weapon >= 4
   - toate efectele vizuale păstrate (trail-uri, afterburner, explozii, etc.)
   - fără bloom, imagine clară
============================================================================= */

// ---------- Bază canvas ----------
const cv = document.getElementById('game');
const ctx = cv.getContext('2d');
let W = 0, H = 0, DPR = 1, S = 1;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = Math.round(W * DPR); cv.height = Math.round(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  S = Math.max(0.75, Math.min(1.35, H / 800));
  terrainCache = {};
  buildVignette();
}
window.addEventListener('resize', resize);

// ---------- Utilitare ----------
const TAU = Math.PI * 2;
const rnd = (a, b) => a + Math.random() * (b - a);
const clamp = (v, a, b) => v < a ? a : (v > b ? b : v);
const dist2 = (ax, ay, bx, by) => { const dx = ax - bx, dy = ay - by; return dx * dx + dy * dy; };
function mulberry32(seed) {
  let t = seed >>> 0;
  return function () {
    t += 0x6D2B79F5;
    let r = Math.imul(t ^ (t >>> 15), 1 | t);
    r ^= r + Math.imul(r ^ (r >>> 7), 61 | r);
    return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
  };
}

// ---------- Sunet ----------
const AudioSys = {
  ctx: null, muted: true, lastShot: 0, master: null,
  init() {
    if (!this.ctx) {
      try {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        const comp = this.ctx.createDynamicsCompressor();
        comp.threshold.value = -20; comp.knee.value = 22; comp.ratio.value = 7;
        comp.attack.value = 0.004; comp.release.value = 0.2;
        this.master = this.ctx.createGain(); this.master.gain.value = 0.55;
        this.master.connect(comp); comp.connect(this.ctx.destination);
      } catch (e) {}
    }
    if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  },
  tone(f0, f1, dur, type, vol, when, cutoff) {
    if (!this.ctx || this.muted || !this.master) return;
    const t = this.ctx.currentTime + (when || 0);
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = type; o.frequency.setValueAtTime(f0, t);
    o.frequency.exponentialRampToValueAtTime(Math.max(1, f1), t + dur);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol, t + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    const f = this.ctx.createBiquadFilter(); f.type = 'lowpass';
    f.frequency.value = cutoff || 2400;
    o.connect(f); f.connect(g); g.connect(this.master);
    o.start(t); o.stop(t + dur + 0.03);
  },
  noise(dur, vol, cutoff, when) {
    if (!this.ctx || this.muted || !this.master) return;
    const t = this.ctx.currentTime + (when || 0);
    const n = Math.floor(this.ctx.sampleRate * dur);
    const buf = this.ctx.createBuffer(1, n, this.ctx.sampleRate), d = buf.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, 1.6);
    const s = this.ctx.createBufferSource(); s.buffer = buf;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0.0001, t); g.gain.exponentialRampToValueAtTime(vol, t + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    const f = this.ctx.createBiquadFilter(); f.type = 'lowpass';
    f.frequency.setValueAtTime(cutoff, t);
    f.frequency.exponentialRampToValueAtTime(Math.max(60, cutoff * 0.22), t + dur);
    s.connect(f); f.connect(g); g.connect(this.master); s.start(t);
  },
  shoot() {
    const now = performance.now(); if (now - this.lastShot < 140) return; this.lastShot = now;
    this.noise(0.055, 0.028, 2200 * rnd(0.85, 1.25));
  },
  hit() { this.noise(0.08, 0.03, 1400 * rnd(0.9, 1.2)); },
  boomS() { const p = rnd(0.85, 1.25);
    this.noise(0.32, 0.16, 1300 * p);
    this.tone(150 * p, 42, 0.3, 'sine', 0.11, 0, 900); },
  boomB() { const p = rnd(0.9, 1.15);
    this.noise(0.8, 0.26, 620 * p);
    this.tone(95 * p, 24, 0.8, 'sine', 0.24, 0, 500); },
  power() { [523, 659, 784].forEach((f, i) => this.tone(f, f * 1.01, 0.11, 'triangle', 0.05, i * 0.08, 1900)); },
  hurt() { this.tone(220 * rnd(0.9, 1.1), 70, 0.22, 'sawtooth', 0.07, 0, 800); },
  bomb() { this.noise(1.1, 0.34, 480); this.tone(70, 18, 1.1, 'sine', 0.28, 0, 300); },
  bossWarn() { [0, 0.35, 0.7].forEach(w => { this.tone(330, 328, 0.22, 'sine', 0.07, w, 1200);
    this.tone(247, 245, 0.22, 'sine', 0.06, w + 0.16, 1200); }); },
  thunder() { const p = rnd(0.8, 1.2);
    this.noise(1.3, 0.2, 420 * p);
    this.tone(52 * p, 30, 1.2, 'sine', 0.14, 0.05, 200); }
};

// ---------- Sprite-uri ----------
function makeSprite(w, h, fn) {
  const c = document.createElement('canvas');
  c.width = Math.ceil(w * 2); c.height = Math.ceil(h * 2);
  const g = c.getContext('2d');
  g.scale(2, 2); g.lineJoin = 'round';
  fn(g, w, h);
  return c;
}
const SHD = {};
function makeShadow(spr) {
  const c = document.createElement('canvas');
  c.width = spr.width; c.height = spr.height;
  const g = c.getContext('2d');
  g.drawImage(spr, 0, 0);
  g.globalCompositeOperation = 'source-in';
  g.fillStyle = '#03101c';
  g.fillRect(0, 0, c.width, c.height);
  return c;
}
function poly(g, pts, fill, stroke, lw) {
  g.beginPath(); g.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) g.lineTo(pts[i][0], pts[i][1]);
  g.closePath();
  if (fill) { g.fillStyle = fill; g.fill(); }
  if (stroke) { g.strokeStyle = stroke; g.lineWidth = lw || 2; g.stroke(); }
}

    gr = g.createLinearGradient(cx - 8, 0, cx + 8, 0);
    gr.addColorStop(0, '#7e94a8'); gr.addColorStop(0.5, '#c2d2e0'); gr.addColorStop(1, '#7e94a8');
    poly(g, [[cx, 2], [cx + 4, 10], [cx + 7, 22], [cx + 7.5, 44], [cx + 5, 60], [cx - 5, 60], [cx - 7.5, 44], [cx - 7, 22], [cx - 4, 10]], gr, '#1d2b3a', 2.4);

    g.strokeStyle = 'rgba(30,45,60,.5)'; g.lineWidth = 0.8;
    g.beginPath(); g.moveTo(cx, 12); g.lineTo(cx, 56);
    g.moveTo(cx - 6, 24); g.lineTo(cx + 6, 24);
    g.moveTo(cx - 7, 42); g.lineTo(cx + 7, 42); g.stroke();
    g.fillStyle = '#2a333c'; g.strokeStyle = '#11181f'; g.lineWidth = 1.5;
    g.beginPath(); g.arc(cx - 3.2, 60, 3, 0, TAU); g.arc(cx + 3.2, 60, 3, 0, TAU); g.fill(); g.stroke();
    gr = g.createLinearGradient(cx, 9, cx, 25);
    gr.addColorStop(0, '#bff1ff'); gr.addColorStop(0.5, '#40b7de'); gr.addColorStop(1, '#0e5a78');

    g.fillStyle = '#c94b4b'; g.beginPath(); g.arc(cx - 16, 38, 3, 0, TAU); g.fill();
    g.fillStyle = '#fff'; g.beginPath(); g.arc(cx - 16, 38, 1.4, 0, TAU); g.fill();
  });
  SPR.fighter = makeSprite(44, 48, (g, w) => {

    let gr = g.createLinearGradient(cx - 6, 0, cx + 6, 0);
    gr.addColorStop(0, '#a83232'); gr.addColorStop(0.5, '#ea6060'); gr.addColorStop(1, '#a83232');
    poly(g, [[cx, 46], [cx + 4, 36], [cx + 5.5, 12], [cx + 2.5, 3], [cx - 2.5, 3], [cx - 5.5, 12], [cx - 4, 36]], gr, '#4a0d0d', 2.2);

    poly(g, [[cx - 7, 22], [cx - 42, 12], [cx - 41, 4], [cx - 7, 12]], '#6f6238', '#2e2812', 3);
    poly(g, [[cx + 7, 22], [cx + 42, 12], [cx + 41, 4], [cx + 7, 12]], '#6f6238', '#2e2812', 3);
    g.fillStyle = '#4a4222'; g.beginPath(); g.arc(cx - 26, 12, 5, 0, TAU); g.arc(cx + 26, 12, 5, 0, TAU); g.fill();
    poly(g, [[cx, 40], [cx + 3, 48], [cx, 54], [cx - 3, 48]], '#2f3b2a', '#111', 2);
    g.fillStyle = '#ffd23f'; g.beginPath(); g.arc(cx, 30, 5, 0, TAU); g.fill();

  SPR.turret = makeSprite(40, 40, (g, w) => {

  SPR.ace = makeSprite(36, 46, (g, w) => {

function drawForest(g, r, idx) {

function drawCity(g, r, idx) {

function drawMountains(g, r, idx) {

    g.strokeStyle = 'rgba(230,225,240,.55)'; g.lineWidth = 3; g.stroke();

function drawSwamp(g, r, idx) {
  const w = g.canvas.width;
  const grad = g.createLinearGradient(0, 0, 0, CHUNK);
  grad.addColorStop(0, '#3c4a2c'); grad.addColorStop(1, '#333f25');
  g.fillStyle = grad; g.fillRect(0, 0, w, CHUNK);
  for (let i = 0; i < 6; i++) {
    const x = 50 + r() * (w - 100), y = 50 + r() * (CHUNK - 100), R = 34 + r() * 50;
    blob(g, x, y, R, '#26382f', r);
    blob(g, x, y, R * 0.7, '#2e4438', r);
    g.strokeStyle = '#8aa050'; g.lineWidth = 1.5;
    for (let s2 = 0; s2 < 10; s2++) {
      const sx = x + (r() - 0.5) * R * 2, sy = y + (r() - 0.5) * R * 2;
      g.beginPath(); g.moveTo(sx, sy); g.lineTo(sx + (r() - 0.5) * 4, sy - 8 - r() * 6); g.stroke();
    }
  }
  for (let i = 0; i < 5; i++) blob(g, r() * w, r() * CHUNK, 14 + r() * 22, '#50642f', r);
  for (let i = 0; i < 8; i++) {
    const x = r() * w, y = r() * CHUNK;
    g.strokeStyle = '#5e4a30'; g.lineWidth = 2.5;
    g.beginPath(); g.moveTo(x, y + 12); g.lineTo(x, y - 6);
    g.moveTo(x, y); g.lineTo(x + 6, y - 8); g.moveTo(x, y - 2); g.lineTo(x - 6, y - 9);
    g.stroke();
  }
  g.fillStyle = 'rgba(200,220,190,.08)';
  for (let i = 0; i < 5; i++) { g.beginPath(); g.ellipse(r() * w, r() * CHUNK, 60 + r() * 90, 20 + r() * 30, 0, 0, TAU); g.fill(); }
}
function blob(g, x, y, R, color, r) {
  g.fillStyle = color; g.beginPath();
  for (let a = 0; a <= 12; a++) {
    const ang = a / 12 * TAU, rr = R * (0.8 + r() * 0.35);
    const px = x + Math.cos(ang) * rr, py = y + Math.sin(ang) * rr;
    if (a === 0) g.moveTo(px, py); else g.lineTo(px, py);
  }
  g.closePath(); g.fill();
}

function boomAt(x, y, big) {
  if (G.parts.length > MAX_PARTS - 60) return;
  const colors = ['#ffb400', '#ff5722', '#ffe9a0', '#ff8a00', '#ffd75e', '#ff3b3b', '#ffaa00', '#ff6600', '#ffffff'];
  const n = big ? 70 : 40;
  for (let i = 0; i < n && G.parts.length < MAX_PARTS; i++) {
    const a = rnd(0, TAU), sp = rnd(40, big ? 350 : 200) * S;
    G.parts.push({
      x, y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp - (big ? 40 : 20) * S,
      life: rnd(0.4, big ? 1.2 : 0.8),
      t: 0,
      r: rnd(3, big ? 12 : 7) * S,
      col: colors[Math.floor(rnd(0, colors.length))]
    });
  }
  for (let i = 0; i < (big ? 30 : 12) && G.parts.length < MAX_PARTS; i++) {
    const a = rnd(0, TAU), sp = rnd(80, big ? 450 : 280) * S;
    G.parts.push({
      x, y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp - rnd(10, 30) * S,
      life: rnd(0.1, 0.35),
      t: 0,
      r: rnd(1, 3) * S,
      col: '#ffffff'
    });
  }
  for (let i = 0; i < (big ? 18 : 8) && G.parts.length < MAX_PARTS; i++)
    G.parts.push({
      x: x + rnd(-24, 24) * S,
      y: y + rnd(-24, 24) * S,
      vx: rnd(-35, 35),
      vy: rnd(-60, 20),
      life: rnd(0.6, big ? 1.5 : 1.0),
      t: 0,
      r: rnd(8, big ? 26 : 16) * S,
      col: 'smoke'
    });
  const nf = big ? 10 : 5;
  for (let i = 0; i < nf && G.parts.length < MAX_PARTS; i++)
    G.parts.push({
      x: x + rnd(-20, 20) * S,
      y: y + rnd(-20, 20) * S,
      vx: rnd(-40, 40),
      vy: rnd(-60, 15),
      life: rnd(0.2, big ? 0.7 : 0.5),
      t: 0,
      r: rnd(big ? 40 : 20, big ? 70 : 35) * S,
      col: 'fire'
    });
  if (G.parts.length < MAX_PARTS)
    G.parts.push({ x, y, vx: 0, vy: 0, life: big ? 0.65 : 0.5, t: 0, r: (big ? 130 : 70) * S, col: 'ring' });
  if (big && G.parts.length < MAX_PARTS)
    G.parts.push({ x, y, vx: 0, vy: 0, life: 0.6, t: 0, r: 180 * S, col: 'ring2' });
  if (big && G.parts.length < MAX_PARTS) for (let i = 0; i < 16; i++) {
    const a2 = rnd(0, TAU), sp2 = rnd(130, 380) * S;
    G.parts.push({
      x, y,
      vx: Math.cos(a2) * sp2,
      vy: Math.sin(a2) * sp2 - rnd(20, 60) * S,
      life: rnd(0.5, 1.0),
      t: 0,
      r: rnd(3, 8) * S,
      col: 'debris',
      rot: rnd(0, TAU),
      vr: rnd(-12, 12)
    });
  }
  G.flash = Math.max(G.flash, big ? 0.5 : 0.25);
  G.shake = Math.min(14, G.shake + (big ? 8 : 4));
  if (big) AudioSys.boomB(); else AudioSys.boomS();
}

      }
      // Tragere
      e.fireT -= dt;
      if (e.fireT <= 0 && e.y > 30 * S) {

        const a = Math.atan2(P.y - e.y, P.x - e.x);
        const sp = (260 + MISSIONS[G.level].diff * 60) * S;
        for (let k2 = -1; k2 <= 1; k2++) {
          fireEB(e.x, e.y + 24 * S, Math.cos(a + k2 * 0.24) * sp, Math.sin(a + k2 * 0.24) * sp);
        }
      }
    } else if (e.type === 'turret' || e.type === 'tank') {
      e.y += e.vy * tdt;

      e.fireT -= tdt;

    if (e.type === 'fighter' || e.type === 'diver')
    if (e.hp <= e.maxHp * 0.45 && Math.random() < 0.35 && G.parts.length < MAX_PARTS)

    if (P.alive && e.type !== 'turret' && e.type !== 'tank' && dist2(e.x, e.y, P.x, P.y) < Math.pow(e.r + 10 * S, 2)) {

        G.boss.hp -= b.dmg; G.boss.hitT = 0.08; dead = true; G.score += 10;
        G.parts.push({ x: b.x, y: b.y, vx: rnd(-40, 40), vy: rnd(-60, 0), life: 0.25, t: 0, r: 3.5 * S, col: '#fff' });
      }

    if (dead) G.pbullets.splice(i, 1);
  }
  for (let i = G.ebullets.length - 1; i >= 0; i--) {
    const b = G.ebullets[i];
    b.x += b.vx * tdt; b.y += b.vy * tdt;
    if (b.y > H + 20 || b.y < -20 || b.x < -20 || b.x > W + 20) { G.ebullets.splice(i, 1); continue; }

function applyPowerup(t) {
  AudioSys.power();
  if (t.k === 'P') { if (P.weapon < 5) { P.weapon++; addText(P.x, P.y - 30 * S, T('wpn'), '#ff8a00');
                       G.parts.push({ x: P.x, y: P.y, vx: 0, vy: 0, life: 0.45, t: 0, r: 64 * S, col: 'ring' }); }
                     else { G.score += 1000; addText(P.x, P.y - 30 * S, '+1000', '#ff8a00'); } }
  if (t.k === 'H') { P.hp = Math.min(100, P.hp + 40); addText(P.x, P.y - 30 * S, T('rep'), '#42d66a'); }
  if (t.k === 'B') { P.bombs = Math.min(6, P.bombs + 1); addText(P.x, P.y - 30 * S, T('bmb'), '#ffd23f'); }
  if (t.k === 'S') { P.shield = 8; addText(P.x, P.y - 30 * S, T('shd'), '#40b4ff'); }
  if (t.k === '★') { G.score += 500; addText(P.x, P.y - 30 * S, '+500', '#ff5ecb'); }
}
function updateFX(dt) {
  G.comboT = Math.max(0, (G.comboT || 0) - dt);
  if (G.comboT === 0) G.combo = 0;
  G.shake = Math.max(0, G.shake - dt * 28);
  G.flash = Math.max(0, G.flash - dt * 1.8);
  for (let i = G.parts.length - 1; i >= 0; i--) {
    const p = G.parts[i]; p.t += dt;
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += (p.col === 'smoke' ? -30 : 60) * dt;
    if (p.t >= p.life) G.parts.splice(i, 1);
  }
  if (G.parts.length > MAX_PARTS) G.parts.splice(0, G.parts.length - MAX_PARTS);
  for (let i = G.texts.length - 1; i >= 0; i--) {
    const t = G.texts[i]; t.t += dt; t.y -= 34 * S * dt;
    if (t.t > 1.2) G.texts.splice(i, 1);
  }
}

// ---------- Desenare ----------
function drawSprite(spr, x, y, sc, rot) {
  const w = spr.width / 2 * (sc || 1) * S, h = spr.height / 2 * (sc || 1) * S;
  ctx.save(); ctx.translate(x, y);
  if (rot) ctx.rotate(rot);
  ctx.drawImage(spr, -w / 2, -h / 2, w, h);
  ctx.restore();
}
function drawTerrain() {
  const L = G.level;
  const first = Math.floor(G.dist / CHUNK);
  const count = Math.ceil(H / CHUNK) + 1;
  for (let i = first; i <= first + count; i++) {
    const c = chunkCanvas(L, i);
    const y = H - (i * CHUNK + CHUNK - G.dist);
    ctx.drawImage(c, 0, y);
  }
  chunkCanvas(L, first + count + 1);
  const tint = MISSIONS[L].th.tint;
  if (tint) { ctx.fillStyle = tint; ctx.fillRect(0, 0, W, H); }
  if (lightGrad) { ctx.fillStyle = lightGrad; ctx.fillRect(0, 0, W, H); }
  if (MISSIONS[L].th.fx === 'glint') {
    const t0 = performance.now() / 1000;
    ctx.globalAlpha = 0.05;
    const sh2 = ctx.createLinearGradient(0, (t0 * 46) % (H * 2) - H, 0, (t0 * 46) % (H * 2) + H);
    sh2.addColorStop(0, 'rgba(255,255,255,0)'); sh2.addColorStop(0.5, '#ffffff'); sh2.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = sh2; ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }
}
function drawPlayer(now) {
  if (!P.alive) return;
  if (P.inv > 0 && Math.floor(now / 80) % 2 === 0) return;
  ctx.globalAlpha = 0.26;
  drawSprite(SHD.player, P.x + 13 * S, P.y + 20 * S, 0.9, P.bank * 0.2);
  ctx.globalAlpha = 1;
  ctx.save();
  ctx.translate(P.x, P.y);
  ctx.rotate(P.bank * 0.2);
  ctx.scale(1 - Math.abs(P.bank) * 0.22, 1);
  const fl = 10 + Math.sin(now / 30) * 4;
  for (const dx of [-3.2 * S, 3.2 * S]) {
    ctx.fillStyle = '#ffb400';
    ctx.beginPath(); ctx.moveTo(dx - 2.6 * S, 27 * S);
    ctx.lineTo(dx, (27 + fl) * S); ctx.lineTo(dx + 2.6 * S, 27 * S); ctx.fill();
    ctx.fillStyle = '#fff2b0';
    ctx.beginPath(); ctx.moveTo(dx - 1.3 * S, 27 * S);
    ctx.lineTo(dx, (27 + fl * 0.55) * S); ctx.lineTo(dx + 1.3 * S, 27 * S); ctx.fill();
  }
  ctx.globalCompositeOperation = 'lighter';
  const ab = (10 + Math.sin(now / 40) * 4) * S;
  ctx.drawImage(SPR.fire, -ab, 26 * S - ab * 0.4, ab * 2, ab * 2);
  ctx.globalCompositeOperation = 'source-over';
  const pw = SPR.player.width / 2 * S, ph = SPR.player.height / 2 * S;
  ctx.drawImage(SPR.player, -pw / 2, -ph / 2, pw, ph);
  ctx.restore();
  if (P.shield > 0) {
    const a = P.shield < 2 ? (Math.floor(now / 120) % 2 === 0 ? 0.5 : 0.15) : 0.45;
    ctx.strokeStyle = 'rgba(80,200,255,' + a + ')'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(P.x, P.y, 34 * S + Math.sin(now / 90) * 2, 0, TAU); ctx.stroke();
  }
}

function drawParts() {
  for (const p of G.parts) {
    const k = 1 - p.t / p.life;

      ctx.lineWidth = 4 * S;
      ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(1, p.r * (1 - k)), 0, TAU); ctx.stroke();
      continue;
    }
    if (p.col === 'ring2') {
      ctx.strokeStyle = 'rgba(255,180,80,' + (0.4 * k) + ')';
      ctx.lineWidth = 2.5 * S;
      ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(1, p.r * (1 - k * 0.6)), 0, TAU); ctx.stroke();
      continue;
    }
    if (p.col === 'rain') {
      ctx.strokeStyle = 'rgba(180,200,255,.4)'; ctx.lineWidth = 1.4;
      ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x - p.r * 0.3, p.y - p.r); ctx.stroke(); continue;
    }
    if (p.col === 'snowf') {
      ctx.fillStyle = 'rgba(255,255,255,.85)';
      ctx.beginPath(); ctx.arc(p.x + Math.sin(p.t * 2.4 + p.ph) * 10 * S, p.y, p.r, 0, TAU); ctx.fill(); continue;
    }
    if (p.col === 'dust') {
      ctx.fillStyle = 'rgba(230,195,130,' + (0.16 * Math.sin(k * Math.PI)) + ')';
      ctx.beginPath(); ctx.ellipse(p.x, p.y, p.r * 2.2, p.r * 0.5, 0, 0, TAU); ctx.fill(); continue;
    }
    if (p.col === 'wreck') {
      const sp3 = SPR[p.spr];
      if (sp3) {
        const sc = p.scale || 0.5;
        ctx.globalAlpha = Math.min(1, k * 1.4) * 0.6;
        drawSprite(sp3, p.x, p.y, 0.3 + 0.4 * k * sc, p.rot + p.t * p.vr);
        ctx.globalAlpha = 1;

    if (p.col === 'glint') {
      const a = Math.sin((p.t / p.life) * Math.PI);
      ctx.save(); ctx.globalCompositeOperation = 'lighter';
      ctx.strokeStyle = 'rgba(255,255,255,' + (0.85 * a) + ')'; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.moveTo(p.x - p.r * 2, p.y); ctx.lineTo(p.x + p.r * 2, p.y);
      ctx.moveTo(p.x, p.y - p.r * 2); ctx.lineTo(p.x, p.y + p.r * 2); ctx.stroke();

    if (p.col === 'smoke') { ctx.fillStyle = 'rgba(60,60,66,' + (0.45 * k) + ')'; }

    ctx.globalAlpha = p.col === 'smoke' ? 1 : k;

    arcadeText(T('bonus') + G.bonus, cx2, cy2 - 4 * S, 14 * S, '#40b4ff');
    arcadeText(T('score') + G.score, cx2, cy2 + 24 * S, 18 * S, '#ffe9a0');
    if (G.level < MISSIONS.length - 1) arcadeText(T('next'), cx2, cy2 + 54 * S, 13 * S, '#9fb6c9');
  }
  if (G.state === 'gameover') {
    ctx.fillStyle = 'rgba(0,0,0,.6)'; ctx.fillRect(0, 0, W, H);
    arcadeText(T('over'), cx2, cy2 - 50 * S, 36 * S, '#e14b4b');
    arcadeText(T('score') + G.score + '   ' + T('best') + ': ' + G.hiscore, cx2, cy2, 17 * S, '#ffe9a0');
    if (Math.floor(now / 500) % 2 === 0)
      arcadeText(isTouch ? T('retry_t') : T('retry_k'), cx2, cy2 + 52 * S, 15 * S, '#fff');
  }
  if (G.state === 'victory') {
    ctx.fillStyle = 'rgba(0,0,0,.55)'; ctx.fillRect(0, 0, W, H);
    const bob = Math.sin(now / 300) * 4;
    arcadeText(T('vict'), cx2, cy2 - 90 * S + bob, 40 * S, '#ffd23f');
    arcadeText(T('vict1'), cx2, cy2 - 40 * S, 15 * S, '#fff');
    arcadeText(T('vict2'), cx2, cy2 - 16 * S, 15 * S, '#fff');
    arcadeText(T('final') + G.score, cx2, cy2 + 26 * S, 22 * S, '#ffe9a0');
    arcadeText(T('best') + ': ' + G.hiscore, cx2, cy2 + 54 * S, 14 * S, '#9fb6c9');
    if (Math.floor(now / 500) % 2 === 0)
      arcadeText(isTouch ? T('menu_t') : T('menu_k'), cx2, cy2 + 100 * S, 15 * S, '#fff');
  }
  if (G.state === 'pause') {
    ctx.fillStyle = 'rgba(0,0,0,.55)'; ctx.fillRect(0, 0, W, H);
    arcadeText(T('pause'), cx2, cy2 - 10 * S, 34 * S, '#fff');
    arcadeText(isTouch ? T('resume_t') : T('resume_k'), cx2, cy2 + 34 * S, 14 * S, '#9fb6c9');
  }
}
function draw(now, dt) {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  if (G.shake > 0) ctx.translate(rnd(-G.shake, G.shake), rnd(-G.shake, G.shake));
  if (G.state === 'menu') { drawOverlays(now, dt); ctx.restore(); return; }
  drawTerrain();
  ctx.fillStyle = 'rgba(0,10,30,.10)';
  for (const c of G.clouds2) {
    ctx.globalAlpha = c.al;
    drawSprite(c.spr, c.x, c.y, c.sc / S);
  }
  for (const c of G.clouds) {
    ctx.globalAlpha = c.al;
    drawSprite(c.spr, c.x, c.y, c.sc / S);
  }
  ctx.globalAlpha = 1;
  drawEnemies(now);
  drawBoss(now);
  drawPowerups(now);
  drawBullets(now);
  drawPlayer(now);
  drawParts();
  drawTexts();
  if (G.flash > 0) { ctx.fillStyle = 'rgba(255,255,255,' + Math.min(0.7, G.flash) + ')'; ctx.fillRect(-20, -20, W + 40, H + 40); }
  if (G.redFlash > 0) { ctx.fillStyle = 'rgba(255,0,0,' + G.redFlash * 0.6 + ')'; ctx.fillRect(-20, -20, W + 40, H + 40); }
  if (vignette) ctx.drawImage(vignette, 0, 0);
  drawHUD(now);
  drawOverlays(now, dt);
  ctx.restore();
}

// ---------- Intrări ----------
const keys = {};
const touch = { dx: 0, dy: 0, active: false, lx: 0, ly: 0 };
let isTouch = false;
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (G.state === 'menu') {
    if (e.key === 'ArrowLeft') G.menuSel = (G.menuSel + MISSION_COUNT - 1) % MISSION_COUNT;
    if (e.key === 'ArrowRight') G.menuSel = (G.menuSel + 1) % MISSION_COUNT;
  }
  if (e.key === ' ') e.preventDefault();
  if (e.key === 'b' || e.key === 'B' || e.key === 'x' || e.key === 'X') useBomb();
  if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') togglePause();
  if (e.key === 'Enter') advance();
  AudioSys.init();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });
cv.addEventListener('touchstart', e => {
  e.preventDefault(); isTouch = true; AudioSys.init();
  const t = e.changedTouches[0];
  touch.active = true; touch.lx = t.clientX; touch.ly = t.clientY;
  advance(t.clientX, t.clientY);
}, { passive: false });
cv.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  if (touch.active) {
    touch.dx += (t.clientX - touch.lx) * 1.15;
    touch.dy += (t.clientY - touch.ly) * 1.15;
    touch.lx = t.clientX; touch.ly = t.clientY;
  }
}, { passive: false });
cv.addEventListener('touchend', e => { e.preventDefault(); touch.active = false; }, { passive: false });
cv.addEventListener('mousedown', e => { AudioSys.init(); advance(e.clientX, e.clientY); });

function menuLayout() {
  return { ySel: H / 2 + 58 * S, ax: Math.min(150 * S, W / 2 - 36) };
}
function menuArrowHit(x, y) {
  const ml = menuLayout(), cx2 = W / 2;
  if (Math.abs(y - ml.ySel) < 42 * S) {
    if (Math.abs(x - (cx2 - ml.ax)) < 46 * S) { G.menuSel = (G.menuSel + MISSION_COUNT - 1) % MISSION_COUNT; return true; }
    if (Math.abs(x - (cx2 + ml.ax)) < 46 * S) { G.menuSel = (G.menuSel + 1) % MISSION_COUNT; return true; }
  }
  return false;
}
function advance(x, y) {
  if (G.state === 'menu') {
    if (x !== undefined && menuArrowHit(x, y)) return;
    G.score = 0; resetPlayer(true); startLevel(G.menuSel);
  }
  else if (G.state === 'gameover' && G.stateT > 0.8) { G.score = 0; resetPlayer(true); startLevel(G.level); }
  else if (G.state === 'victory' && G.stateT > 0.8) { G.menuSel = 0; setState('menu'); }
}
function togglePause() {
  if (G.state === 'play') setState('pause');
  else if (G.state === 'pause') setState('play');
}
document.getElementById('btnPause').addEventListener('click', () => { AudioSys.init(); togglePause(); });
const btnLang = document.getElementById('btnLang');
const btnBomb = document.getElementById('btnBomb');

function setLang(l) {
  LANG = l;
  btnLang.textContent = LANG === 'ro' ? 'EN' : 'RO';
  btnBomb.textContent = T('bomb');
}
btnLang.addEventListener('click', e => { e.stopPropagation(); setLang(LANG === 'ro' ? 'en' : 'ro'); });

document.getElementById('btnMute').addEventListener('click', function (e) {
  e.stopPropagation(); AudioSys.init();
  AudioSys.muted = !AudioSys.muted;
  this.textContent = AudioSys.muted ? '✕' : '♪';
});
btnBomb.addEventListener('touchstart', e => { e.preventDefault(); e.stopPropagation(); useBomb(); }, { passive: false });
btnBomb.addEventListener('click', e => { e.stopPropagation(); useBomb(); });
document.addEventListener('visibilitychange', () => { if (document.hidden && G.state === 'play') setState('pause'); });

let last = 0;
function loop(now) {
  const dt = Math.min(0.033, (now - last) / 1000 || 0.016);
  last = now;
  btnBomb.style.display = (isTouch && (G.state === 'play' || G.state === 'pause')) ? 'block' : 'none';
  if (G.state !== 'pause') update(dt);
  draw(now, dt);
  requestAnimationFrame(loop);
}
function prewarm() {
  const c = document.createElement('canvas'); c.width = 8; c.height = 8;
  const g = c.getContext('2d');
  const warm = s => { if (s && s.width) g.drawImage(s, 0, 0, 4, 4); };
  for (const k in SPR) { const s = SPR[k]; if (Array.isArray(s)) s.forEach(warm); else warm(s); }
  for (const k in SHD) warm(SHD[k]);
}
resize();
buildSprites();
prewarm();
setLang('ro');
requestAnimationFrame(loop);
</script>
